body:
  text: 聞見後録卷九宋邵博撰唐髙宗曰隋煬帝拒諫而亡朕常以為戒虛心求諫而無諫者何也李績曰陛下所為盡善羣臣無得而諫豫謂髙宗立太宗才人武氏為后決於李績陛下家事勿問外人一言又謂髙宗盡善無可諫太宗以績遺髙宗失於知人矣突厥默啜自則天世為中國患朝廷旰食傾天下之力不能克郝靈筌得其首自謂不世之功時宋璟為相以天子好武功恐好事者競生心徼幸痛抑其賞逾年始授郎將靈筌慟哭而死初熙寧元豐間西羌大首領鬼章青宜結為邊患數覆官軍神宗懸旌節為賞捕之不能得至元祐年將种誼生致之吕汲公在相位誼但轉一官為西上閣門使而已亦宋璟之意也李績許敬宗於髙宗立武后李林甫於玄宗廢太子皆以陛下家事何必問外人一言而定嗚呼姦人之言自世主之好以入故必同髙祖益蕭何二千户以嘗繇咸陽時送我獨贏錢二光武賜馮異以珍寶衣服錢帛用報倉卒蕪蔞亭豆粥滹沱河麥飯二帝於二臣甚類可以謂之故人矣髙祖令項籍舊臣皆名籍獨鄭君者不奉詔盡拜名籍者為大夫而逐鄭君劉裕密書招司馬休之府録事韓延之不屈以裕父名翹字顯宗乃更字顯宗名子曰翹以示不臣劉氏如鄭君韓延之二人者可以語事君之義矣漢宣帝初立謁見髙廟霍光驂乘上內嚴憚之若有芒刺在背唐宣宗初立李德裕奉册上問左右適近我者非太尉耶每顧我使我毛髮灑浙世謂霍氏之禍萌於驂乘李氏之禍起於奉册故曰威震主者不畜二公甚類也李匡威忌日王鎔就第弔之匡威素服裹甲見之唐末武人忌日尚素服受弔也張藝叟為安信之言舊見唐野史一書出二事一明皇為李輔國所弒肅宗知其謀不能制不數日雷震殺之一甘露禍起北司方收王涯盧同者適在坐并收之同訴曰山人也北司折之曰山人何用見宰相同語塞疑其與謀自涯以下皆以髮反繫柱上釘其手足方行刑同無髮北司令添一釘於腦後人以為添丁之讖云秦始皇兼并天下灰六籍銷五兵廢古文武之事自立一王之制本大賈人吕不韋之子曹操以姦雄之資正大漢有餘力世官者本夏侯氏之子晉元帝渡江為東晉尚百年本小吏牛氏之子天之所興有不可知者晉史劉聰時盜發漢文帝霸陵宣帝杜陵薄太后陵得金帛甚多朝廷以用度不足詔收其餘以實府庫自漢至晉已四五百年陵中之帛豈不腐壞當云金玉可耳又蘇公為韓魏公論薄葬曰漢文葬於霸陵木不改列藏無金玉天下以為聖明後世安於泰山亦非也牛僧孺自伊闕尉試賢良方正深詆時政之失宰相李吉甫忌之泣訴於憲宗以考官為不公罷之考官白樂天也故并為吉甫父子所惡豫謂牛李之黨基於此嘉祐中蘇子由制策上自禁省厯言其闕不少避至謂宰相不肖思得婁師德郝處俊而用之宰相魏公亟以國士遇之非但不忌也嗚呼賢於李吉甫逺矣司馬文正初作厯代論至論曹操則曰是奪之於盜手非取之於漢室也富文忠疑之問於康節以為非是豫家尚藏康節答文忠書副本當時或以告文正今通鑑魏語下無此論太史公南登廬山觀禹疏九江遂至於會稽大湟上姑蘇望五湖西瞻蜀之岷山及離堆而作河渠書吳蜀之水為江秦之水為河其書江淮等不當通曰河蓋太史公秦人也漢史蕭何傳先言民上書言何強賤買民田宅數千又後言何買田宅必居窮僻處為家不治垣屋曰令後世賢師吾儉不賢毋為勢家所奪其反覆不可信如此漢髙祖嫚侮人罵詈諸侯羣臣如奴耳至張良必字曰子房而不敢名髙祖偽遊雲夢縳韓信載後車信嘆息曰狡兔死走狗烹飛鳥盡良弓藏者如子房棄人間事從赤松子遊髙祖安得而害之故司馬遷具書之班固乃削去下二語是未逹淮隂之嘆耳漢髙祖出成皋東渡河獨滕公從張耳韓信軍修武至宿傳舍晨自稱漢使者馳入趙壁張耳韓信未起即卧內奪其印符麾召諸將易置之信耳起乃知髙祖來大驚髙祖奪兩人軍即令張耳備守趙地韓信為相國文帝以劉禮軍灞上徐厲軍棘門周亞夫軍細栁營上自勞軍至灞上棘門軍直馳入將以下騎出入送迎至細栁軍軍士吏被甲鋭兵刃彀弓弩持滿天子先驅至不得入曰天子且至軍門都尉曰軍中聞將軍之令不聞天子之詔有頃帝至又不得入於是帝使使持節召將軍曰吾欲勞軍亞夫乃傳言開壁門門士請車騎曰將軍約軍中不得驅馳於是天子按轡徐行至中營將軍亞夫揖曰介胄之士不拜請以軍禮見天子為改容式車使人稱謝皇帝敬勞將軍成禮而去帝曰嗟乎此真將軍矣鄉者灞上棘門如兒戲爾豫謂韓信善治軍天子來乃不知至即卧內奪印符以去是可襲而虜也其不嚴於周亞夫也逺矣兩漢之士惟前張子房後諸葛孔明有洙泗大儒氣象子房既辭齊三萬戶封又讓相國於蕭何與之從容言天下事甚衆善乎太史公曰運籌帷幄之中制勝於無形子房計謀其事無知名無勇功圖難於易為大於細可謂盡之矣劉先主忍死屬孔明君才十倍曹丕嗣子可輔輔之如其不才君可自取蓋先主已知禪之不肖志欲拯一世之人於塗炭之中既不幸以死非孔明不可乃誠言也亦堯舜禹之事也孫盛何人輒以為亂命又以為權術豈足與論先主孔明哉東坡先生謂孔明出師表可與伊訓説命相為表裏豫謂亦周公鴟梟救亂之詩也故曰願陛下託臣以討賊興復之功不效則治臣之罪以告先帝之靈使孔明為先主出師必不為此言矣及軍中以孔明死赴聞蜀人赴之不許祠之又不許至野祭相弔以哭何耶使孔明不死未保禪能相終始也崔瑗家無儋石當世資其親故李固望風致敬然杜喬為八使乃以贓罪奏瑗士之欲免於讒謗難矣哉王陽車馬極鮮明崔瑗賔客盛肴膳然兩公皆清修節士也故論人者當察其實何如耳神宗惡後漢書范曄姓名欲更修之求東觀漢記久之不得後髙麗以其本付醫官其人來上神宗已厭代矣至元祐年髙麗使人言狀訪於書省無知者醫官已死於其家得之藏於中祕豫嘗寫本於吕汲公家亦棄之兵火中矣又豫官長安時或云鄠杜民家有江表傳英雄志因為外臺言之亟委官以取民驚懼遽焚之世今無此三書矣堯舜禪讓之事尚有幽囚野死之駭言賴孔子得無完書耳況其假堯舜以為禪讓者欲其臣主俱全難矣獨漢獻帝自初平元年庚午即位至延康元年庚子遜位於魏王曹丕實在位三十年丕奉帝為山陽公邑萬戶位在諸侯王上奏事不稱臣受詔不拜以天子車服郊祀天地宗廟祖臘皆如漢制黃初七年丙午曹丕死曹睿立青龍二年甲寅山陽公薨距遜位後十四年矣睿變服率羣臣哭盡哀遣使弔祭監護喪事諡孝獻皇帝册曰曹睿云用漢天子禮儀葬禪陵後五年曹睿死齊王芳立四年廢髙貴鄉公髦立五年死陳留王奐立景元元年庚辰山陽公夫人節薨王臨於華林園使使持節追諡獻穆皇后及葬車服制度皆如漢氏故事後四年陳留王禪位於晉是魏之尊奉漢帝后與其國相終始也視晉以降曰禪讓者豈不為盛德事乎史臣不知此義尚貶曹丕無曠大之度豫故表出之上柱國竇毅尚周武帝姊襄陽公主其女聞隋楊公受周靜帝禪自投堂下撫膺太息曰恨我不為男子救外家之禍毅與公主掩其口曰汝勿妄言赤吾族毅由是竒之以妻唐之髙祖是為太穆皇后實生太宗卒能滅隋云丹陽陶𢎞景博學多藝能好養生之術仕齊為奉朝請棄官隱茅山梁武帝早與之遊恩禮甚至每得其書焚香以受數手勑招之不出朝廷有吉凶征討大事必先咨之月中常有數信人謂之山中宰相將沒有詩云夷甫任散誕平叔坐論空豈悟昭陽殿遂作單于宫時天下之士猶尚西晉之俗競談玄理故𢎞景云爾蓋散誕論空則廢禮法禮法既廢則異端矣古今之變有必然者𢎞景其知言也聞見後録卷九

body:
  text: 聞見後錄卷三宋邵博撰東坡先生傳禹貢三江既入震澤底定曰三江之解古今皆不明予以所見考之自豫章而下入于彭蠡而東至海為南江自蜀岷山至于九江彭蠡以入于海為中江自嶓冢導漾東流為漢過三澨大别以入于江滙于彭蠡以入于海為北江此三江自彭蠡以上為二自夏口以上為三江漢合于夏口與豫章之江皆滙于彭蠡則三為一過秣陵京口以入于海不復三矣然禹貢猶有三江之名曰北曰中者以味别也蓋此三水性不相入江雖合而水味異故至于今有三泠之說古今稱唐陸羽知水味三泠相雜而不能欺不可誣也予又以禹貢之言考之若合符節禹貢之敘漢水也曰嶓冢導漾東流為漢又東為滄浪之水過三澨至于大别南入于江東滙澤為彭蠡東為北江入于海夫漢既已入江且滙為彭蠡矣安能復出于北江以入于海乎知其以味别也禹之敘江水也曰岷山導江東别為沱又東至于澧過九江至于東陵東迤北㑹于滙東為中江入于海夫江已與漢合且滙為彭蠡矣安得自别為中江以入于海乎知其以味别也漢為北江岷山之江為中江則豫章之江為南江不言而可知矣禹以味别信乎曰濟水既入于河而溢為滎禹不以味别安别滎之為濟也堯水之未治也東南皆海豈復有吳越哉及彭蠡既瀦三江入于海則吳越始有可宅之土水之所鍾獨震澤而已故曰三江既入漢為北江孔安國以為自彭蠡江分為三入震澤為北江入于海疎矣蓋安國未嘗南游按經文以意度之不知三江距震澤逺甚決無入理而震澤之大小決不足以受三江也班固曰南江從㑹稽吳縣南入海中江從丹陽蕪湖縣西東至㑹稽陽羨東入海北江從㑹稽毗陵縣北東入海㑹稽丹陽容有此三然皆是東南枝流小水自别而入海者非禹貢所謂中江北江自彭蠡出者也人徒見禹貢有三江中北之名而不悟一江三泠合流而異味也故雜取枝流一小水以應三江之數如使此三者為三江則是與今京口入海之江為四矣京口之江視此三者猶畎澮禹獨遺大而數小何耶世謂先正論三江以味别自孔子刪定書以來學者不知也然予讀唐史髙宗問許敬宗書稱浮于濟漯今濟與漯斷不相屬何故而言敬宗曰夏禹導沇水東流為濟入于河今自漯至温而入河水自此洑地過河而南出為滎又洑而至曹濮散出于地合而東汶水自南入之所謂溢為滎東出于陶丘北又東㑹于汶是也古者五行皆有官水官不失職則能辨味與色而復出合而更分皆能識之蓋江河以味别敬宗先言之矣東坡先生不表見之者嫌其姓名汙簡冊耳王弼注鼎折足覆公餗其形渥凶以為沾濡之形也蓋弼不知古易形作刑渥作剭剭音屋故新唐元載賛用刑剭亦周禮剭誅云書首堯舜詩首文王春秋首魯𨼆公史記世家首吳泰伯列傳首伯夷讓之為德也大矣哉孔子賛周公賛召公不賛太公顔子得位為堯舜文王孟子得位為湯武韓退之羑里操云臣罪當誅兮天王聖明知文王之心者也昔孟子欲言周禮而患無其籍今周禮最後出多雜以六國之事大要凟祀斂財冗官擾民可施于文不可措于事者也先儒以為六國隂謀之書則過矣晁伯以更生為新室之書也曰詩書但稱四嶽新室稱五嶽周禮亦稱五嶽類此不一余頗疑之得司馬文正公日記上主青苗法曰此周禮泉府之職周公之法也光對曰陛下容臣不識忌諱臣乃敢昩死言之昔劉歆用此法以佐王莽使農商失業涕泣于市道卒亡天下安足為聖朝法也且王莽以錢貨民使為本業計其所得之利十取其一比于今日嵗取四分之息猶為輕也上曰王莽取天下本不以正光對曰王莽取之雖不以正然受漢家完富之業向使不變法征利結怨于民猶或未亡也是文正公意亦以周禮多新室之事也自王荆公藉以文其政事盡以為周公之書學者無敢議者矣孔子荅羣弟子問孝不過一二言至曾子則特為著經又夫子之文章可得而聞性與天道不可得而聞也其告曾子猶曰吾道一以貫之蓋顔淵死孔子之所付授者曾子一人耳至孔子没子夏子游子張以有若貌類孔子欲以事孔子者事之獨曾子不可曰江漢以濯之秋陽以暴之皜皜乎不可尚已其絶識非餘子可及也獨不在四科之列世頗疑之或曰顔淵等十人同在陳蔡者曾子以孝不去其親故不在或曰孔子弟子曾子最少少孔子四十六嵗論語書曽子死則論語自曾子弟子子思之徒出無疑曾子嘗與其徒追記孔子稱顔淵等之言曽子以朋友各字之于孔子稱曾子之言自不記也果孔子之言則名之矣當曰德行顔回閔損冉耕冉雍言語宰予端木賜政事冉求仲由文學言偃卜商也蓋論語之法師語弟子則名之弟子對師雖朋友亦名之自相謂則字之此說為近如曰陳蔡之厄孔子有死生之憂欲表其人于後世故用春秋之法字以褒之則賢哉囘也賜也可與言詩偃之言是也雍也可使南面獨非褒乎楊氏為我過于義墨氏兼愛過于仁仁義之過孟子尚以異端遇之誅之不少貸同時有莊子者著書自堯舜以下無一不毁毁孔子尤甚詩書禮樂刑名度數舉以為可廢其叛道害教非楊墨二氏比也莊子蒙人孟子鄒人其地又相屬各如不聞如無其人何哉惟善學者能辨之若曰莊子真詆孔子者則非止不知莊子亦不知孟子矣孔子曰君君臣臣君不君臣不臣理也孟子則曰君之視臣如手足則臣視君如腹心君之視臣如犬馬則臣視君如國人君之視臣如土芥則臣視君如冦讎蓋孔子不忍言者孟子盡言之矣孟子曰徐行後長者謂之弟疾行先長者謂之不弟元豐末年詔以孟子配饗孔子廟巍然冠冕坐于顔子之次師曽子坐席下師子思立廡下豈但行于長者之先哉果孟子有神其肯自違平生之言必不敢享矣老萊子聞穆公欲相子思問曰若子事君將何以為乎子思曰順吾性而以道事之無死亡焉老萊子曰不可順子之性也子性清剛而傲不肖且又無所死亡非人臣也子思曰不肖固人之所傲也夫事君道行言聽則可以有所死亡道不行言不聽則亦不能事君謂無死亡也老萊子曰不見夫齒乎雖堅固卒以相磨舌柔順終以不敝子思曰吾不敢為舌故不能事君予讀子思書知孟軻氏之剛固有師也司馬文正公太𤣥說其畧曰揚子雲真大儒者也孔子既没知聖人之道者非子雲而誰孟與荀殆不足擬況其餘乎觀𤣥之書明則極于人幽則盡于神大則包宇宙細則入毛髪合天地人之道以為一括其根本示人所出胎育萬物而兼為之母若地履之而不可窮也若海挹之而不可竭也天下之道雖有善者蔑以易此矣考之于渾元之初而𤣥已生察之于當今而𤣥非不行窮之于天地之季而𤣥不可亡叩之于萬物之清而不漏測之以鬼神之狀而不違槩之以六經之言而不悖藉使聖人復生視𤣥必釋然而嘆以為得己之心矣乃知𤣥者以賛易也非别為書與易角逐也予謂文正公以誠以謙為學之本果于𤣥無所見肯為此言乎程伊川以𤣥為賛者非也伊川之門人以文正公不知先天之學者亦非也聞見後錄卷三

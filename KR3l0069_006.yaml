body:
  text: 聞見後錄卷六宋邵博撰論先天八卦之位與繫辭不同瓘竊謂康節先生所以辨伏羲文王之易者為明之此也伏羲之易乾南而坤北自乾而左巽而右兊在東離為陽與起震終艮之序則離上而坎下震東而兊西與先天之位固不同矣乾坤屯蒙之序與乾履大有大壯之序亦不同也乾坤屯蒙之序孔子作序卦以教天下其辭其義可翫而習也乾履大有大壯之序文王不言其義後之學者何所據而習之雖無可據之義而悟之在心心聲不足以發其奥心畫不足以形其妙墮于言語文字而先天之易𨼆矣素𨼆之士豈乏人哉背理而求數文王憂之固闔其門而拒其出孔子繼文王之志㣲顯闡幽一以仁義黙而成之不言聖人之教如此潔浄精㣲可謂至矣後之學者猶有舍經取緯違大理而黷正經者京房之流是也康節云物理之學不可强通强通則失理而入于迷矣皇極之書不可以强通者也失理之士捨仁義而迷小道背來物而役私情如是而取皇極者文正闔焉非與康節異心也蓋伏羲文王之易一而不一文王康節之學同而不同皇王之時異闔闢之義殊易之所以為異者未嘗二也所謂伏羲之八卦文王之八卦未嘗異未嘗同也曰一曰二曰異曰同者皆求異情爾瓘竊意其如此而情之所是亦不敢以為必然更須面叩乃可以決耳蒙諭繫辭論釋諸爻未有及象數者豈得意忘象者真孔子之學耶此言盡易之要矣至于日星氣候之說未及深考然以爻當朞既出于繫辭而厯象二語又載于堯典月令所紀皆節候也鳥火虚昴可辨分至辰弗集房則失日可知春秋日食之數後世厯象十得七八已號精宻是故離坎之上下乾坤之南北在六經者恐皆可考不獨易也孔子曰寒往則暑來暑往則寒來寒暑相推而嵗成焉嵗不能自成也當有成嵗之法朞三百有六旬有六日以閏月定四時者成歲之法也治厯明時乃先王莫大之政以嗣征考之可以見矣而王省惟嵗而成嵗之法付之有司有司失職必誅無赦非如他罪之可宥也夫何聖而不然哉賴此以授民時也敢不欽乎然而聖人之文經天緯地經出于上而緯在有司上揆下守民時所賴皆不可以不欽也稽覽配合之說一本于緯厯法之所取而有司之所當習也康節云洛下閎但知厯法唯揚子雲知厯法又知厯理易之在先天者非厯理乎文正讀太𤣥說曰測之以鬼神之狀而不違槩之以六經之書而不悖借使聖人復生視𤣥必釋然而嘆以為得已之心矣乃知𤣥者所以賛易非别為書而與易競也又曰夫畋者網而得之與弋而得之何異哉易網也𤣥弋也何害不既設網而使弋者為之助乎又曰孔子既没知聖人之道者非揚子而誰與孟荀殆不足以擬況其餘乎瓘淺陋初不知𤣥嘗輕議其書而妄評其是非自聞康節之言始索子雲于厯理之内及觀文正之論然後知太𤣥不可不學而冥冥然未有入路尚苦其字之難識況欲遽測其祕奥乎文正自謂求之積年乃得觀之讀之數十過㕘以首尾稍得闚其梗槩然後喟然置書歎子雲為真大儒矣凡文正之學主之以誠守之以謙得十百而說一二其于𤣥也不觀不到則其言不若是矣瓘初不聞此乃輕議子雲之書而妄評其是非心之愧悵可勝言哉棄舊誤于垂成累初習于平地庶幾推往而無戀積新而可隆尚賴先覺大君子許其止而與之進也瓘所論康節之學恐不然康節詩云自從三度絶韋編不讀書來十二年俯仰之間無所愧任人謗道是神仙神仙且不受也以為數學可乎康節云先天之學心法也然則其學在心或于内外欲觀休咎故以皇極為考數之書耳如聞康節未嘗以皇極語人故其說不傳自有八卦可以闚玩惠迪則吉違之則咎何必更求休咎于皇極之書也故諫大夫陳公瑩中論康節先天之學書為楊中立游定夫出也大諫公與康節不相接博之先君因公之請嘗進遺書之副歸焉于時國有巨盜據顯位未發公以言刺之反得罪其後人無敢繼者盜之威自此盛卒至于亂天下世以公之明比漢何武唐郭子儀本朝吕獻可蘇明允矣或疑公前知如神亦出于康節之書則非也公既廢始為康節之學其英偉絶人之資所見超詣如此書也中立定夫同出伊川之門于先達之序尚未詳故不知其學也明道伊川視康節賦詩曰先生相與宴西街小子親㩗几杖來其恭如此張横渠于伊川諸父比也横渠見康節尚拜牀下博猶記王母夫人語及伊川必曰程二秀才云云蓋當康節𨼆居謝聘日伊川尚年少未為世所知也博蚤見伊川又與伊川族弟穎善穎知好大學伊川于其眷中獨與之言易嘗從穎得書疏一通伊川手迹也曰為易學者但取王輔嗣胡先生王荆公之說讀之無餘事矣今伊川易傳行于世大㫖可見為其學者遽以大諫公所謂伏羲八卦之語則駭矣康節平居尚不以語人博其敢謂伊川有所不知也近時妄人出雜書數十百條託為伊川之說意欲前無古人足以重己之師矣如司馬文正張横渠皆斥以為未至但以康節為數學亦安知所謂數者非伊川之雅言也豈中立定夫亦惑于此歟大諫公反復論之深矣先君之戒則曰張巡許逺同為忠義兩家子弟材智汙下不能明二父之志更相毁于後世故并為退之所貶凡託伊川之說以議吾家學者若子孫可勿報辨博為史官大諫公中子正同為尚書郎尚以世家之故遇博厚為博道公平生之言為詳又出此書俾論著其下博不肖不知大父之學若其淵源不可誣者亦嘗有聞矣然博之言有不敢盡者尚遵先君遺訓云先友周全伯喪嫡母次所生母死疑其為服為位全伯程伊川子婿伊川尚不能決先人問之司馬文正公曰某承問有人居嫡母之喪而所生母卒疑其所以為服及為位之禮按雜記云有三年之練冠則以大功之麻易之又云有父之喪如未没喪而母死其除父之喪也服其除服卒事反喪服雖諸父昆弟之喪如當父之喪其除諸父昆弟之喪也皆服其除喪之服卒事反喪服是先有喪而重有者皆當别為服也又曾子問曰並有喪如之何何先何後孔子曰其葬也先輕而後重其奠及虞先重而後輕此謂遭同月者也今之律令嫡繼慈養與母同例皆應服齊衰三年子之于母嫡庶雖殊情無厚薄固當同服而喪服小記云妾附于妾祖蓋古妾與女君尊卑殊絶設位于他所可也禮者大事先賢不敢輕議況如某詎敢輒以許人姑記所聞以報尚裁為幸予謂文正公之于禮可以為後世法矣故表出之近年洛陽張氏發地得石十數漢蔡伯喈隸尚書禮記論語各已壊缺論語多可辨每語必他出至十數語則曰凡章若干如朝聞道夕死可也如鳯兮鳯兮何而德之衰如執車者為誰子子路曰為孔丘曰是魯孔丘與曰是是知津矣如置其杖而耘等語校今世本為異尚書髙宗饗國百年今世本肆髙宗享國五十有九年為異甚初熹平四年伯喈以經讀遭穿鑿謬妄同馬日磾等以前聞考正自書立石于洛陽太學門下摹寫者日千車乗填塞街陌至隋開皇六年遷其石于長安文字刓泐不可知詔問劉焯劉炫能盡屈羣起之說焯因罹飛章之毁予謂孔子自衛反魯一定詩書之冊至漢熹平六百年有竒已多謬失自熹平至隋開皇又四百年有竒自開皇至今代又五百年有竒其謬失可勝計也耶皆一時通儒之稱伯喈曰然焯炫又曰然可信也按隋史既遷其石于長安今尚有出于洛陽者何哉聞見後錄卷六

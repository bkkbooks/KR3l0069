body:
  text: 聞見後録卷二十四宋邵博撰晁説之以道其姓名蚤列東坡先生薦賢中崇寧初又以應詔言事編部黨者三十暑寒不赦淵聖帝元年起入西掖典制命獨以上輩舊學遇之其初見帝之言亦陳瑩中尊堯之意也曰臣竊以謂善觀聖帝明君成天下之業者不觀其迹而觀其志恭惟神宗皇帝巍巍然之功在天下者孰不覩矣其末年所以為天下後世慮者未易為單見淺聞道也神宗皇帝即位之初卻韓琦論新法之疏至于再三逮琦之薨與兩宫震悼躬製神道碑念之不已每對臣僚稱琦為社稷之臣方即位初時深欲相富弼弼辭以疾退居洛陽弼在洛陽多以手疏論天下大利害皆大臣之所不敢言者神宗欣然開納賜以手札曰義忠言親理正文直茍非意在愛君志存王室何以臻此敢不置之枕席銘諸肺腑終老是戒更願公不替今日之志則天灾不難弭太平可立俟也嘗因王安石有所建明而卻之曰若如此則富弼手疏稱老臣無處告訴但仰屋竊嘆者即當至矣弼之薨神宗躬製祭文有曰言人所難議定大䇿謀施廊廟澤被四方他人莫得而預也又其即位之初也獨以潁邸舊書賜司馬光逮光不願拜樞臣之命而歸洛陽修資治通鑑隨其所進命經筵讀之其讀將盡而所進未至即詔趨之熙寧中初尚淄石硯乃躬擇其尤者賜光其書成賜帶乃如輔臣品數賜之嘗因蒲宗孟論人材乃及光曰未論别只辭樞密一節自朕即位來唯見此一人在元豐末靈武失利神宗當宁慟哭大臣不敢仰視已而嘆曰誰為朕言有此者乃復自發言曰唯吕公著數為朕言之用兵不是好事豈咎公著常争新法不便于熙寧初哉元豐之末將建太子慎求宫僚神宗宣諭輔弼獨得司馬光吕公著二人于王安石吕恵卿何有哉至厭薄代言之臣謂一時文章不足用思復辭賦章惇猶能為蘇軾道上徳音也經筵蔡卞愈為恍惚蕩漾之説上意殊不在逮趙彦若以經侍則皆忠實純朴之言也上聴之喜因問曰安得此説彦若對曰先儒𫝊注臣得以發之上益喜其在政事因韓絳自請前日謬于敷奏之罪乞㫖改正上欣然嘆曰卿不遂非甚好若是王安石則言害臣之道矣元豐末不得已創為户馬之説神宗俯首嘆曰朕于是乎愧于文彦博矣王珪等請宣徳音復曰文彦博頃年争國馬不勝乃奏曰陛下十年後必思臣言珪因奏曰罷去祖宗馬監是王安石堅請行之者本非陛下意也上復嘆曰安石相誤豈獨此一事安石在金陵見元豐官制行變色自言曰計大事安石畧不得與聞安石漸有畏懼上意則作前後元豐行以諂諛求保全也先是安石作詩義序極于諂諛上却之令别撰今所施行者是也神宗聞安石之貧命中使甘師顔賜安石金五十兩安石好為詭激矯厲之行即以金施之定林僧舍師顔因不敢受常例回具奏奏之上諭御藥院牒江寧府于安石家取甘師顔常例安石約吕恵卿無令上知一帖恵卿既與安石分黨乃以其帖上之上問熙河嵗費之實于安石安石諭王韶不必盡數以對韶既叛安石亦以安石言上之不知自昔配饗大臣嘗有形迹如此之𩔖乎安石不學孔子春秋而配饗孔子晩見薄于神宗而配饗神宗無乃為國家政事之累乎神宗一日盡釋市易務禁錮保人在京師者無慮千人逺近聞之罔不手足舞蹈驩喜神宗嘗恨市易法曰百姓家大富者猶不肻圖小利國家何必屑屑如此耶嗚呼上天若賜眷祐神宗更在位數年則市易法之𩔖躬自埽除之不使後日議者紛紛知為謀而不知為聖君之累乎有志之士痛心疾首不能已者政為是也陛下圖治之初近當奉上皇求言之詔逺當成神宗晩嵗之志則天下幸甚洛陽名公卿園林為天下第一靖康以後為祝融回禄盡取以去矣予得李格非文叔洛陽名園記讀之至流涕文叔出東坡之門其文亦可觀如論天下之治亂候于洛陽之盛衰洛陽之盛衰候于園囿之興廢其知言哉故具書之左方云富鄭公園洛陽園池多因隋唐之舊獨富鄭公園最為近闢而景物最勝游者自其第東出探春亭登四景堂則一園之勝景顧可覽而得南渡通津橋上方流亭望紫筠堂而還右旋花木中百餘步走䕃樾亭賞幽臺抵重波軒而止直北走土筠洞自此入大竹中凡謂之洞者皆斬竹丈許引流穿之而徑其上横為洞一曰土筠縱為洞三曰水筠曰石筠曰榭筠歴四洞之北有亭五錯列竹中曰叢玉曰披風曰猗嵐曰夾竹曰兼山稍南有梅臺又南有天光臺臺出竹木之杪遵洞之南而東還有卧雲堂堂與四景堂並南北左右二山背壓通流凡坐此則一園之勝可擁而有也鄭公自還政事歸第一切謝絶賓客燕息此園㡬二十年亭臺花木皆出其目營心匠故逶迤衡直闓爽深密曲有奥思董氏西園董氏西園亭臺花木元不為行列區處疑因景物嵗増月葺所成自南門入有堂相望者三稍西一堂在大池間逾小橋有髙臺一又西一堂竹環之中有石芙蓉水自其花間湧出開軒窗四面甚敞盛夏燠暑不見畏日清風忽來留而不去幽禽間鳴各誇得意盖山林之景而洛陽城中遂得之于此小路抵池池南有堂面髙亭堂雖不宏大而屈曲甚邃游者至此往往相失豈前世所謂迷樓者𩔖也元祐中有留守喜宴集于此董氏東園董氏以財雄洛陽元豐中少縣官錢盡籍入田宅城中二園因蕪壞不治然其規模尚足稱賞東園北鄉入門有栝可十圍實小如松實而甘香過之有堂可居董氏盛時載歌舞游之醉不可歸則宿此數十日南有敗屋遺址獨流杯寸碧二亭尚完西有大池中有堂榜曰含碧水四面噴瀉池中而隂出之故朝夕如飛瀑而池不溢洛人盛醉者登其堂輒醒故俗目為醒酒池環溪環溪王開府宅園其潔華亭者南臨池池左右翼而北過凉榭復匯為大池周回如環故云榭南有多景樓以南望則嵩髙少室龍門大谷層峰翠巘畢効竒于前榭北有風月臺以北望則隋唐宫闕樓臺千門萬户岧嶤璀璨亘十餘里凡左太冲十年極力而賦者可一目而盡也又西有錦㕔秀野臺園中𣗳松檜花木千株皆品别種列除其中為島塢上可張幄各待其盛而賞之凉榭錦㕔其下可坐數百人宏大壯麗洛中無逾者劉氏園劉給事園凉堂髙卑制度適愜可人意有知木經者見云近世建造率務峻立故居者不便而易壞唯此堂正與法合西有臺尤工緻方十許丈地而樓横堂列廊廡回繚欄楯周接木映花承無不妍穩洛人目為劉氏小景今析為二不能與他全園争矣叢春園今門下侍郎安公買于尹氏岑寂而喬木森然桐梓檜柏皆就行列其大亭有叢春亭髙亭有先春亭出荼䕷架上北可望洛水盖洛水自西汹湧奔激而東天津橋者疊石為之直力滀其怒而納之于洪下洪下皆大石底與水争噴薄成霜雪聲數十里予嘗窮冬月夜登是亭聼洛水聲久之覺清洌侵人肌骨不可留乃去聞見後録卷二十四

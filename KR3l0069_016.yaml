  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0069_WYG_016-1a, image: WYG1039/WYG1039-0291a.png}
body:
  text: 聞見後録卷十六宋邵博撰歐陽公乞致仕表云俾其解組官庭還車故里披裘散髪逍遙垂盡之年鑿井耕田歌詠太平之樂客有面嘆其工緻平淡者公曰也不如老蘇秀才有田一門里足以為養行年五十復將何求盖蘇明允謝官牋中語公愛之尚不忘耳予見司馬文正手寫歐陽公青州不俵秋料青苗錢放罪謝表戒小人之遂非希君子之改過二語文正喜其工邪抑以遂非改過為不然也如文正力詆青苗等事免樞近出帥長安謝表則云雖復失位危身終不病民害國本朝四六以劉筠楊大年為體必謹四字六字律令故曰四六然其敝𩔖俳語可鄙歐陽公深嫉之曰今世人所謂四六者非脩所好少為進士時不免作自及第遂棄不作在西京佐三相幕府于職當作亦不為作也如公之四六云造謗于下者初若含沙之射影但期隂以中人宣言于廷者遂肆鳴梟之惡音孰不聞而掩耳俳語為之一變至蘇東坡干四六如曰禹治兖州之野十有三載乃同漢築宣防之宫三十餘年而定方其決也本吏失其防而非天意及其復也盖天助有徳而非人功其力挽天河以滌之偶儷甚惡之氣一除而四六之法則亡矣梅聖俞著碧雲騢永昭陵時名下大臣惟杜祁公富鄭公韓魏公歐陽公無貶外悉譏詆之無少避其序曰碧雲騢廏馬也莊憲太后臨朝以賜荆王王惡其旋毛太后知之曰旋毛能害人邪吾不信留以備上閑為御馬第一以其吻肉色碧如霞片故號云世以旋毛為醜此以旋毛為貴雖貴矣病可去乎噫范文正公者亦在詆中以文正微時常結中書吏人范仲尹因以破家文正既貴畧不收䘏王銍性之不服以為魏泰偽託聖俞著此書性之跋范仲尹墓誌云近時襄陽魏泰者場屋不得志喜偽作他人著書如志怪集括異志倦遊録盡假名武人張師正又不能自抑出其姓名作東軒筆録皆用私喜怒誣衊前人最後作碧雲騢假名梅聖俞毁及范文正公而天下駭然不服矣且文正公與歐陽公梅公立朝同心詎有異論特聖俞子孫不耀故挾之借重以欺世今録楊闢所作范仲尹墓誌庶幾知泰亂是非之實至此也則其他泰所厚誣者皆迎刃而解可盡信哉僕猶及識泰知其從來最詳張而明之使百世之下文正公不蒙其謬焉潁人王銍性之題予以為不然亦書其下云美哉性之之意也使范公不蒙其謬聖俞亦不失為君子矣然聖俞蚤接諸公名聲相上下獨窮老不振中不能無躁其聞范公訃詩一出屢更郡人皆望酒壺俗情難可學奏記向來無貧賤常甘分崇髙不解諛雖然門館隔泣與衆人俱夫為郡而以酒悦人樂奏記納諛佞豈所以論范公者聖俞之意真有所不足邪如著文公燈籠錦事則又與書竄詩合矣故予疑此書實出于聖俞也有童子問予東坡梅花詩玉奴終不負東昏按南史齊東昏侯妃潘玉兒有國色牛僧孺周秦行記薄太后曰牛秀才逺來誰為伴潘妃辭曰東昏侯以玉兒身亡國除不擬負他注云玉兒妃小字東坡正用此事以玉兒為玉奴誤也又過岐亭陳季常詩不見盧懐慎烝壺似烝鴨按盧氏雜記鄭餘慶約客食戒中厨爛烝去毛勿抅項折客為烝鵞鴨既就食各置烝壺蘆一枚于前則烝壺似烝鴨者鄭餘慶非盧懐慎亦誤也又送子由出疆詩憶昔庚寅降屈原旋看蠟鳳戲僧虔按南史王曇首内集聽子孫為戲僧達跳地作虎子僧䖍累十二博碁不墜落僧綽采蠟燭作鳳皇則以蠟鳳戲者僧綽非僧虔亦誤也又和徐積詩殺雞未肯邀季路裹飯應須問子來按莊子子輿與子桑友而霖雨十日子輿曰子桑殆疾矣裹飯往食之則裹飯者子輿非子來亦誤也又謝黄師是送酒詩偶逢元放覔柱杖不覺麴生來坐隅檢左慈元放傳無柱杖酒事按抱朴子列仙傳孔元方毎飲酒以柱杖卓地倚之倒其身頭在下足在上則柱杖酒事乃孔元方非左元放亦誤也又和李邦直詩恨無楊子一區宅嬾卧元龍百尺樓按陳登字元龍許汜與劉備在劉表坐表與備共論天下人汜曰陳元龍湖海之士豪氣不除備問汜寧有事邪汜曰昔過下邳見元龍元龍無客主之意久不相與語自上大牀卧使客卧下牀備曰君有國士之名今天下大亂無救世之意而求田問舍言無可采是元龍所諱也何當與君語如小人欲卧百尺樓上卧君于地何止上下牀之間邪表大笑則百尺樓者劉備非元龍亦誤也又豆粥詩溼薪破竈自燎衣饑寒頓解劉文叔按漢史王郎起光武自薊東南馳至南宫縣遇大風雨引車入道旁空舍馮異抱薪鄧禹爇火光武對竈燎衣馮異進麥飯非豆粥若蕪蔞亭豆粥則無溼薪破竈燎衣等事亦誤也又和劉景文聽琵琶詩猶勝江左狂靈運共鬭東昏百草鬚按唐劉夢得嘉話晉謝靈運美鬚臨刑施為南海祗洹寺維摩塑像鬚寺人寳惜初無虧損至中宗朝安樂公主五日鬭百草欲廣物色令馳驛取之又恐為他所得盡棄其餘則以靈運鬚鬭百草者唐安樂公主非齊東昏侯亦誤也又㑹獵詩不向如皋閑射雉歸來何以得卿卿按左傳昭公二十八年賈大夫娶妻美御以如皋射雉獲之杜氏注為妻御之皋澤則如當訓之非地名亦誤也又海市詩潮陽太守南遷歸喜見石廩堆祝融按韓退之謁衡嶽詩紫盖連延接天柱石廩騰擲堆祝融又云竄逐蠻夷幸不死故以為退之遷潮陽歸日作是未詳退之先謫陽山令徙掾江陵日委舟湘流往觀衡嶽之語乃云潮陽太守南遷歸亦誤也周詩大姒嗣徽音者大姒嗣大任耳大任于大姒君姑也有嗣之義司馬文正行狀二聖嗣位哲宗于神廟為子曰嗣位則可宣仁后于神廟為母曰嗣位則不可亦誤也又二疏贊孝宣中興以法馭人殺盖韓楊盖三良臣先生憐之振袂脱屣使知區區不足驕士三良臣謂盖寛饒韓延夀楊惲也意以孝宣殺此三人故二疏去之耳按漢史孝宣地節三年疏廣為皇太子太傅兄子受為少傅至元康四年俱謝病去後二年當神雀二年九月司𨽻校尉盖寛饒下有司自殺又三年當五鳳元年十二月左馮翊韓延夀棄市又一年當五鳳二年十二月平通侯楊惲要斬皆在二疏去之後以二疏因殺三人而去者亦誤也佛書日月髙懸盲者不見日喻眇者不識日眇能視非盲也豈不識日亦誤也又序謝自然欲過海求師或謂蓬萊隔弱水三萬里不可到天台有司馬子微身居赤城名在絳闕可往從之自然可還授道于子微白日仙去按子微以開元十五年死于王屋山自然生于大厯五年至貞元十年仙去是子微死四十三年自然始生乃云自然授道于子微亦誤也東坡信天下後世者寧有誤邪予應之曰東坡累語千百尚信天下後世也童子更曰有是言凡學者之誤亦許矣予曰爾非東坡奈何程文簡公父元白官止縣令以文簡貴贈太師𩔖無可書歐陽公追作神道碑至九百餘言世以為難韓忠獻公曾祖惟古無官以忠獻貴贈太保益無可書李邦直追作神道碑至三百餘言其文無一賸語世尤以為難也吕獻可以追尊濮園事擊歐陽公如曰具官某首開邪議妄引經證以枉道悦人主以近利負先帝者凡十四章具載獻可奏議中司馬文正作序乃首載歐陽公諫臣論以為誠言文正之意以獻可能盡歐陽公所書諫臣之事使歐陽公無得以怨歟抑以歐陽公但能言之獻可實能行之也不然獻可排歐陽公為邪反以歐陽公之論序獻可之奏又以為誠言可乎歐陽公晚著濮議一書專與獻可諸公辨獨歸過獻可為甚矣孔子自謂不及顔回曹孟徳祭橋𤣥文云爾東坡醉白堂記亦云宋元王二年江使神龜使于河至于泉陽漁者豫且舉網得之龜來見夢于宋元王夢見一丈夫延頸而長頭衣𤣥繡之衣而乘輜車云云出史記龜策列傳韓退之孟東野失子詩云東野夜得夢有夫𤣥衣巾實用此事東坡既遷黄崗京師盛傳白日仙去神廟聞之對左丞蒲宗孟嘆惜久之故東坡謝表有云疾病連年人皆相傳為已死饑寒併日臣亦自厭其餘生也曾南豐讀歐陽公晝錦堂記來治于相真州東園記泛以畫舫之舟二語皆以為病聞見後録卷十六

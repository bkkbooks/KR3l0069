body:
  text: 聞見後録卷二十六宋邵博撰客有云昔罷兖州掾曹與一二友人祠岱嶽因登絶頂行四十里宿野人之廬前有藥竈地多鬼箭天麻𤣥參之類約五鼓初各杖䇿而東僅一二里至大平頂叢木中有真廟東封壇遺址擁褐而坐以伺日出久之星斗漸稀東望如平地天際已明其下則暗又久之明處有山數峰如卧牛車蓋之狀星斗盡不見其下尚暗初意日當自明處出又久之自大暗中日輪湧出正紅色騰起數十丈半至明處郤半有光全至明處即全有光其下亦尚暗日漸高漸辨色度五鼓三四㸃也經真廟帳宿之地石上方柱窠甚多又經龍口泉大石有罅如龍哆其口水自中出又經天門十八盤尤聳秀北眺青齊諸山可指數信天下之偉觀也客又言兖州之東曲阜城魯國也孔子廟宅在焉庭中二檜各十數圍東者紋左旋西者紋右旋世𫝊孔子手植也殿前有壇魯恭王所壞堂基也城北即孔林其中有亭真廟駐蹕之地西北隅孔子墓東北隅伯魚墓正北子思墓孔氏云商人尚左故孔子墓在西也舊說武都紫泥用封璽故詔有紫泥之名今階州故武都也山水皆赤為泥正紫色然泥安能作封當是用為印色耳又說武都為武王采地文成康三州亦三王采地也皆因以得名雖無經見其𫝊亦古矣趙復言昔往來豐沛間甚熟漢高帝宅與盧綰宅相鄰俱即以祠之行平衍之地山原迤邐求所謂豐西之澤芒碭之澤皆無之亦無遺迹與史所著不合蜀號天險秦以十月取之後唐以七十五日取之本朝以六十六日取之豫過武功唐高祖宅昔號慶善宫今為佛祠前向渭水史載太宗生之日有二龍戲于門外此地也形勢殊逼仄蘇世長云臣昔侍陛下于武功見所居宅僅庇風雨者有唐二帝紵漆像不知何帝也游景叔得唐本太宗畫于屋壁極竒偉與世所𫝊不同也天下州名俗呼不正者有二一處州舊為括州唐德宗立當避其名適處士星見分野故改為處州音楮今俗誤為處所之處矣洋州乃汪洋之洋音楊今俗誤為詳略之詳矣上自朝省下至士大夫皆云爾無能正之者今道州古之有庳獠夷所處實荒服也曰舜之于象封之非放也象不得有為于其國使吏治其國而納其貢稅焉皆孔子所不言有庳距舜之都平陽越在江湖萬里之外如曰欲常常而見源源而來亦勞矣但出于孟子也韓子曰象為弟而舜殺之通鑑外紀筆之不削云䕫州古名朐䏰朐音蠢又音劬䏰如尹反又音忍蚯蚓也至今其地多此物春秋時人苦寒熱疾謂之蚯蚓瘴云鳯翔府園有枯槐一株故老云昭宗扶此𣗳令朱全忠結襪四顧無應者故至今謂手托槐云沈黎武侯駐兵之壘城壁尚存中有武侯祠敗屋數椽雜他土木鬼神甚不典豫為州按本書更作之刻石以記又榜其廡下記文多不著榜云黎州據本州縣士民狀伏見漢大丞相武侯諸葛公其操節之大足以師表天下後世不但有功于蜀之一邊也廟于州之武侯城中古矣今即其地更作益嚴冝有約束庶幾不致瀆慢有神隳壞前制者謹按蜀本書大丞相元子侍中尚書僕射軍師將軍諱瞻本朝一有善政雖不出其議民必歡言吾葛侯所為也其慕如此鄧艾下蜀遣使遺以書曰若降表為琅琊王將軍斬使者率其子尚大呼摶戰以死君子曰外不負其國內不愧其家忠孝兩有焉今大丞相廟以將軍配又按漢晉春秋蜀大丞相諸葛公南征夷有孟獲者豪健莫敵公七擒七縱之獲始歎曰公天威也夷不復反矣今以天威名公之堂寫丞相府從事將佐自鎮南大將軍馬公忠以下十人于堂中又按大丞相文集丞相南征詔賜金鈇鉞一曲蓋一前後羽葆鼓吹各一部虎賁六十人今并寫于廡下惟唐南康王韋公臯太尉李公德裕舊分祠于大丞相廟庭以其各有功于一邊得不廢外此輒休他叢祠妄以土木丹青塑畫鬼神等物者當從州縣按舉置于理右版榜廟中以示方來無致違戾秦州伏羌城三都各有曹瑋武穆與羌酋李遵戰勝之地羌人到今畏懾不敢耕草木彌望武穆以六月二十日生邦人遇其日大作樂祭于其廟云唐昭宗為朱全忠劫遷洛陽至陜以何皇后臨蓐留青蓮佛寺行宫全忠怒逼行甚急今寺中佛坐蓮花葉上有當時宫人書願皇后早降生墨色如新先人宰陜之芮城縣一村落皆李氏蓋唐之遺族高祖微時嘗居其地有故宅基民收高祖詔書十數紙皆免賦役事每云不得欺壓百姓豫舊有録本近失去今歸州屈沱屈原舊居也世𫝊原有姊以原施行不與衆合以見流放棄之獨歸故歸州又曰秭歸𡊮嵩云姊秭古字通用與原女嬃之嬋媛兮申申其詈余之語合歸州有昭君村村人生女無美惡皆灸其面白州有緑珠村舊井尚存或云飲其水生美女村人竟以瓦石實之豈亦以二女子所遭為不祥邪浙人謂富家為起早蓋言錢多則事多不能晏眠也雖俗下之語亦有理云紹聖元年咸陽縣民段吉夏日凌曉雨後粥菜村落中立何人門足陷地得玉璽一玉檢玉璽方四寸文如鳯鳥魚龍之形曰受命于天既受永昌按玉璽記秦始皇得卞氏藍田玉刻以為璽命丞相李斯文云云又王莽逼元后取璽后投之地故一角缺驗之皆合唯記云玉色黃此青蒼色耳蓋漢高祖至霸上子嬰素車降軹道所上者世世𫝊受號曰𫝊國璽董卓徙都關孫堅入洛得于城南井中至梁朱全忠後始失所在全忠以下多都汴洛今璽尚出于秦又云背亦刻受天之命皇帝夀昌八字則無之又不云有玉檢為異有司來上庭議以為瑞改元元符命段吉以官至靖康國破敵取以去矣和氏玉見藺相如語中璧地其可刻以為璽邪宣和元圭出王懿恪家舊上有懿恪朱書元圭二字或上之以為真夏后氏之瑞後復燕山又得一元圭尤竒古非前圭可比朝廷以先既行盛禮不應再有出者藏之內庫不復問至金人起後圭磨改副衮冕奉其主前圭亦取去然竇建德以獲元圭故國號夏不知二圭果何代物也紹聖初先人官長安府于西城漢高祖廟前賣湯餅民家得一白玉奩高尺餘遍刻雲氣龍鳯蓋為海中神山足為叨餮實三代寶器府上于朝批其狀云墟墓之物不可進御當籍收官庫尚遵祖宗典制也至政和中先人再官長安問之已失所在矣楚氏洛陽舊族元輔者為豫言家藏一黑水晶枕中有半開繁杏一枝希代之寶也初避冦入潁陽凡先世竒玩悉棄之獨負枕以行冦勢逼亦棄于山谷中文序世言潞公有白玉盆徑尺餘三足破貝州時仁皇帝賜也常用以貯酒後納之壙中云中隱王正叔云王仲至帥長安日境中壞一古冡有碧色大瓷器容水一斛中有白玉嬰兒高尺餘水故不耗敗如新汲者玉嬰兒為仲至取去聞見後録卷二十六

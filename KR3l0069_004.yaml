body:
  text: 聞見後錄卷四宋邵博撰司馬文正公作文中子補傳曰文中子王通字仲淹河東龍門人六代祖𤣥則仕宋歴太僕國子博士兄𤣥謨以將畧顯而𤣥則用儒術進𤣥則生煥煥生虯齊髙帝將受宋禪誅𡊮粲虯由是北奔魏魏孝文帝甚重之累官至并州刺史封晉陽公諡曰穆始家河汾之間虯生彦官至同州刺史彦生傑官至濟州刺史封安唐公諡曰獻傑生隆字伯髙隋開皇初以國子博士待詔雲龍門隋文帝嘗從容謂隆曰朕何如主隆曰陛下聰明神武得之于天發號施令不盡稽古雖負堯舜之資終以不學為累帝黙然有間曰先生朕之陸賈也何以教朕隆乃著興衰要論七篇奏之帝雖稱善亦不甚達也歴昌樂猗氏銅川令棄官歸教授卒于家隆生通自𤣥則以來世傳儒業通幼明悟好學受書于東海李育受詩于㑹稽夏璵受禮于河東關朗受樂于北平霍汲受易于族父仲華仁夀三年通始冠西入長安獻太平十二䇿帝召見嘆美之然不能用罷歸尋復徵之煬帝即位又徵之皆稱疾不至專以教授為事弟子自逺方而至者甚衆乃著禮論二十五篇樂論二十篇續書百有五十篇續詩三百六十篇元經五十篇賛易七十篇謂之王氏六經司徒楊素重其才行勸之仕通曰汾水之曲有先人之敝廬足以庇風雨薄田足以具􅊡粥願明公正身以治天下使時和年豐通也受賜多矣不願仕也或譛通于素曰彼實慢公公何敬焉素以問通通曰使公可慢則僕得矣不可慢則僕失矣得失在僕公何與焉素待之如初右武侯大將軍賀若弼嘗示之射發無不中通曰美哉藝也君子志道據德依仁然後游于藝也弼不恱而去通謂門人曰夫子剛而愎難乎免于今之世矣納言蘇威好畜古器通曰昔之好古者聚道今之好古者聚物太學博士劉炫問易通曰聖人之于易也没身而已矣況吾儕乎有仲長子光者𨼆于河渚嘗曰在險而運竒不若宅平而無為通以為知言曰名愈消德愈長身愈退道愈進若人知之矣通見劉孝標絶交論曰惜乎舉任公而毁也任公不可謂知人矣見辨命論曰人事廢矣弟子薛收問恩不害義儉不傷禮何如通曰是漢文之所難也廢肉刑害于義省之可也衣弋綈傷于禮中焉可也王孝逸曰天下皆争利而棄義若之何通曰捨其所争取其所棄不亦君子乎或問人善通曰知其善則稱之不善則對曰未嘗與久也賈瓊問息謗通曰無辨問止怨通曰不争故其鄉人皆化之無争者賈瓊問羣居之道通曰同不害正義不傷物古之有道者内不失真外不殊俗故全也賈瓊請絶人事通曰不可瓊曰然則奚若通曰莊以待之信以應之來者勿拒去者勿追沈如也則可通謂姚義能交或曰簡通曰兹所以能也又問廣通曰廣而不濫兹又所以為能又謂薛收善接小人逺而不疎近而不狎頽如也通嘗曰封禪非古也其秦漢之侈心乎又曰美哉周公之智深矣乎寧家所以安天下有我所以厚蒼生也又曰易樂者必多哀輕施者必好奪又曰無赦之國其刑必平重斂之國其財必貧又曰亷者常樂無求貪者常憂不足也又曰我未見得誹而喜聞譽而懼者又曰昏而論財夷狄之道也又曰居近而識逺處今而知古其惟學乎又曰輕譽茍毁好憎而尚怒小人也又曰聞謗而怒者䜛之階也見譽而喜者佞之媒也絶階去媒讒佞逺矣通謂北江黄公善醫先飲食起居而後鍼藥謂汾隂侯生善筮先人事後爻象大業十年尚書召通蜀郡司户十一年以著作郎國子博士徵皆不至十四年病終于家門人諡曰文中子二子福郊福疇二弟凝績評曰此皆通之世家及中說云爾𤣥謨仕宋至開府儀同三司績及福疇之子勔勮勃皆以能文著于唐世各有列傳余竊謂先王之六經不可勝學也而又奚續焉續之庸能出于其外乎出則非經矣茍無而續之則贅也奚益哉或曰彼商周以往此漢魏以還也曰漢魏以還遷固之徒記之詳矣奚待于續經然後人知之必也好大而欺愚乎則彼不愚者孰肯從之哉今其六經皆亡而中說猶存中說亦出于其家雖云門人薛收姚義所記然予觀其書竊疑唐室既興凝與福疇輩並依時事從而附益之也何則其所稱朋友門人皆隋唐之際將相名臣如蘇威楊素賀若弼李德林李靖竇威房𤣥齡杜如晦王珪魏徵陳叔達薛收之徒考諸舊史無一人語及通名者隋史唐初為也未嘗載其名于儒林𨼆逸之間豈諸公皆忘師棄舊之人乎何獨其家以為名世之聖人而外人皆莫之知也福疇又云凝為監察御史劾奏侯君集有反狀太宗不信之但黜為姑蘇令大夫杜淹奏凝直言非辜長孫無忌與君集善由是與淹有隙王氏兄弟皆抑不用時陳叔達方撰隋史畏無忌不為文中子立傳按叔達前宰相與無忌位相埒何故畏之至没其師之名使無聞于世乎且魏徵實總隋史縱叔達曲避權威徵肯聽之乎此予所以疑之也又淹以貞觀二年卒十四年君集平髙昌還而下獄由是怨望十七年謀反誅此其前後參差不實之尤著者也如通對李靖聖人之道曰無所由亦不至彼大道之方也必也無至乎又對魏徵以聖人有憂疑退語董常以聖人無憂疑曰心迹之判久矣皆流入于佛老者也夫聖人之道始于正心修身齊家治國至于安萬邦和黎民格天地遂萬物功施當時法垂後世安在其無所至乎聖人所為皆發于至誠而後功業被于四海至誠心也功業迹也奚為而判哉如通所言是聖人作偽以欺天下也其可哉又曰佛聖人也西方之教也中國則泥又詩書盛而秦世滅非仲尼之罪也虚𤣥長而晉室亂非老莊之罪也齋戒修而梁國亡非釋迦之罪也茍為聖人矣則推而放諸南海而準推而放諸北海而準烏有可行于西方而不可行于中國哉茍非聖人矣則泥于中國獨不泥于西方耶秦焚詩書故滅使詩書之道盛于秦安得滅乎老莊貴虚無而賊禮法故王衍阮籍之徒乗其風而鼔之飾談論恣情欲以至九州覆没釋迦稱前生之因果棄今日之仁義故梁武帝承其流而信之嚴齋戒弛政刑至于萬姓塗炭發端倡導者非二家之罪而誰哉此皆議論不合于聖人者也唐世文學之士傳道其書者蓋寡獨李翺以比太公家教及司空圖皮日休始重之宋興栁開孫何振而張之遂大行于世至有真以為聖人可繼孔子者余讀其書想其為人誠好學篤行之儒者也其自任太重其子弟譽之太過更使後之人莫之敢信也余恐世人譏其僣而累其美故采其行事于理可通而所言切于事情者著于篇以補隋書之缺傳成文正公問予大父康節何如康節賛之曰小人無是當世已棄君子有非萬世猶譏錄其所是棄其所非君子有歸因其所非棄其所是君子幾希惜哉仲淹夀不永乎非不廢是瑕不掩瑜雖未至于聖其聖人之徒歟文正自茲數言文中子故又特書于通鑑語中然文正疑所稱朋友門人皆隋唐之際將相名臣如蘇威楊素賀若弼李徳林李靖竇威房𤣥齡杜如晦王珪魏徵陳叔達薛收無一人語及通姓名者又疑其子弟譽之太過又疑唐世文學之士傳道其書者蓋寡獨李翺以比太公家教及司空圖皮日休始重之予得唐文人劉禹錫言在隋朝諸儒惟王通能王道𨼆白牛谷游其門者皆天下俊傑著書于家没諡曰文中子則蘇威公等實其朋友門人無疑非子弟譽之太過無疑不但司空圖皮日休重其書亦無疑也禹錫之言豈文正偶不見耶文正又傳康節之賛則未行于世予故表出之程伊川亦曰文中子格言前無荀卿揚雄也予家舊藏司馬文正公隸書無為賛按公傳家集無之曰為黄老者以心如死灰形如槁木為無為迂叟以為不能作無為賛曰治心以正保躬以静進退有義得失有命守道在己成功則天為者敗之不如自然章子厚在丞相府顧坐客曰延安師章質夫因板築發地得大竹根半已變石西邊自昔無竹亦一異也客皆無語先人獨曰天地回南作北有幾矣公以為今日之延安為自天地以來西邊乎子厚太息曰先生觀物之學也蓋子厚蚤出康節門下也張發退之詩云魯論未訖注手足今㣲茫是退之嘗有論語傳未成也今世所傳如宰予晝寢以晝作畫字子在齊聞韶三月不知肉味以三月作音字浴乎沂以浴作沿字至為淺陋程伊川皆取之何耶又子畏于匡顔淵後曰吾以爾為死矣曰子在囘何敢死死字自有意義伊川之門人改云子在回何敢先學者類不服也吕汲公當遷祕書丞乞用其官易母封邑朝廷從之中外以為美事獨劉敞原父曰禮父為士子為大夫葬以士祭以大夫蓋不敢以己貴而加諸親也今君之舉孝矣于禮若戾奈何又法未當封亦非所以尊之也公聞之嘆服自以為不及終身重敬原父之學楚州徐積有孝行東坡諸公特敬禮之初積學于胡瑗瑗門人甚衆一日獨召積食于中堂二女子侍立積問瑗門人或問見侍女否將何以對瑗曰莫安排積聞此一語忽大省悟其學頓進云子張疑髙宗諒隂三年子思不聽其子服出母子游為異父兄弟服大功子夏謂服齊衰孔子没門人疑其服洙泗之上親從孔子學禮者尚如此故三年之喪鄭云二十七月王云二十五月改葬之服鄭云服緦三月王云葬訖而除繼母出嫁鄭云皆服王云從子繼寄育乃為之服無服之殤鄭云子服一月哭之一日王云以哭之日易服之月諸儒之議紛辨不齊也蓋摯虞之太息者予表出之以見末世多諱于喪禮易失難明為甚聞見後錄卷四

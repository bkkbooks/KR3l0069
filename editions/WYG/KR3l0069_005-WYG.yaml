  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0069_WYG_005-1a, image: WYG1039/WYG1039-0235a.png}
body:
  text: 聞見後錄卷五宋邵博撰唐以前文字未刻印多是寫本齊衡陽王鈞手自細書五經置巾箱中巾箱五經自此始後唐明宗長興二年宰相馮道李惠請令判國子監田敏校正九經刻板印賣朝廷從之雖極亂之世而經籍之傳甚廣予曽大父遺書皆長興年刻本委于兵火之餘僅存儀禮一部世傳王氏元經薛氏傳關子明易李衛公問對皆阮逸擬作逸嘗以私稿示蘇明允也晁以道云逸才辨莫敵其擬元經等書以欺一世之人不難也予謂逸後為讎家告立泰山石枯上林栁之句編竄抵死豈亦有隂譴耶說文云姓人所生也古之神聖之人其母感天而生故從女又古姓姚媯姬姜之屬皆從女者其義甚異典籍難著云伊川之學以誠敬為本其傳震驚百里不喪匕鬯曰動之大者莫如雷故以雷言之震驚百里其威逺也人之致其誠敬莫如祭祀匕以載鼎實升于爼鬯以灌地而降神方其酌灌以求神薦牡而祈享盡其誠敬之心雖雷震之威不能使之懼而失守也故云不喪匕鬯夫臨大震懼能安而不自失者惟誠敬而已誠敬最善予故表出之伊川說納約自牖曰約所以進結其君之道也自牖因其明也牖所以通内外之象也人臣以忠信善道結于君心必自其所明處乃能入也人心有所蔽有所通所蔽者闇處也所通者明處也就其明處而告之則易也自古能諫其君未有不因其所明者也張子房之于漢是也髙祖以戚姬故將易太子是其所蔽也言而不察何四老人者髙祖素知其賢而重之此其不蔽之明心故因其所明而及其事則悟之如反掌且四老人之力孰與子房周昌叔孫通然不從彼而從此者就其蔽與就其明之異耳且不論易之義當否于理則善矣故表出之古易卦爻一彖二象三文言四繫辭五說卦六序卦七雜卦八其次第不相雜也先儒謂費直專以彖象文言㕘解易爻今入彖象文言于卦下者自費氏始孔穎達又謂王輔嗣之意象本釋經宜相附近分爻之象故各附當卦蓋古易已亂于費氏又亂于王氏也予家藏大父康節手寫百源易實古易也百源在蘇門山下康節讀易之地舊祕閣亦有本程伊川說黄裳元吉婦居尊位女媧氏武氏是也非常之變不可言也故有黄裳元吉之戒如武氏之變固也女媧不見于書果有煉石補天之事亦非變也不言漢吕氏獨非變耶蘇仲虎則曰伊川在元祐時以罷逐故為此說以詆垂簾之政予不敢以為然彼黍離離彼稷之苗王氏解視黍而謂之稷者憂而昏也程氏解彼黍者我稷之苗也校先儒平易明白之說固為穿鑿云書伊訓曰成湯既没太甲元年文義甚嚴無簡冊斷缺之迹孟子獨曰成湯之下外丙二年仲壬四年始為太甲果然則伊尹自湯以來輔相四代何在湯在太甲弛張如此在外丙在仲壬絶不書一事也考于厯若湯之下増此六年至今之日則羨而不合矣司馬遷皇甫謐劉歆班固又因孟子而失也獨孔安國承其家法不變蓋詩書之外孔子不言者予不敢知也東坡書上清宫碑云道家者流本于黄帝老子其道以清浄無為為宗以虚明應物為用以慈儉不争為行合于周易何思何慮論語仁者静夀之說如是而已謝顯道親見程伊川誦此數語以為古今論仁最有妙理予官中祕時陳瑩中諸子出瑩中荅楊中立辨伊川不論先天之學書因以予舊見伊川從弟穎出伊川之書盈軸必勉以熟讀王介甫易說云云跋下方士為伊川之學者曰吾師易學何王氏足言譁然不服欲我擊也欲更與之辨則舊謄穎所出伊川之書亡矣近守眉山有程生者出伊川貽其外大父金堂謝君書在晩謫涪陵時猶勉以學易當自王介甫也錄之將示前日以不信遇我者頥啓前月末吳齋郎送到書信急遞中奉報計半月方達冬寒逺想動履安和僑居旋為客次日以延望乃知止行甚悒也來春江水穏善候有所授能一訪甚佳只云忠涪間看親人必不疑也頥偕小子甚安來春本欲作春秋文字以無此書故未能卻先了論孟或禮記也春秋大義數十皎如日星不容遺亡只恐㣲細義例老年精神有所漏落且請推官用意尋究後日見助如往年所說許止蔡般書𦵏類是也若欲治易先尋易繹令熟只看王弼胡先生王介甫三家文字令通貫餘人易說無取枉費功年亦長矣宜汲汲也未相見間千百慎愛十一月初九日頥啓知縣推官春秋書魯文公毁泉臺公羊曰譏之曰先君為之而已毁之不如勿居也靖康初政盡毁宣和中所作離宫别苑宰相不學之舉非上意也康節手冩易書詩春秋字端勁無一誤失胄子之賢者其謹藏之勿替范淳甫内翰邇英講禮至儗人必于其倫曰先儒謂儗君于君之倫儗臣于臣之倫特其位而已如桀紂人君也謂人為桀紂必不肯受孔顔匹夫也謂人為孔顔必不敢受東城深嘆其得勸講之體程伊川易傳得失未議示不過辭也故為鄙近然亦辭也在康節時于先天之易非不問不語之也後伊川之人數為妄争舊于陳瑩中報楊中立游定夫書辨其畧矣并列之下方以遺知言之君子陳瑩中荅楊中立游定夫書康節云先天圖心法也圖雖無文吾終日言未嘗離乎是故其詩曰身在天地後心在天地先天地自我出自餘惡足言又云數往者順知來者逆此一節直解圖意如逆之四時之化也然則先天之學以心為本其在經世者康節之餘事耳世學求易于文字至語皇極其或以為考數之書康節詩云自從三度絶韋編不讀書來十二年俯仰之間無所愧任人謗道是神仙同時者目其人為神仙後來者名其書為考數皆康節之所不憾也乃其心則務三聖而已矣觀物云起震終艮一節明文王之八卦也天地定位一節明伏羲之八卦也蓋先天之學本乎伏羲而備于文王故其詩曰天地定位否泰反類山澤通氣咸損見義雷風相薄恒益起意水火相射既濟未濟四象相交成十六事八卦相慿為六十四八卦者易之小成也六十四卦者易之大成也集伏羲文王之事而成之者非孔子而誰乎康節嘗謂孟子未嘗及易一字而易道存焉但人見之者鮮又曰人能用易是為知易若孟子可謂善用易者也夫易窮則變變則通通則久故聖人之用易闔闢于未然變其窮而通之也若夫暑之窮也變而為寒寒之窮也變而為暑則是自變而自通者也窮自變通自復何賴于聖人乎孔子賛易而非與易競孟子用易而語不及焉此所謂賢者識其大者其去聖人之用也不為逺矣然而或非太𤣥為覆瓿之書或躋孟子于既聖之列私論害公義有所在闔此于未然豈乏人哉奈何其無益也觀物云防乎其防邦家其長子孫其昌是以聖人重未然之防是謂之易之大綱而其論孔子所以盡三才之道者則曰行無轍迹至妙至妙在一動一静之間而已矣闡先天之幽㣲先天之顯不在康節之書乎雖在康節之書而書亦不足以盡其奥也故司馬文正與康節同時友善而未嘗有一言及先天學其著家範本于家人一卦而進取王弼之說今之說易者方且厭常出竒離日用而鑿太空也又或謂文正公擬先天之學豈足以語二公弛張之意乎二公不可得而見矣瓘徒見其書而欲闚其心然乎否耶當先覺之任者願賜一言庶幾終可以無大過也聞見後錄卷五

body:
  text: 聞見後録卷二十宋邵博撰仁皇帝問王懿敏素曰大僚中孰可命以相事者懿敏曰下臣其敢言帝曰姑言之懿敏曰唯宦官宫妾不知姓名者可充其選帝憮然有間曰唯富弼耳懿敏下拜曰陛下得人矣既告大庭相富公士大夫皆舉笏相賀或密以聞帝益喜曰吾之舉賢于夢卜矣神宗問周世宗何如馮公京曰世宗威勝于徳故享國不永王荆公曰世宗之殂逺邇哀慕非無徳也荆公率以强辨勝同列不知馮公之對迺藝祖之語見三朝寳訓云王荆公初參政事下視廟堂如無人一日爭新法怒目諸公曰君輩坐不讀書耳趙清獻同參政事獨折之曰君言失矣如臯䕫稷契之時有何書可讀荆公黙然憲成李公及為杭州不游宴一日遇雪命促飲具郡僚不無意于歌舞髙㑹也乃訪林和靖于孤山清談同賞又日飲食外不市一物至去官唯買白樂天集一部𫝊獻簡公云司馬文正公力辭樞近嘗勉以主上眷意異等得位庶可行道道不行去之可也公正色曰古今為此名位所誘􅉛喪名節者不少矣卒辭不就文潞公曰司馬君實操行直當求之古人中也傅獻簡與杜祁公取未見石刻文字二本皆踰千言各記一本祁公再讀獻簡一讀覆誦之不差一字祁公時年踰七十矣光禄丞趙樞在坐見之韓魏公文潞公先後鎮北門魏公時朝城令杖一守把兵方二下兵輒悖罵不已令以送府公問兵實悖令否曰實曰汝禁兵既在縣有役則有階級矣即判送狀領赴市曹處斬從容平和如常時衆見其投判筆方知有異潞公時復有外縣送一兵犯如前者公震怒問虛實兵以實言亦判送狀處斬擲其筆二公之量不同魏公則彼自犯法吾無怒焉潞公異禀雄豪姦惡不容也劉器之為韓瓘云東坡論張文定以一言曰大曰惟天為大惟堯則之天下未嘗一日無士而仁宗之世獨為多士者以其大也賈誼嘆細徳之嶮微知鳳鳥之不下閔溝瀆之尋常知吞舟之不容傷時無是大者以容已也盖天下大器也非力兼萬人其孰能舉之非仁宗之大其孰能容此萬人之英乎世以為知言神宗嘗問文定識王安石否曰安石視臣大父行也臣見其大父日安石髮未丱衣短褐布身瘡疥役灑埽事一蒼頭耳故荆公亦畏其大不敢與之爭辨日録中盡詆前輩諸公獨于文定無譏云劉器之曰吾從司馬公五年得一語曰誠請問其目則曰誠者天之道思誠者人之道至臻其道則一也又問所以致力公喜曰問甚善自不妄語入吾初甚易之退而自櫽括日之所行與所言相掣肘矛盾者多矣力行七年而後成自兹言行一致表裏相應遇事坦然有餘地矣或問劉器之曰三代以下宰相學術司馬文正一人而己曰學術固也如宰相之才可以圖回四海者未敢以為第一盖元祐大臣𩔖豐于徳而亷于才智也先人亦云司馬公所謂惟大人能格君心之非者以御史大夫諫大夫執法殿中勸講經幄用則前無古人矣趙清獻公平生日所為事夜必衣冠露香九拜手告于天應不可告者則不敢為也張堯封從孫明復先生學于南京其女子常執事左右堯封死入禁中為貴妃寵遇第一數遣使致禮于明復明復閉門拒之終身慶厯中富鄭公韓魏公俱少年執政頗務興作章郇公位丞相終日黙然如不能言或問郇公富韓勇于事為何如曰得象每見小兒跳躑戲劇不可訶止俟其抵觸牆壁自退耳方鋭于跳躑時勢難遏也後富韓二公閲歴嵗月經涉憂患始知天下之事不可妄有紛更而王荆公者年少氣盛强項莫敵盡取祖宗典制變亂之二公不可救止而去始嘆郇公之言為賢也唐制唯給事中得封還制書康定間中㫖劉從徳妻王氏還前削遂國夫人富韓公為知制誥封還詞頭知制誥今中書舍人也中書舍人繳詞頭自富公始王氏犍為人初以后族出入禁中其父蒙正始因以通姦利云吕申公云唯人主之眷不可恃王荆公在半山使一老兵方汲泉埽地當其意譽之不容口忽誤觸燈檠即大怒以為不力逐去之參寥在坐私語他客云公以喜怒進退一老兵如在朝廷以喜怒進退士大夫也王荆公與曾南豐平生以道義相附神宗問南豐卿交王安石最蚤安石何如人南豐曰安石文學行義不減揚雄以吝故不及神宗遽曰安石輕富貴不吝也南豐曰臣謂曰吝者安石勇于有為吝于改過耳神宗頷之王荆公晚喜説字客曰覇字何以從西荆公以西在方域主殺伐累言數百不休或曰霸從雨不從西也荆公隨輒曰如時雨化之耳其學務鑿無定論𩔖此如三經義頒于學官數年之後又自列其非是者奏請易去視古人懸諸日月不刋之説豈不誤學者乎或譖胡宿于上曰宿名當為去聲乃以入聲稱名尚不識豈堪作詞臣上以問宿宿曰臣名歸宿之宿非星宿之宿譖者又曰果以歸宿取義何為字拱辰也故後易字武平王荆公之子雱作荆公畫像贊曰列聖垂教參差不齊集厥大成光于仲尼是聖其父過于孔子也雱死荆公以詩哭之曰一日鳳鳥去千年梁木摧是以兒子比孔子也父子相聖可謂無忌憚者矣楊大年為翰林學士適禮部試天下士一日㑹鄉里待試者或云學士必持文衡幸預有以教之大年作色拂衣而入則曰於休哉大年果知貢舉凡程文用於休哉者皆中選而當時坐中之客半不以為意不用也東坡在翰苑薄暮中使宣召已半醉遽汲泉以潄意少快入對内東門小殿簾中出除目吕公著司空平章軍國重事吕大防范純仁左右僕射既承㫖宣仁后曰學士前年為何官曰臣前年為常州團練副使今為何官曰臣今待罪翰林學士曰何以遽至此曰遭遇太皇太后陛下曰不闗老身事曰遭遇皇帝陛下曰亦不闗官家事曰豈出大臣論薦曰亦不闗大臣事東坡驚曰臣雖無狀不敢自他途以進宣仁后曰久欲令學士知此是神宗皇帝之意帝飲食停匕箸看文字宫人私相語必蘇軾之作帝每曰竒才竒才但未及進用學士上僊耳東坡不覺哭失聲后與上亦泣左右皆泣已而命坐賜茶宣仁后又曰學士直須盡心事官家以報先帝東坡下拜撤御前金蓮燭送歸院東坡為王鞏云東坡先謫黄州熙寧執政妄以陳季常鄉人任俠家黄之岐亭有世讎後謫惠州紹聖執政妄以程之才姉之夫有宿怨假以憲節皆使之甘心焉然季常之才從東坡甚驩也劉器之與東坡元祐初同朝東坡勇于為義或失之過則器之必約以典故東坡至發怒曰何處把上把去聲農人乘以事田之具曵得一劉正言來知得許多典故或以告器之則曰子瞻固所畏也若恃其才欲變亂典常則不可又朝中有語云閩蜀同風腹中有虫以二字各從虫也東坡在廣坐作色曰書稱立賢無方何得乃爾器之曰某初不聞其語然立賢無方須是賢者乃可若中人以下多繫土地風俗安得不為土習風移東坡黙然至元符末東坡器之各歸自嶺海相遇于道始交驩器之語人云浮華豪習盡去非昔日子瞻也東坡則云器之鐵石人也司馬丞相薨于位程伊川主喪事專用古禮將祀明堂東坡自使所來弔伊川止之曰公方預吉禮非哭則不歌之義不可入東坡不顧以入曰聞哭則不歌不聞歌則不哭也伊川不能敵其辨也晁以道為予言嘗親問東坡曰先生易傳當傳萬世曰尚恨某不知數學耳李敒言東坡自海外歸毗陵病暑著小冠披半臂坐船中夾運河岸千萬人隨觀之東坡顧坐客曰莫看殺軾否其為人愛慕如此東坡倅錢塘日答劉道原書云道原要刻印七史固善方新學經解紛然日夜摹刻不暇何力及此近見京師經義題國異政家殊俗國何以言異家何以言殊又有其善喪厥善其善不同何也又説易觀卦本是老鸛詩大小雅本是老鵶似此𩔖甚衆大可痛駭時熈寧初王氏之學務為穿鑿至此安世月八日登對睠問甚渥大母首語及先公惻愴久之曰如司馬相公盡心朝廷何可更得君臣之間如此可紀可紀予舊收諫大夫劉安世器之報司馬公休書一紙如上曰可紀也故紀之聞見後録卷二十

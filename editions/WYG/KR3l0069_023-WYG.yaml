body:
  text: 聞見後録卷二十三宋邵博撰予舊從司馬氏得文正公煕寧年辭樞筦出帥長安日手藁密疏公尋自免絶口不復言天下事矣其疏不見于𫝊家集曰臣之不才最出羣臣之下先見不如吕誨公直不如范純仁程顥敢言不如蘇軾孔文仲勇决不如范鎮誨于安石始參政事之時即指安石為姦邪謂其必敗亂天下臣以為安石止于不曉事與很愎爾不至如誨所言今觀安石援引親黨磐據要津擠排異己以固權寵常自以己意隂贊陛下内出手詔以决外庭之事使天下之威福在已而謗議悉歸于陛下臣乃自知先見不如誨逺矣純仁與顥皆與安石素厚安石拔于庶僚之中超處清要純仁與顥覩安石所為不敢顧私恩廢公議極言其短臣與安石南北異鄉取舍異道臣接安石素疎安石待臣素薄徒以屢常同僚之故私心眷眷不忍輕絶而顯言之因循以至今日是臣不負安石而負陛下臣不如純仁與顥逺矣臣承乏兩制逮事三朝與國家義則君臣恩猶骨肉覩安石專政逞其狂愚使天下生民被荼毒之苦宗廟社稷有累卵之危臣畏懦愛身不早為陛下别白言之軾與文仲皆疎逺小臣乃敢不避陛下雷霆之威安石狼虎之怒上書對䇿指陳其失隳官獲譴無所顧慮此臣不如軾與文仲逺矣人情誰不貪富貴戀俸禄鎮覩安石熒惑陛下以佞為忠以忠為佞以是為非以非為是不勝憤懣抗章極言因自乞致仕甘受醜詆杜門家居臣顧惜禄位為妻子計包羞忍恥尚居方鎮此臣不如鎮逺矣臣聞居其位者必憂其事食其禄者必任其患茍或不然是為盜竊臣雖無似嘗受教于君子不忍以身為盜竊之行今陛下唯安石之言是信安石以為賢則賢以為愚則愚以為是則是以為非則非諂附安石者謂之忠良攻難安石者謂之讒慝臣之才識固安石之所愚臣之議論固安石之所非今日之所言陛下之所謂讒慝者也伏望聖恩裁處其罪若臣罪與范鎮同則乞依范鎮例致仕或罪重于鎮則或竄或誅所不敢逃取進止司馬文正公曰吕獻可之先見吾不及也予慮後世得其言不得其事惑也有公門下士諫大夫劉安世器之書范景仁𫝊後語可信故書于下方煕寧中王介甫初參大政神考方厲精圖治一日紫宸早朝二府奏事畢日刻既晏例隔言事官于中廡須上入更衣復出以次贊引時吕獻可為御史中丞司馬文正公為翰林學士侍讀邇英閣將趨經筵相遇于庭中文正公密問曰今日請見言何事邪獻可舉手曰袖中彈文乃新參政文正公愕然曰以王介甫之文學行藝命下之日衆皆喜于得人奈何遽言之獻可正色曰安石雖有時名上意所向然好執邪見不通物情輕信難回喜人佞已聴其言則美施于用則疎若在侍從猶或可容置之宰輔天下必受其禍文正公曰與公素為心交茍有所懷不敢不盡今日之論未見有不善之迹似傷悤遽或别有章疏願先進呈姑留是亊更加籌慮可乎獻可曰上新嗣位富于春秋朝夕所與謀議者二三執政而已茍非其人將敗國事此乃心腹之疾治之惟恐不及顧可緩邪語未竟閣門吏抗聲追班遂趨而出文正公退自講筵黙坐玉堂終日思之不得其説既而縉紳間浸有𫝊其章疏者往往偶語竊議譏其太過未㡬聞中書置三司條例司平日介甫之門諂諛躁進之士悉辟召為屬吏朝夕相與謀議以經綸天下為己任務變更祖宗法斂民財以足國用妄引用古書蔽其誅剥之實輔弼大臣異議不可回臺諫從官力争不能奪郡縣監司奉行微忤其意則譴詘隨之于是百姓騷然矣然後前日之議者始愧仰嘆服以為不可及而獻可終縁兹事出知鄧州嗚呼行僻而堅言偽而辨記醜而博順非而澤唯孔子乃能識之雖子貢之智有所不知也方介甫自小官以至禁從其學行名聲暴著于天下士大夫識與不識皆謂介甫不用則已用之則必能興起太平獻可獨不以為然已而考其行事卒如所料非明智不惑出于世俗之表何以臻此易曰知㡬其神矣乎㡬者動之微吉之先見者也獻可有焉文正公退居洛陽每論當世人物必曰吕獻可之先見范景仁之勇决皆予所不及也予心誠服之故作景仁𫝊盖景仁之勇决得文正之𫝊而後明獻可埋文雖亦成于公手然止載其平生大節而自相論難之語不欲詳著獻可先見世莫有知者予嘗從學于文正公親聞其説懼賢者正論逺識遂將淪没而無𫝊故書蜀公之𫝊以貽樂善之君子云紹聖以來權臣挾繼述神宗為變者必先挾王荆公蔡氏至以荆公為聖人天下正論一貶荆公則曰非貶荆公也詆神宗也不忠于繼述也正論盡廢鉤黨牢不可解仁人君子知必為異日之禍其烈不可向無計䇿以救陳瓘􅉷中流涕以問諫大夫劉安世器之曰叵奈何器之親受司馬文正公之學膽智絶人曰不自神宗不自荆公不可救故􅉷中反疏蔡氏所出荆公日録語中詆神宗事曰尊堯集云意上心不平于荆公則蔡氏可伐正論可出鉤黨可解異日之禍可救也瑩中坐以流竄抵死正論卒不出鉤黨卒不解異日之禍卒不可救者天也予讀其書而悲之尚慮後世或不達瑩中本趣但以為闢荆公之詆神宗者故具言之尊堯集文煩不著著其序曰臣聞先王所謂道徳者性命之理而已矣此安石之精義也有三經焉有字說焉有日録焉皆性命之理也蔡卞蹇序辰鄧洵武等用心純一主行其教所謂大有為者亦性命之理而已矣其所謂繼述者亦性命之理而已矣其所謂一道徳者亦以性命之理而一之也其所謂同風俗者亦以性命之理而同之也不習性命之理謂之流俗黜流俗則竄其人怒曲學則火其書故自卞等用事以來其所謂國是者皆出性命之理不可得而動搖也臣昨在諫省所上章疏嘗以安石比于伊尹伊尹聖人也而臣迺以安石比之者臣于此時猶蔽于國是故也又臣所上章疏謂安石為神考之師也神考堯舜也任用安石止于九年而已矣初任後棄何嘗終以安石為是乎而臣迺以安石為神考之師者臣于此時猶蔽于國是故也臣昨者以言取禍㡬至誅殛賴陛下委曲保全賜臣餘命臣感激流涕念念循省得改過之義焉盖臣之所當改者亦性命之理而已矣孔子曰乾道變化各正性命又曰地道無成而代有終也性命之理其有易此乎臣伏見治平年中安石唱道之言曰道隆而徳駿者雖天子北面而問焉而與之迭為賓主自安石唱此説以來㡬五十年矣國是淵源盖兆于此臣聞天尊地卑乾坤定矣定則不可改也天子南面公侯北面其可改乎今安石性命之理迺有北面之禮焉夫天子北面以事其臣則人臣南面以當其禮臣于性命之理安得而不疑也𫝊曰君之所以不臣者二當其為祭主則弗臣當其為師則弗臣也師無北面則是弗臣之禮也豈有天子而可使北面者乎漢顯宗之于桓榮所以事之者可謂至矣而所施之禮不過坐東嚮而已迺以君而朝臣以父而拜子則是齊東野人之語龎勛無父之禮以此為教豈不亂名分乎亂名分之教豈可學乎臣既誤學乎教豈可以不悔乎易曰不逺復无祇悔元吉臣于既往之誤豈敢祇悔而不改乎臣昔以安石為神考之師是臣重安石而輕神考也臣昔以安石比伊尹之聖是臣戴安石而誑陛下也臣為陛下耳目之官而妄進輕許之言臣之罪惡如邱山矣臣若不洗心自新痛絶王氏則何以明改過之心乎臣所著尊堯集者為欲明改過之心而已矣莊周曰明此以南嚮堯之為君明此以北面舜之為臣也莊周之道虚誕無實不可以治天下然于名分之際不敢不嚴也飛蜂走蟻猶識上下豈可以人臣自聖而至于缺名分哉孔子曰名不正則言不順言不順則事不成安石北面之言可謂之順乎崇此不順之教則所述煕豐之事何日而成乎廢大法而立私門啓攘奪而生後患可為寒心孰大于此臣請序而言之昔紹聖史官蔡卞専用王安石日録以修神考實録薄神考而厚安石尊私史而壓宗廟臣居諫省請改裕陵實録及在都司進日録辨當是之時臣于日録未見全帙知其為私史而已未知其為増史也自去闕以來尋訪此書偶得全編遂復周覽竄身雖逺不廢討論路過長沙曽留轉藏之語待盡合浦又著垂絶之文考詆誣譏玩之詞見蔡卞増偽之意尚謂安石所録皆可慿據卞之所増迺是誣偽當是之時臣于日録考之未熟知其為増史而己未知其為悖史也盖由臣智識昏鈍覺悟不早追思諫省奏章乃至合浦舊述語乖正理隨俗妄談既輕神考又誑陛下若它時後日陛下以此怒臣臣將何以自救敢不悔乎日録云卿朕師臣也迺安石矯造之言又云督責朕有為豈神考親發之訓既託訓以自譽又託訓以輕君輕君則訕侮譏薄欲棄名分自譽則驕蹇陵犯前無祖宗其語實繁聊舉一二日録云朕自覺材極凡庸恐不足與有為恐古之賢君皆須天資英邁此非託訓以輕君乎又云朕頑鄙初未有知自卿在翰林始得聞道徳之説心稍開悟此非託訓以輕君乎又云卿初任講筵勸朕以講學為先朕意未知以此為急此非託訓以輕君乎又云卿莫只是為在位久度朕終不足與有為故欲去此非託訓以輕君乎又云所以為君臣者形而已矣形故不足累卿此非託訓以輕君乎訕侮譏薄欲棄名分可以畧見于此矣日録又云王安石造理深能見得衆人所不能見此託訓以自譽也又云如王安石不是智識髙逺精密不易抵當流俗天生明俊之才可以庇覆生民此託訓以自譽也又云卿無利欲無適莫非獨朕知卿人亦盡知若餘人安可保此託訓以自譽也又云卿才徳過于人望朕知卿了得事有餘此託訓以自譽也驕蹇陵犯前無祖宗可以畧見于此矣聖主以奉先為孝羣臣以承上為忠明知其誣誰敢覈實則可以抵塞衆口可以熒惑聖聰誑脅之術莫甚于此始則留身乞批以脅制于同列終則著書矯訓以傳述于後人誣脅臣隣何足縷道上干君父可不辨乎自到闕以來至為參政之始不録經筵之欵奏但書七對之游辭載神考降問之咨詢無一問仰及于三代言神考但慕蜀魏謂厥身不異皋伊仍于供職之初辰首論理財之不可恐宣利而壞俗陳孟子之恥言凡它人極論之辭掠為己説彼所獻管商之術歸過先猷書神考之謙辭則曰以朕比文王豈不為天下後世笑論太祖之征伐則曰江南李氏何嘗理曲恣揮躁悖之筆盡為烈考之詞矯訓誣天孰甚于此祖宗之威靈如在聖主之繼述日新若不辨託訓之誣何以解天下之怒而况託訓之外肆詆尤多神考小心慎微彼則曰好察細務神考畏天省事彼則曰畏慎過當神考欲除苛細之法彼則曰元首叢脞神考欲寛疑似之獄彼則曰陛下含糊神考體貌勲賢彼則曰含容姦慝神考嘉納忠直彼則曰不懲小人又謂姦罔之徒陛下能誅殺否比忠良于元濟責神考為憲宗謂不可以罷兵當必勝而後已神考守祖宗不殺之戒以天地好生為心厭棄其言眷待寖薄先逐鄧綰次出安石至于熙寧之末而安石前日之所怒者復見收矣至于元豐之末司馬光等前日之所言者復見思矣卞等不遵神考末命但務圖已之私以繼紹安石為心以必行誅殺為事請于哲宗而哲宗不許請于陛下而陛下拒之人心歸仁天助有徳遂使姦謀内潰逆黨自彰卞既不敢居金陵人亦不復聖安石悔從王氏豈獨臣哉朝廷搢紳協心享上庠序義士理所同然科舉藝能孰肻遽陳其所藴有用之士亦將先忍而後為變王氏誣君之習合春秋尊王之義濟濟多士何患無人又况安石所施其事既往若不自述于文字後人安知其用心著為此書天使之也且安石著書之意豈是便欲施行卞所安排非無次序自謂舉無遺䇿何乃急于流𫝊宣示逺近不太速乎然則流𫝊之速天促之也天之右序我宋而不助王氏亦可知也如臣昔者妄推安石謂之聖人如視蟻垤以為泰山如指蹄涔以為大海易言無責鬼得而誅駟不可追􅀈舌何補聖人人倫之至也傲上亂倫豈聖人乎聖人百世之師也教人誣偽豈聖人乎孔子集大成也尚以不居為謙光武有天下者也猶下禁言之詔豈可身處北面人臣之位而甘受子雱驕僭之名乎雱出安石畫像贊曰列聖垂教參差不齊集厥大成光乎仲尼蔡卞大書之刋于石與雱所撰諸書經義並行于世臣昔以答義應舉析字談經方務趣時何敢立異改過自新請自今始于是取安石日録編𩔖得六十五段釐為八門一曰聖訓二曰論道三曰獻替四曰理財五曰邊機六曰論兵七曰處已八曰寓言事為之論又于逐門總而說之凡為論四十有九篇合二門為一卷并序共為五卷臣以憂患之餘精力困耗披文索義十不得一加以海隅衰陋人無賜書神考御集無由恭閲又日録與御批日歴時政記抵捂同異無文可考欲校不得但専據私書畧分真偽不能盡究底藴亦可以闚其大槩矣凡臣之所論以紹述宗廟為本以辨明聖訓為先盖所述在彼則宗廟不尊誣語未判則真訓不白何以光揚神考有為之心何以將順陛下述事之志凡今之士學古入官身雖未試于朝廷心亦不忘于畎畝戴天履地寧忍同誣目拙心勞徒唱爾偽犯古今之公議極典籍之所非隂奉窽言顯違格訓安石欲置四輔神考以為不可神考欲建都省安石以為不可然今則四輔成矣都省毁矣道路為之流涕聖哲能不痛心人皆獨非于一京安知謀發于蔡卞至于宿衛之法亦敢更張變亂舊規創立三衛用私史包藏之計據新經穿鑿之文以畏憚不改為非以果斷變易為是按書定計以使其兄當面贊成退而竊喜京且由之而不悟他人豈測其用心事過而闚蹤跡方露齎咨痛恨雖悔何追在私家何足備論于國事豈宜如此謂塘濼未必有𥙷可以决水為田謂河北要省民徭可以減州為縣至于言江南利害則曰州縣可析論兵民將領則曰奬拔豪傑四海本是一家何為分彼分此大法無過宿衛安得率爾動搖棄舊圖新厥意何在昔元祐更張之始方安石身没之初衆皆獨罪于恵卿或以安石為朴野優加贈典欲鎮浮薄司馬光簡尺具存吕恵卿責詞猶在深懲在列曲恕元台凡同時論之人無一人指㸃安石往往言章疑似或于裕陵致卞以闚伺為心包藏而待潤色誣史増汙忠賢凡愠懟曾布之言與怒詈恵卿之語例皆刋削意在牢籠欲使共述私書將欲濟其大欲布等在其術内卞計無一不行良由議贈之初不稽其弊若使早崇名分何至横流司馬光誤國之罪可勝言哉臣聞熙寧之初論安石之罪中其肺肝之隱者吕誨一人而已熙寧之末論安石之罪中其肺肝之隱者恵卿一人而已吕誨之言曰大姦似忠大佞似信外視樸野中藏巧詐驕蹇傲上隂賊害物吕恵卿之言曰安石盡棄素學而隆尚縱横之末數以為竒術以至譖愬脅持蔽賢黨姦移怒行很方命矯令罔上要君凡此數惡莫不備具雖古之失志倒行而逆施者殆不如此平日聞望一旦埽地不知安石何苦而為此也謀身如此以之謀國必無逺圖而陛下既以不可少而安石之罪固未易言又曰平日以何如人遇安石安石平日以何等人自任不意窘急乃至如此又曰君臣防閑豈可為安石而廢哉又曰臣之所論皆中其肺肝之隱臣某竊謂元祐臣僚于吕誨之言則譽之太過于惠卿之言則毁之太過此二臣者趣向雖異至于論安石之罪獻忠于神考則其言一也豈可専譽誨而毁恵卿乎偏毁恵卿此王氏之所以益熾也元祐之偏可不鑒哉臣竊以天下譬如一舟舟平則安偏則危臣之以言取禍初縁此語然臣自視此語猶野人之視芹也切于愛君又欲以獻前日之欲殺臣者必亦瞋目矣然臣之肝腦本是報國之物臣若愛吝此物則陛下不得聞安石之罪矣陛下不得聞安石之罪則人之利害咸在矣為我宋之臣豈得不思乎迺者天子幸學拜謁宣尼本朝故臣坐而不立躋此逆像卞唱之也輔臣縱逆而養交禮官舞禮而行諂僭自内始達于四方萬國寒心外夷非笑鷩冕夷俟載籍所無屨加于冠何以示訓自有中國以來五品不遜未有此比然則觀此一像而八十卷之大概可以未讀而知矣蔡氏鄧氏薛氏皆立安石之像祠于家廟朝拜安石而頌曰聖矣聖矣暮拜安石而頌曰聖矣聖矣國學風化之首也豈三家之家廟乎故曰廢大法而立私門啟攘奪而生後患可為寒心莫大于此尊君愛國之士孰敢以此為是乎是非之心人皆有之極天下之非而可以謂之國是乎嗚呼講先王之道而以咈百姓為先論周公之功而以僭天子為禮咈民嵗久蠧國日深僭語為胎遂産逆像以非為是態度日移廢道任情今甚于昔昔者初立國是使惇行之惇既竄逐移是于布布又竄逐移是于京三是皆發于卞謀三臣同歸于誤國然則果國是乎果卞是乎若以卞是為是則操心頗僻賦性姦回如鄧綰者不當逐也若以卞是為是則以塗炭必敗之語詆誣神考如常立者不當竄也神考逐綰可以見悔用安石之心哲宗竄立可以見斥絶安石之意兩朝威斷天下皆以為至明陛下光揚亦以去卞為急務埽除舊􅁾允協人心布澤日新上合天意樂于將順搢紳所聞夢闕馳誠名限疎逺彼元祐元符之籍雖漸絶弛而人尚未見用應詔上書之罪雖已釋放而士猶在沮辱沮辱者不可復問未用者當自退藏其餘雖在朝廷或非言路明哲之士又務保身縱有强聒之流且無私史之隙唯臣因論私史禍隙至深得存餘命全由獨斷臣之所以報國者敢不勉乎兼臣年老病多决知處世難久與其齎志于没後孰若取義于生前義在殺身志惟尊主故臣所著日録辨名之曰四明尊堯集云聞見後録卷二十三

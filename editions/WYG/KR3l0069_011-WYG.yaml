body:
  text: 聞見後録卷十一宋邵博撰大賢如孟子其可議有或非或疑或辨或黜者何也予不敢知具列其説於下方學者其折𠂻之後漢王充有刺孟近代何涉有刪孟文繁不録王充刺孟出論衡韓退之賛其閉門􅅗思論衡以修矣則退之於孟子醇乎醇之論亦或不然也畧法先生而不知其統猶然而材劇志大聞見雜博案徃舊造説謂之五行甚僻違而無類幽𨼆而無説鬭約而無解飾其辭而祗敬之曰此真先君子之言也子思唱之孟軻和之世俗之講猶瞀儒唯唯然不知其所非也遂受而傳之以為仲尼子游為兹厚於後世是則子思孟軻之罪也右荀卿非七十二子疑伯夷隘栁下惠不恭曰孟子稱所願學者孔子然則君子之行孰先於孔子孔子厯聘七十餘國皆以道不合而去豈非非其君不事乎孺悲欲見孔子孔子辭以疾豈非非其友不友乎陽虎得政於魯孔子不肯仕豈非不立於惡人之朝乎為定哀之臣豈非不羞汙君乎為委吏為乗田豈非不卑小官乎舉世莫知之不怨天不尤人豈非遺佚而不怨乎飲水曲肱樂在其中豈非阨窮而不憫乎居鄉黨恂恂似不能言豈非由由與之偕而不自失乎是故君子邦有道則見邦無道則𨼆事其大夫之賢者友其士之仁者非隘也和而不同遯世無悶非不恭也茍無失其中雖孔子由之何得云君子不由乎疑陳仲子避兄離母曰仲子以兄之禄為不義之禄蓋為不以其道事君而得之也以兄之室為不義之室蓋謂不以其道取於人而成之也仲子葢嘗諫其兄矣而兄不用也仲子之志以為吾既知其不義矣今且食而居之是口非之而身享之也故避之居於陵於陵之室與粟身織屨妻辟纑而得之也非不義也豈當更問其築與種之者誰邪以所食之鶂鶂兄所受之饋也故哇之豈以母則不食以妻則食之邪君子之責人當探其情仲子之避兄離母豈所願邪若仲子者誠非中行亦狷者有所不為也孟子過之何其甚歟疑孟子將朝王曰孔子聖人也定哀庸君也然定哀召孔子孔子不俟駕而行過位色勃如也足躩如也過虚位且不敢不恭况召之有不信而他適乎孟子學孔子者也其道豈異乎夫君臣之義人之大倫也孟子之徳孰與周公其齒之長孰與周公之於成王成王幼周公負之以朝諸侯及長而歸政北面稽首畏事之與事文武無異也豈得云彼有爵我有德齒可慢彼哉疑孟子謂蚔鼃無言責曰孟子居齊齊王師之夫師者道人以善而救其惡者也豈得謂之無官守無言責乎若謂之為貧而仕邪則後車數十乗従者數百人仰食於齊非抱關擊柝之比也詩云彼君子兮不素餐兮夫賢者所為百世之法也余懼後之人挾其有以驕其君無所事而貪禄位者皆援孟子以自况故不得不疑疑沈同問伐燕曰孟子知燕之可伐而必待能仁政者乃可伐之齊無仁政伐燕非其任也使齊之君不謀於孟子孟子勿預知可也沈同既以孟子之言勸王伐燕孟子之言尚有懐而未盡者安得不告王而正之乎夫軍旅者大事也民之死生國之存亡皆繫焉茍動不得其宜則民殘而國危仁者何忍坐視其繆妄乎疑父子之間不責善曰經云當不義則子不可不爭於父傳云愛子教之以義方孟子云父子之間不責善不責善是不諫不教也而可乎疑性猶湍水曰告子云性之無分於善不善猶水之無分於東西此告子之言失也水之無分於東西謂平地也使其地東髙而西下西髙而東下豈决導所能致乎性之無分於善不善謂中人也瞽瞍生舜舜生商均豈陶染所能變乎孟子云人無有不善此孟子之言失也丹朱商均自幼及長日所見者堯舜也不能移其惡豈人之性染有不善乎疑生之謂性曰孟子云白羽之白猶白雪之白白雪之白猶白玉之白告子當應之云色則同矣性則殊也羽性輕雪性弱玉性堅而告子亦皆然之此所以來犬牛人之難也孟子亦可謂以辨勝人矣疑齊宣王問卿曰禮君不與同姓同車與異姓同車嫌其偪也為卿者無貴戚異姓同姓皆人臣也人臣之義諫於君而不聽去之可也死之可也若之何其以貴戚之故敢易位而處也孟子之言過矣君有大過無若紂紂之卿士莫若王子比干箕子㣲子之親且貴也㣲子去之箕子為之奴比干諫而死孔子曰殷有三仁焉夫以紂之過大而三子之賢猶且不敢易位也况過不及紂而賢不及三子者乎必也後世有貴戚之臣諫其君而不聽遂廢而代之曰吾用孟子之言也非簒也義也其可乎或曰孟子之志欲以懼齊王也是又不然齊王若聞孟子之言而懼然則愈忌惡其貴戚聞諫而誅之貴戚聞孟子之言又將起而蹈之則孟子之言不足以格驕君之非而適足以為簒亂之資也其可乎疑所就三所去三曰君子之仕行其道也非為禮貌與飲食也伊尹去湯就桀桀豈能迎之以禮哉孔子栖栖皇皇周遊天下佛肹召欲徃公山弗擾召欲徃彼豈為禮貌與飲食哉急於行道也今孟子之言曰雖未行其言也迎之有禮則就之禮貌衰則去之是為禮貌而仕也又曰朝不食夕不食君曰吾大者不能行其道又不能従其言也使饑餓於我土地吾恥之周之亦可受也是為飲食而仕也必如是不免於鬻先王之道以售其身也古君子之仕者殆不如此疑堯舜性之也湯武身之也五霸假之也曰所謂性之者天予之也身之者親行之也假之者外有之而内實亡也堯舜湯武之於仁義也皆性得而身行之也五霸則强焉而已矣夫仁者所以治國家而服諸侯也皇帝王霸皆用之顧其所以殊者大小髙下逺近多寡之間耳假者文具而實不従之謂也文具而實不従其國家且不可保況能霸乎雖乆假而不歸猶非其有也疑瞽瞍殺人曰虞書稱舜之德曰父頑母嚚𧰼傲克諧以孝烝烝又不格姦所貴於舜者為其能以孝和諧其親使之進退以善自治而不至於惡也如是則舜為子瞽瞍必不殺人矣若不能止其未然使至於殺人執於有司乃棄天下竊之以逃狂夫且猶不為而謂舜為之乎是特委巷之言也殆非孟子之言也且瞽瞍既執於臯陶矣舜惡得而竊之若負而逃於海濵臯陶猶可執也若曰臯陶外雖執之以正其法而内實縦之以予舜是君臣相與為偽以欺天下也惡得為舜與臯陶哉又舜既為天子矣天子之民戴之如父母雖欲遵海濵而處民豈聽之哉是臯陶之執瞽瞍得法而亡舜也所亡益多矣故曰是特委巷之言非孟子之言也右司馬文正公疑孟子曰囘也其心三月不違仁其餘則日月至焉而已矣孔子曰吾之於人也誰毁誰譽如有所譽必有所試其於顔淵試之也熟而觀之也審矣葢嘗黙而察之閲三月之乆而其顛沛造次無一不出於仁者是以知其終身弗叛也君子之觀人也必於其所慮焉觀之此其所慮者容有偽也雖終身不得其真故三月之乆必有備慮之所不及者偽之與真無以異而君子賤之何也有利害臨之則敗也孟子曰堯舜性之也湯武身之也五霸假之也乆假而不歸安知其非有也假之與性其本亦異矣豈論其歸與不歸哉使孔子觀之不終日而決不待三月也何不知之有子曰志於道據於德依於仁游於藝志者無求無作志於心而已孟子所謂心勿忘據者可求可作之謂也依者未嘗須􅁷離而游者出入可也君子志於道則物莫能留而游於藝則道德有自生矣子貢問政子曰足食足兵民信之矣子貢曰必不得已而去於斯三者何先曰去兵子貢曰必不得已而去於斯二者何先曰去食自古皆有死民無信不立孟子較禮食之輕重而食輕則去食食重而禮輕則去禮惟色亦然而孔子去食存信曰自古皆有死民無信不立不復較其重輕何也曰禮信之於食色如五榖之不殺人今有問者曰吾恐五榖殺人欲禁之如何必荅曰吾寧食五榖而死不禁也此孔子去食存信之論也今荅曰擇其殺人者禁之其不殺人者勿禁也五榖安有殺人者哉此孟子禮食輕重之論也禮所以使人得妻也廢禮而得妻者皆是縁禮而不得妻者天下未嘗有也信所以使人得食也棄信而得食者皆是縁信而不得食者天下未嘗有也今立法不従天下之所同而従其所未嘗有以開去取之門使人以為禮有時而可去也則將各以其私意權之其輕重豈復有定物由孟子之説則禮廢無日矣或曰舜不告而娶則以禮則不得妻也曰此孟子之所傳古無是説也凡舜之事塗廩浚井不告而娶皆齊魯間野人之語考之於書舜之事父母葢烝烝焉不至於姦無是説也使不幸而有之則非人理之所期矣自舜已來如瞽瞍者葢亦有之為人父而不欲其子娶妻者未之有也故曰縁禮而不得其妻者天下無有也或曰嫂叔不親授禮也嫂溺而不援曰禮不親授可乎是禮有時而去取也曰嫂叔不親授禮也嫂溺援之以手亦禮也何去取之有聞見後録卷十一

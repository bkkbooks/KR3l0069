body:
  text: 聞見後録卷二十七宋邵博撰張浮休云盜夜發咸陽原上古墓有火光出用劒擊之鏗然以墜視之白玉簾也豈至寳久埋藏欲飛去邪既擊碎之有中官取以作算籌浮休亦得一二宣和殿聚殷周鼎鍾尊爵等數千百種國破冦盡取禁中物其下不禁勞苦半投之南壁池中後世三代彛器當出于大梁之墟云主父齊賢者自言少羈貧客齊魯村落中有牧兒入古墓中求羊得一黄磁小褊缾様制甚朴時田中豆莢初熟兒欲用以貯之才投數莢隨手輒盈滿兒驚以告同隊兒三四試之皆然道上行人見之投數錢隨手亦盈滿遂奪以去兒啼號告其父父方築田持鋤追行人及之相争競以鋤擊缾破猶持碎片以示齊賢其中皆五色畫人面相聮貫色如新亦異矣齊賢為王性之云近嵗犍為資官二縣接境地名龍透向氏佃民耕田忽聲出地中耕牛驚走得銅劒一長二尺餘民持歸挂牛䦨上入夜劒有光䦨牛盡驚移之舍中其光益甚民愚亦驚懼擲于户外即飛去盖神物也士聶椿云向其婦家也牛僧孺李徳裕相讐不同國也其所好則每同今洛陽公卿園圃中石刻竒章者僧孺故物刻平泉者徳裕故物相半也如李邦直歸仁園乃僧孺故宅埋石數塜尚未發平泉在鑿龍之右其地僅可辨求徳裕所記花木則易以禾黍矣世𫝊李太白草書數軸乃葛叔忱偽書叔忱豪放不羣或嘆太白無字畫可𫝊叔忱偶在僧舍縱筆作字一軸題之曰李太白書且與其僧約異日無語人每欲其僧信于人也其所謂得之丹徒僧舍者乃書之丹徒僧舍也今世所𫝊法書要録法書苑墨藪等書著古今能書人姓名盡矣皆無太白書之品第也太白自負王霸之畧飲酒鼓琴論兵擊劒鍊丹燒金乗雲仙去其志之所存者靡不振發之而草書竒倔如此寧謙退自晦無一言及之乎叔忱翰墨自絶人故可以戲一世之士也􅄯以道為予言如此大儒宋景文公學該九流于音訓尤邃故所著書用竒字人多不識嘗納子婦三日子以婦家饋食物書白一過目即曰書錯一字姑報之至白報書即怒曰吾薄他人錯字汝亦爾邪子皇駭郤立緩扣其錯以筆塗煖字盖婦家書以食物煖女云報亦如之子益駭又緩扣當用何煖字久之怒聲曰從食從而從大子退檢字書博雅中出餪字注云女嫁三日餉食為餪女始知俗間餪女云者自有本字東坡謝滕達道書云前日得觀所藏諸書使後學稍窺家𫝊之祕幸甚恕先所訓尤為近古某方治此書得之頗有開益拜賜之重若獲珠貝老朽不揆輒立訓𫝊尚未畢功異日當為公出之古學崩壞言之傷心也李方叔云東坡每出必取聲韻音訓文字複置行篋中予謂學者不可不知也陶隱居與梁武帝啓云逸少有名之迹不過數種黄庭勸進像贊洛神不審猶得在否禇遂良逸少正書目樂毅論黄庭經畫贊墓田丙舍以次共十四帖合五卷勸進已亡洛神不録盖遂良誤以洛神為子敬書故栁公權亦云禇栁于書工矣其鑒裁尚有失古語二王以來評書之妙惟隱居為第一不誣也崇寧初經畧天都開地得瓦器實以木簡札上廣下狹長尺許書為章草或參以朱字表物數曰縑㡬匹綿㡬屯錢米若干皆章和年號松為之如新成者字遒古若飛動非今所畜書帖中比也其出于書吏之手尚如此正古謂之札書見漢武紀郊祀志乃簡書之小者耳張浮休䟦王君求家章草月儀云爾崔偓佺淳化中判國子監有字學太宗問曰李覺嘗言四皓中一人姓或云用上加一撇或云用上加一㸃果何音偓佺曰臣聞刀下用擢音兩㸃下用為鹿音用上一撇一㸃俱不成字四皓中一人角里先生也予謂今書角里用上加撇者非是俗語借與人書為一癡還書與人為一癡予每疑此語近薄借書還書理也何癡云後見王樂道與錢穆四書出師頌書函中最妙絶古語借書一瓻還書一瓻欲以酒二尊往知卻例外物不敢因檢説文瓻抽遲反亦音絺注云酒器古以借書盖俗誤以為癡也荆浩論曰山水之學吴道子有筆而無墨項容有墨而無筆王維李思訓之流不數也其所自立可知矣然入吾本朝如長安闗同營丘李成華原范寛之絶藝荆浩者又不數也故本朝畫山水之學為古今第一國初營丘李成畫山水前無古人後河陽郭熙得其遺法成之子覺熙之子思俱為從官頗廣求兩父之畫故見于世者益少益可貴云觀漢李翕王稚子高貫方墓碑多刻山林人物乃知顧愷之陸探㣲宗處士輩尚有其遺法至吴道𤣥絶藝入神然始用巧思而古意少減矣况其下者此可為知者道也畫花趙昌意在似徐熙意不在似非高于畫者不能以似不似第其逺近盖意不在似者太史公之于文杜少陵之于詩也獨長安中隱王正叔以予為知者蜀人重孫知㣲畫筆東坡獨曰工匠手耳其識高矣宣和中遣大黄門就西都多出金帛易古畫本求售者如市獨于郭宣猷家取吴生畫一剪手指甲内人去其韻勝出東坡所賦周員外畵背面欠伸内人尚數等予少年時嘗因以作續麗人行云予舊于􅓳城孔寜極家見孔戣私紀一編有云退之豐肥喜睡每來吴家必命枕簟近潮陽劉方明摹唐本退之像來信如戣之記益知世所𫝊好須髯者果韓熙載也􅄯以道言當東坡盛時李公麟至為畵家廟像後東坡南遷公麟在京師遇蘇氏兩院子弟于途以扇障面不一揖其薄如此故以道鄙之盡棄平日所有公麟之畫于人郭恕先畫重樓複閣間見疊出善木工料之無一不合規矩其人世外僊者尚于小藝委曲精致如此何邪予收南唐李侯閤中集第九一卷畫目上品九十五種内蕃王放簇帳四今人注云一在陸農師家二在潘景家江鄉春夏景山水六注云大李將軍又今人注云二在馬粹老家山行摘𤓰圖一注云小李將軍又今人注云在劉忠諫家盧思道朔方行一注云小李將軍又今人注云在李伯時家明皇遊獵圖一注云小李將軍又今人注云在馬粹老家奚人習馬圖三注云韓幹又今人注云一在野僧家中品三十三種内月令風俗圖四今人注云在楊康功龍圖家楊妃使雪衣女亂雙陸圖一注云李翽又今人注云在王粹老家今易主矣竹四今人注云在王仲儀之子定國處其著色卧枝一竿尤妙下品百三十九種内回紋圖二注云殷嵩又今人注云在仲儀家詩圖二叙一樓臺人物分兩處中為逺水紅橋小山作竇滔從騎迎若蘭車輿人物甚小而繁大概學周昉而氣製甚逺猫一注云汀洲李交又今人注云在劉正言家花而行者一小者三如生後有李伯時跋云江南閣中集一卷得于邵安簡家其中名品多流散士大夫家公麟尚見之有朱印曰建業文房之印曰内合同印有墨印曰集賢院御書記表以回鸞墨錦籖以潢經紙予意今注出于伯時也然不知集有㡬卷其他卷品目何物也建業文房亦盛矣每撫之一歎聞見後録卷二十七

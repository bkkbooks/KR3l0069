  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0069_WYG_014-1a, image: WYG1039/WYG1039-0280a.png}
body:
  text: 聞見後録卷十四宋邵博撰陳叔易言王荆公得東坡表忠觀碑本顧坐客曰似何人之文自又曰似司馬遷自又曰似遷何等文自又曰三王世家也予以為不然司馬遷死其書亡景帝武帝二紀禮書樂書漢興以來將相年表日者龜䇿傳三王世家至元成間禇先生者補作武帝紀三王世家龜策日者傳當時以其言鄙陋失遷本意荆公豈不知此而以今三王世家為遷之書邪如議者多以司馬遷怒武帝故于本紀但著絶海求神仙大宛取馬用兵祠祭等事以為謗者非也子由云子瞻讀書有與人言者有不與人言者不與人言者與轍言之而謂轍知之世稱蘇氏之文出于檀弓不誣矣栁子厚云以淮濟之清有玷焉若秋毫固不為病然而萬一離婁子而眇然睨之不若無者之快也予謂惟文章英發前無古人者益當兼佩斯言矣栁子厚云北之晉西適豳東極吳南至楚越之交其間名山水而州者以百數永最善以妙語起其可遊者讀之令人翛然有出世外之意然子厚别云永州于楚為最南狀與越相似僕悶則出游游復多恐涉野則有蝮虺大蜂仰空視地寸步勞倦近水則畏射工含沙望影竊發動成瘡疣子厚前所記黄溪西山鈷鉧潭袁家渇果可樂乎何言之不同也東坡江行唱和集序云昔之為文者非能為之為工乃不能不為之為工也山川之有雲草木之有實充滿勃鬱而見于外雖欲無有其可得邪故予為文至多未嘗敢有作之之意時東坡年方冠尚未第其有發于文章已如此故黄門論曰公之于文得之于天也歐陽公謂曾子固云王介甫之文更令開廓勿造語及摹擬前人又云孟韓文雖髙不必似之也謂梅聖俞云讀蘇軾之書不覺汗出快哉老夫當避路放他出一頭地也又曰軾所言樂乃脩所得深者爾不意後生達斯理也歐陽公初接二公之意已不同矣退之于文不全用詩書之言如田𢎞正先廟碑曰昔者魯僖公能遵其祖伯禽之烈周天子實命其史臣克作為駉駜泮閟之詩使聲于其廟以假魯靈其用詩之法如此如曰前進士上宰相書解釋菁菁者莪二百餘字盖少作也栁子厚記其先友于父墓碑意欲著其父雖不顯其交游皆天下偉人善士列其姓名官爵因附見其所長者可矣反從而譏病之不少貸何也是時子厚貶永州又喪母自傷其葬而不得歸也其窮阨可謂甚矣而輕侮好譏議尚如此則為尚書郎時可知也退之云不自貴重者盖其資如此云栁子厚書段太尉遺事解佩刀選老躄者一人持馬至郭晞門下甲者出太尉笑且入曰吾戴吾頭來矣宋景文修新史曰吾戴頭來矣去一吾字便不成語吾戴頭來者果何人之頭耶曾子固之文可以名家矣然歐陽公謂廣文曾生者在禮部奏名之前已為門下士矣公示吳孝宗詩有云我始見曾子文章初亦然崑崙傾黄河渺漫盈百川疏決以道之漸斂收横瀾東溟知所歸識路到不難是子固于文遇歐陽公方知所歸也而子固祭歐陽公文自云戅直不敏早蒙振拔言繇公誨行繇公率也子開于歐陽公下世之後作子固行述乃云宋興八十餘年海内無事異材間出歐陽文忠公赫然特起為學者宗師公稍後出遂與文忠齊名予以為過美張籍哭韓退之詩云而後之學者或號為韓張退之曰籍是輩者學者曰韓門弟子不曰韓張也蘇東坡曰文忠之薨十有八年士庶所歸散而自賢我是用懼日登師門有以也夫曾子開論其兄子固之文曰上下馳騁愈出而愈新讀者不必能知知者不必能言盖天材獨至若非人力所能學備精思莫能到也又曰言近指遠雖詩書之作未能逺過也蘇子由論其兄子瞻之文曰遇事所為詩騷銘記書檄論譔率皆過人又曰幼而好學書老而不倦自言不及晉人至唐禇薛顔栁髣髴近之子開之言𩔖夸大子由之言務謙下後世當以東坡南豐之文辨之文用助字栁子厚論當否不論重復檀弓曰南宫縚之妻之姑之喪退之亦曰吾年未四十而視茫茫而髪蒼蒼而齒牙動搖近時六一文安東坡三先生知之愚溪惜楊誨之用莊子太多反累正氣東坡早得文章之法于莊子故于詩文多用其語讀司馬子長之文茫然若與其事相背戾如言人民樂業自年六七十公亦未嘗至市井游敖嬉戲如小兒狀何屬于律書也伯夷傳首曰余登箕山其上有許由冢云意果何在下用富貴如可求雖執鞭之士吾亦為之嵗寒然後知松栢之後凋等語殊不𩔖其所以為閎深髙古者歟視他人拘拘窘束一步武不敢外其事者膽智甚薄也唯杜子美之于詩似之魯直以晁載之閔吾廬賦問東坡何如東坡報云晁君騷辭細看甚竒麗信其家多異材邪然有少意欲魯直以漸箴之凡人為文宜務使平和至足之餘溢為竒怪盖出于不得已耳晁君喜竒似太早然不可直云爾非為之諱也恐傷其邁往之氣當為朋友講磨之語可耳予謂此文章妙訣學者不可不知故表出之東坡中制科王荆公問吕申公見蘇軾制策否申公稱之荆公曰全𩔖戰國文章若安石為考官必黜之故荆公後修英宗實録謂蘇明允有戰國縱横之學云老蘇公云學者于文用引證猶訟事之用引證也既引一人得其事則止矣或一人未能盡方可他引宋玉招魂以東南西北四方之外其惡俱不可以託欲屈大夫近入修門耳時大夫尚無恙也韓退之羅池詞云北方之人兮謂侯是非千秋萬嵗兮侯無我違時柳儀曹已死若曰國中于侯或是或非公言未出不如逺即羅池之人千萬年􅆢嘗不忘也嗟夫退之之悲儀曹甚于宋玉之悲大夫也英宗實録蘇洵卒其子軾辭所賜銀絹求贈官故贈洵光禄寺丞與歐陽公之誌天子聞而哀之時賜光禄寺丞不同或云實録王荆公書也又書洵機論衡策文甚美然大抵兵謀權利機變之言也盖明允時荆公名已盛明允獨不見作辨姦以刺之故荆公不樂云楚詞文章屈原一人耳宋玉親見之尚不得其髣髴況其下者唯退之羅池詞可方駕以出東坡謂鮮于子駿之作追古屈原友之過矣如晁元咎所集續離騷皆非是韓退之之文自經中來柳子厚之文自史中來歐陽公之文和氣多英氣少蘇公之文英氣多和氣少蘇叔黨為葉少藴言東坡先生初欲作志林百篇才就十二篇而先生病惜哉先生胸中尚有偉于武王非聖人之論者乎予客長安藍田水壞一墓得退之自書薛助教誌石校印本殊不同印本挾一矢石本乃指一矢為妙語又城中有發地得小狹青石刻瘞破硯銘長安又得退之李元賓墓銘段季展書校印本無友人博陵崔𢎞禮賣馬葬國東門之外七里之事又印本銘云已乎元賓文髙乎當世行過乎古人竟何為哉石本乃意何為哉益嘆石本之語妙歐陽公以下好韓氏學者皆未見之也李漢于韓退之不曰子壻曰門人云退之詩文漢所𩔖也如革華傳𩔖本無之趙璘因話録云才命論稱張燕公革華傳稱韓文公老牛歌稱白侍郎佛骨詩稱鄭司徒皆後人所誣其詞至鄙淺則革華傳非退之作明甚予謂凡李漢所不録今曰昌黎外集者皆可疑如栁子厚云退之寓書曰見送元生序不斥浮圖又劉夢得云韓愈謂柳子厚曰若知天之説乎吾為子言天之説云云又云柳子厚死退之以書來弔曰哀哉若人之不淑吾嘗評其文雄深雅健似司馬子長崔蔡不足多也又退之自云愈與李賀書勸賀舉進士今其説其書皆不傳則漢之所失亦多矣司馬遷父名談故史記無談字改趙談為趙同范曄父名泰改郭泰鄭泰俱為太杜甫父名閑故詩中無閑字其曰鄰家閑不違者古本問不違曽閃朱旗北斗閑者古本北斗殷李翺父名楚今故所為文皆以今為兹獨韓退之因李賀作諱辯持言徵之説退之父名仲卿于文不諱也曹志為植之子其奏云幹不植彊不諱其父名也吕岱為呉臣其書云功以權成不諱其君名也樊宗師之文怪矣退之但取其不相襲而已曰魁紀公三十卷曰樊子三十卷曰春秋集傳十五卷表牋狀策書序傳紀記誌説論讚銘二百九十一篇道路所遇及器物門里雜銘二百二十賦十詩七百有十九其評曰多乎哉古未有也又曰然而必出于己不襲蹈前人一言一句又何其難也又曰紹述于斯術可謂至于斯極者矣曰未有曰難曰極特取其不相襲耳不直以為美也故其銘曰惟古于詞必已出降而不能乃剽賊後皆指前公相襲從漢迄今用一律盖斥班固而下相襲者退之于文吝許可如此聞見後録卷十四

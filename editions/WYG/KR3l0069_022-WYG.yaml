body:
  text: 聞見後録卷二十二宋邵博撰熙寧年邊吏報契丹將入冦亟遣中貴人取兩河民車以為戰備民大驚擾自宰執以下言不便者牆進俱不省時沈括存中為記注一日侍筆立御座側上顧曰卿知籍車之事乎括曰未知車將何用上曰北邊以多馬取勝唯車可以當之括曰敵之來民父子墳墓田廬皆當棄去後暇䘏車乎朝廷姑籍其數而未取何傷上喜曰卿言有理何論者之紛然也括曰車戰之利見于歴世巫臣教呉子以車戰遂霸中國李靖用偏箱鹿角車以擒頡利臣但未知一事古人所謂輕車者兵車也五御折旋利于輕速今之民間錙車重大椎樸以牛挽之日不能行三十里少蒙雨雪則跬步不進故俗謂之太平車或可施于無事之日恐兵間不可用耳上益喜曰人言無及此者朕當更思之明日遂罷籍民車執政問括曰君以何術而立談罷此事上甚多太平車之説也括曰聖主可以理奪不可以言争若車可用其敢以為非括未㡬遷知制誥司馬文正公在洛陽脩史日伊川先生程頤正叔為布衣年尚少其見亦有時今為伊川學者以文正齋記中有曰正叔云以為字伊川者非也楚王議建中字正叔耳然伊川後用文正薦勸講禁中未㡬罷去先是劉莘老論曰紛紛之論致疑于程頤者直以謂自古以來先生處士皆盜虚名無益于用若頤者特以迂濶之學邀君索價而已天下節義之士樂道不出如頤等輩蓋亦不少彼無所援于上故不聞爾又以頤辭免爵命之言曰前朝召舉布衣故事具存是頤之自欲為种放而亟欲得臺諫侍從矣不可不察也聖人自有中道過之則偏天下自有常理背之則亂伏望審真偽重名器云云孔文仲論曰頤在經筵僭横造請權勢滕口間亂以償恩讐致市井之間目為五鬼之魁嘗令其助賈易彈吕陶及造學制詭謬童稚嗤鄙云云又曰頤汚下憸巧素無鄉行經筵陳説僭横忘分遍謁貴臣歴造臺諫宜放還田里以示典刑云云劉器之論曰程頤歐陽棐畢仲游楊國寳孫朴交結執政子弟搢紳之間號五鬼又曰進言者必曰五鬼之號出于流俗不根之言何足為據臣亦有以折之方今士大夫無不出入權勢之門何當盡得鬼名惟其隂邪潛伏進不以道故程頤等五人獨􅀍惡聲孔子曰吾之于人也誰毁誰譽如有所譽其有所試矣蓋人之毁譽必以事驗之今衆議指目五人可謂毁矣然推考其迹則人言有不誣者臣請歴陳其説若程頤則先以罪去云云蘇子瞻奏則曰臣素疾程頤之姦形于言色因頤教誘孔文仲令以私意論事為文仲所奏頤遂得罪云云又子瞻為禮部尚書取伊川所修學制貶駮譏詆畧盡如蘇子瞻劉莘老孔文仲劉器之皆世之君子其于伊川先生不同如此至斥黨錮則同在禍中悲夫予為校書郎時嘗問趙丞相元鎮云張天覺者首造元祐部黨之人也靖康初與范文正司馬文正同追贈天下已非之公身任邪正之辨既未能追改更諡以文忠是與蔡公齊富公弼一等也可乎元鎮悵然曰蜀勾濤在從班游談有司不肖不能執法耳予見其有悔色亦不復言某公在章獻明肅后垂箔日密進唐武氏七廟圖后怒抵之地曰我不作負祖宗事仁皇帝解之曰某欲但為忠耳后既上賓仁皇帝每曰某心行不佳後竟除平章事蓋仁皇帝盛徳大度不念舊惡故也自某公死某公為作碑誌極其稱贊天下無復知其事者矣某公受潤筆帛五千端云王冀公久被真廟異眷晩居政府某州妖獄發盡以中外士大夫與妖人徃來歌詩聞有云左僕射中書門下平章事王欽若真廟面責之冀公辨數四終不置則頓首曰臣官工部尚書安敢擅增至左僕射此理明甚而聖意終不解者無他蓋臣福謝耳竟坐䇿免云范直方誦忠宣答徳孺論邊事書云大輅與柴車争逐明珠與瓦礫相觸君子與小人鬭力中國與外域較勝負不惟不可勝兼亦不足勝雖勝亦非也嗚呼甚盛徳之言也范文正公曰吾遇夜就寢即自計一日飲食奉養之費及所為之事果自奉之費與所為之事相稱則鼾鼻熟寐或不然則終夕不能安眠明日必求所以稱之者趙韓王㣲時求唐太宗骨𦵏昭陵下吕汲公帥長安醴泉民析居争唐明皇腦骨訟于府曰得者富盛汲公取𦵏泰陵下盧多遜南遷度大庾嶺憩一小家其媪頗能語言多遜詳問之則曰我中州仕族有子官亦浸顯為宰相盧多遜挾私逺竄以死多遜中懷毒螫專犯法禁我留此嶺上以俟其過多遜之行甚窶媪固不識即倉皇避去蘇子由謫雷州不許占官舍遂僦民屋章子厚又以為强奪民居下本州追民究治以僦劵甚明乃已不一二年子厚謫雷州亦問舍于民民曰前蘇公來為章丞相㡬破我家今不可也其報復如此錢塈徳基為予言吾家先王歴唐末五季有兹呉越順事中國不敢效他覇府之僭恭俟真主之出即奉版籍歸於職方氏故自國朝以來學士大夫以忠孝名吾家無一議者至歐陽公始云得封落星石為落星山制書知呉越亦嘗改元寳正著于史矣又歸田録書思公子弟一嵗四五竊公珊瑚筆格幸其以錢贖之若果然何子弟之不肖也思公尹洛日歐陽公出幕下特以國士遇之豈子弟中有不相驩者邪李王煜以太平興國三年七月七日生日錢王俶以雍熙四年八月二十四日生日皆與賜器幣中使燕罷暴死並見國史周世宗得李氏與契丹求援蠟書以為名下淮甸藝祖得孟氏結太原蠟書以為名下蜀二事正同漢唐宦者可謂盛矣然官不至師保也一劉鋹有宦者七千餘人始有為師保者藝祖既縛鋹以來鑒其禍内侍不許過供奉官又鋹之宫輒名龍徳云張侍中耆遺言厚葬晏丞相殊遺言薄葬二公俱葬陽翟元祐中同為盜所發侍中壙中金玉犀珠充塞盜不近其棺所得已不勝負皆列拜而去丞相壙中但瓦器數十盜怒不酬其勞斵棺取金帶亦木也遂以斧碎其骨厚葬免禍薄葬致禍楊王孫之計疎矣蜀靖恭先生楊匯源澈資介潔生逺方于朝廷故實學士大夫譜牒皆能通貫其于中國之士范端明景仁内翰純夫尚書蘇子瞻門下侍郎子由外不論也杜門委巷之下著書賦詩人無知者獨予先君嘗薦于朝曰成都府布衣楊匯學行甚髙志節甚苦于本朝典禮故家氏族奇字異書無所不知杜門陋巷若將終身當崇尚廉恥招徠逸遺之日如匯者委棄逺方誠為可惜伏望朝廷特加聘召亦不報竟死于委巷之下藏書萬籖古金石刻本過六一堂中集古録所有者予校中祕書間為信安郡王孟仁仲言之王一日侍上燕語及靖恭先生事上為之一嘆將詔予許其家以書以金石刻本來上會予謝病去後先生之子知狀乃盡以其書其金石刻本投一部刺史曰上久欲得此為我易一官如何部刺史知其不肖紿曰諾盡私有之遺以酒漿數壺耳歐陽公在政府寄潁州處士常秩詩云笑殺汝隂常處士十年騎馬聴朝雞公將休致又寄秩詩云賴有東鄰常處士披蓑戴笠伴春鋤蓋公先為潁州得秩于民伍中殊好之至公休致歸每接賓客必返退士初服秩已從王荆公之招公獨朝章以見愧之也秩入朝極其諛佞遂升次對蚤日著春秋學數十卷自許甚髙以荆公不喜春秋亦絶口不言匿其書不出適兩河嵗惡有㫖青苗錢權倚閣王平甫戲秩曰君之春秋亦權倚閣矣後神宗遇秩浸薄荆公亦鄙之秩失節怏怏如病狂易或云自裁以死荆公尚表于墓蓋其失云聞見後録卷二十二

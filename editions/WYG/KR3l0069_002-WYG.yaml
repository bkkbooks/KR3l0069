body:
  text: 聞見後錄卷二宋邵博撰建炎元年五月二日手詔建炎元年五月二日門下中書省樞宻院同奉聖㫖宣仁聖烈皇后保佑哲宗有安社稷大功姦臣懐私誣蔑聖德著在國史以欺後世可令國史院别差官摭實刋修播告天下其蔡確蔡卞邢恕蔡懋三省取㫖行遣仍不得引用建炎元年五月一日勅哲廟實錄先是元豐七年三月大燕中燕延安郡王侍王珪率百官賀及升殿又諭王與珪相見復分班再拜稱謝是冬諭輔臣曰明年建儲當以司馬光吕公著為師保神宗彌留后勅中人梁惟簡曰令汝婦製一黄袍十嵗兒可衣者宻懐以來蓋為上倉猝踐祚之備神宗太母所以屬意于上者確然先定無纎介可疑邢恕傾危士也少游光公著間蔡確得師保語求所以結之者而深交恕確為右僕射累遷恕起居舍人一日確遣恕要后姪光州團練使公繪寧州團練使公紀辭不往明日又遣人招至東府確曰宜往見邢舍人恕曰家有桃著白華可愈人主疾其說出道藏幸留一觀入中庭紅桃華也驚曰白華安在恕執二人手曰左丞相令布腹心上疾未豫延安沖幼宜早定議岐嘉皆賢王也公繪等懼曰君欲禍吾家徑去已而恕反謂后與珪為表裏欲捨延安而立其子顥賴已及惇確得無變確使山陵韓縝簾前具陳恕等所以誣太后者使還言者暴其姦再貶知道州確尋竄新州劉摯拜右僕射恕黨與謫監永州酒稅紹聖二年除恕待制知青州章惇蔡卞執政謀所釋憾于元祐舊臣者知恕險鷙果于誕妄又銜摯等黜已方思有所逞為確報投荒之怨召為御史中丞于是日夜論劉摯梁燾王岩叟等謀廢立又造司馬光送范祖禹赴召有主少國疑訓事慮語以實后屬意徐邸之謗又訹髙士京上書告王珪嘗令髙士充問其父遵裕偵太后之意欲誰立遵裕叱遣士充乃去又教確之子渭進及甫廋語書有司馬昭之心路人所知等語以斥渭摯等有廢上謀惇卞起同文館獄使蔡京安惇窮治于是時中人郝隨日夜媒孽稱制時中眩惑左右惇卞交關謀議奉行文書于外作追廢太皇太后詔請上宣讀于靈殿欽聖獻肅皇太后欽成皇后苦要上語甚悲曰吾二人日侍崇慶天日在上此語曷從出且上必行此亦何有于我上感悟取惇卞奏就燭焚之禁中相慶而隨等不恱明日惇卞理前請上怒曰卿等不欲朕入英宗神御殿乎抵其奏于地同文之獄追逮后殿御藥官張士良脅以刀鋸鼎鑊無所得又適有星變詔曰朕遵祖宗遺志未嘗戮誅大臣釋勿治恕徒以詘于進取極口造言仇政事以逞適惇卞用事凶德參㑹捨不利之謀無以激怒人主廢辱之禍幾上及于君親曽不以為忌而尚何有于臣下之家推迹讒口開禍亂原雖江充息夫躬尚何以加上尤善知人灼見是非邪正以照臨百官中外㒺有遁情如謂嘉問居後輩誠不可用留邢恕于朝置周秩言路必無安静之理皆切中蒐慝御史中丞傅堯俞諫議大夫梁燾范祖禹右正言劉安世殿中侍御史朱光庭交章論確怨謗不道人臣所不忍聞按確與章惇黄履邢恕在元豐末結為死黨自謂聖主嗣位皆有定䇿之功確所謂桀傲狠愎無所忌憚若不早辨白解天下之疑恐嵗月浸久邪說得行離間兩宫有傷慈孝于是太皇太后御延和殿宣諭三省樞宻院大臣曰皇帝是神宗長子子承父業其分當然昨神宗服藥既久曾因宰執大小吾以皇子所書佛經宣示是時衆中惟首相王珪因奏延安郡王當為皇太子餘人無語確有何䇿立之功若他日復來欺㒺上下豈不為朝廷之害遂謫確英州别駕新州安置仍給遞馬發遣惇履恕亦皆得罪曾丞相布手記三省用蔡祖洽言追貶王珪昌化軍司户㕘軍追賜第遺表恩例及子孫等如劉摯等指揮再對來及奏事上遽宣諭王珪當先帝不豫時持兩端又召遵裕子與議事當時黄履曽有文字論列及同列敦迫其後方言上自有子布云此事皆臣等所不知但累見章惇邢恕等道其畧不知黄履章疏在否上云有布等聞禁中無此意履曾于紹聖初錄奏此三省又令履錄私藁以為質證是日又聞蔡渭上書言文及甫元祐中以書抵邢恕云劉摯傅堯俞梁燾輩有師昭之迹又云此輩皆不樂鷹揚又言必欲置眇躬于快意之地而後已而恕嘗以此書示蔡確三省召恕問之有實遂令恕繳奏有㫖令蔡京安惇根究書中目傅為粉燾為昆蓋以箕子況之也鷹揚謂其父及甫云此輩不樂其父不敢妄進師昭之說乃詆訐之語至于眇躬不知何謂執政有以為指斥者余以問䕫言此輩有此心余云有心須有迹䕫云無迹即無事沖云此事可大可小蓋言眇躬若文及甫自謂即無他矣然元祐中人自分兩黨其相詆訐乃至于此可因恕碩交通尤可駭梁燾卒余謂子中云早知此則不復力陳矣子中云不然其他所陳有補者不一亦不為徒發子中又云對留甚矣衆皆云有如中丞之對也先是紹聖初蔡確母明氏有狀言邢恕云梁燾曽對懐州致仕人李詢言若不誅確于徐邸豈得穏便尋不曾施行既而因及甫唐老事蔡謂曰䕫云唐老事何足治何不治梁燾䕫遂檢明氏狀進呈下究問所推治究問所以問云恕得之尚朱遂召朱赴闕朱所陳恕語云得之李詢又下詢問狀云實聞燾此語遂欲按燾而徙之也自去嵗因蔡碩言文及甫嘗有書抵邢恕云劉摯有師昭之心行道之人所共知也遂下恕取文及甫書恕以聞遂差蔡京安惇置究問公事所以别試所攝及甫詰之云得之父彦博終無顯狀京又令及甫疏摯黨人納于上前于龔源孫諤輩皆是以及甫言未可施行蓋謂摯等與陳衍等交通有廢立之意乃栁州安置召宦者張士良與衍同為御藥主宣仁閤中文字而言亦無顯狀但云衍嘗預知來日三省所奏事作嘗記與太母為酬荅執政之語太母每垂簾但誦之而已又言太母彌留時衍可否二府事及用御寶皆出于衍而不以禀上也既而獄終未決也及甫置在西京士良寄禁府司晁待制說之撰邢尚書之子居實墓表中語曰予嘗謂趙括少談兵而父奢不能難者非不能難也不欲恕之也劉歆之異同其父向非為欺父也漢庭與新室不可並處也如惇夫于尚書公則子欺父而不能難者也是曾參之事㸃也非元之事曾參也移此作忠顧惟古之大臣哉嘆夫古人之不夀者予得二人焉王子晉年十有五識聖賢治亂之原而極天人生死之符顔子年二十有九頽然陋巷中有為邦之志夫子告之以四代之禮樂所謂具體而㣲晉果如顔子哉其次則又有二揚雄之子童烏九嵗而存則𤣥當著明無待于侯芭魏武之子倉舒十三而存則漢之存亡雖未可知必不至于殺荀文若輩矣則惇夫夀天之係者可勝言耶黄著作庭堅荆江亭詩曰魯中狂士邢尚書自言挾日上天衢敦夫若在鐫此老不令平地生﨑嶇敦夫名居實早死尚書公子也王宗丞鞏聞見錄著王棫事武臣王棫為邢恕教令上書誣宣仁于哲宗有異心恕又教蔡渭等上書論元祐及元豐末等事其書一篋悉存皆恕手筆其間塗竄者非一棫于哲宗朝論之得閤門職名既死其子直方時出恕之書以示親宻者自元豐末至宣仁上仙無不被誣者于王珪尤甚直方死其書歸晁載之云后當元豐末垂簾聽政保佑哲宗皇帝起司馬光為宰相天下歸心焉九年之間朝廷清明海内乂安人到于今稱之其大公至正之道仁民愛物之心可以追配仁宗至于力行祖宗故事抑絶外家私恩當是時耆老盛徳之士田野至愚之人皆有復見女中堯舜之語且功德巍巍如此天下歌誦如彼而一邢恕搆造無根之語以為謗議使後世疑焉如日月之明而浮雲蔽之臣不勝痛恨初元豐中髙遵裕大敗于靈武責散官安置未幾神宗崩哲宗嗣位宰臣蔡確以謂遵裕者宣仁之族叔也即建請牽復以恱宣仁之意而不知宣仁之不私其親也宣仁簾中宣諭曰遵裕喪師數十萬先帝緣此震驚悒悒成疾以至棄天下今肉未寒吾豈忍遽私骨肉而忘先帝推恩獨不可及遵裕確謀大沮後確謫知安州作詩譏訕坐貶新州而邢恕乃確之腹心也偶與遵裕之子士京中山同官遂以垂簾時不推恩牽復事激怒之使上書言王珪曾遣遵裕之子士充來議䇿立事遵裕斥去之士京庸懦不識字實恕教之為書士充疎逺小臣素不識珪珪安得與之議社稷大計又何從輒通宫禁語言且上書時珪遵裕士充亦皆死矣何所考按臣竊聞元豐八年時政記即蔡確所修也其載三月中䇿立事甚詳河嘗有一疑似之言恕之本心但謂不顯王珪異同則難以歸功蔡確而不知辱誣聖母之罪大也恕之為人非獨有識之士無取其子居實亦不樂其父所為也天下皆知之章惇排斥元祐者也在簾前奏事悖傲不遜都堂㑹議以市井語誚侮同列豈忠厚君子哉尚云極力以消除徐王覬覦之謗惇與王珪蔡確同為執政受顧命使當時果有異同豈肯復為此言乎則恕之謗可謂欺天矣紹聖中蔡卞獨倡追廢聖母之議幸哲宗仁孝不聽其說不然人神痛憤失天下心為後世笑悔可及乎自比年以來天變屢作禍亂繁興水旱相仍夷狄内侮安知非祖宗在天之靈赫怒于斯耶至于髙氏一族銜寃抱恨無所伸雪亦足以感傷和氣召致災祥未必不由此也臣竊惟聖人之德莫先于孝祖廟帝王之政必急于明是非陛下即位以來登用賢俊退斥姦邪如追贈司馬光等既已辨人臣之謗而明是非矣而宣仁聖烈皇后者神宗之母陛下之曾祖母也負謗三十餘年公卿大臣未嘗以一語及之可不痛乎范純仁遺表有云宣仁之誣謗未明使純仁在朝廷必能辨之也臣願陛下勅有司檢求案牘推究言語之端發之于誰何其證佐安在則小人之情見矣誕發明詔曉諭中外逺邇臣民疑議消釋渙然如春冰之遇太陽豈不快乎然後以䇿告宣仁及神祖廟上以慰在天之靈下以解人神之憤昔漢靈帝夢威宗怒其責宋皇后周成王時皇天動威彰周公之德以此知宗廟之靈禍福之變甚可懼也宣仁之謗臣以為陛下惟不聞耳聞而不辨豈所謂教天下以孝乎臣不勝區區之情惟陛下裁擇臣端友惶恐昩死再拜聞見後錄卷二

  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0069_WYG_018-1a, image: WYG1039/WYG1039-0300a.png}
body:
  text: 聞見後録卷十八宋邵博撰歐陽公每哦太白三山半落青天外二水中分白鷺洲之句曰杜子美不道也豫謂約以子美律詩青天外其可以白鷺洲為偶也退之石鼓詩體子美八分歌也羲農去我久舉世少復真汲汲魯中叟彌縫使其淳鳳鳥雖不至禮樂暫時新洙泗輟微響漂流逮狂秦詩書復何罪一朝成灰塵區區諸老翁為事誠殷勤如何絶世下六籍無一親終日馳車去不見所問津若復不快飲空負頭上巾但恨多謬誤君當恕醉人豫昔與蘇仲虎會清溪真覺僧房客有出東坡書淵明此詩者仲虎曰大父平生愛寫此詩于士友間數見之豫曰伏羲神農出上古所謂莫之為而任其自然下此始有傳然事多偽而不實孔子特彌縫之使天下後世曰聖人而不敢議功德被于堯舜以降其賢豈不遠哉如汲郡魏襄王冡中所得竹簡文字淵明固不廢也東坡論武王非聖人不知言者已駭然不服其可與論淵明此意也仲虎不覺起立曰可畏哉淵明故反曰吾醉中謬言當恕也劉中原父望歐陽公稍後出同為昭陵侍臣其學問文章勢不相下然相樂也歐陽公喜韓退之文皆成誦中原父戲以為韓文究每戲曰永叔于韓文有公取有竊取竊取者無數公取者粗可數永叔贈僧云韓子亦嘗謂收斂加冠巾乃退之送僧澄觀我欲收斂加冠巾也永叔聚星堂燕集云退之嘗有云青蒿倚長松乃退之醉留孟東野自慙青蒿倚長松也非公取乎歐陽公以退之讀墨子不相用不足為孔墨為叛道中原父笑曰永叔無傷事主也杜子美飲中八仙歌其句云左相日興廢萬錢飲如長鯨吸百川銜杯樂聖稱世賢世賢二字殆不可曉或云世字當作避字寫本誤也蓋左相者李適之也有直聲右相李林甫姦邪適之議論數不同自免去有詩云避賢初罷相樂聖且銜杯試問門前客今朝幾箇來子美銜杯樂聖稱避賢者正用適之詩語也韓退之與孟東野鬭雞聨句有云神槌困朱亥古本云袖槌用史記朱亥袖四十斤鐵槌殺晉鄙事也韓熙載畜妓樂數百人奉入為妓爭奪以盡至貧乏無以給夕則敝衣屨作瞽者負獨絃琴隨房歌舞以丐飲食東坡謝元長老衲裙詩云欲教乞食歌姬院故與雲山舊衲衣用其事也然豫獨未達東坡之意古樂府藁砧今何在山上復有山何當大刀頭破鏡飛上天藁砧鈇也問夫何在重山出字夫出也何當大刀頭刀頭有環何時還也破鏡飛上天月半還也如李義山空看小垂手忍問大刀頭宋子京曾損歸書慿鯉尾莫令殘月誤刀頭俱用此事云杜子美贈韋左丞詩竊效貢公喜難甘原憲貧原憲貧所自不一貢公喜注引王陽入仕貢禹彈冠事雖是而無貢公喜三字豫讀劉孝標廣絶交論云王陽登則貢公喜此其自也杜子美青青竹笋迎船出日日江魚入饌來後得古本日日作白白不但于句甚偶其思致亦不同張籍老將詩云衛青不敗由天幸李廣無功為數竒古人傳誦以為佳句按漢書天幸二字乃霍去病非衛青也漢書音義數音朔則亦不可對天矣杜子美贈髙適詩云脫身簿尉中始與捶楚辭退之贈張功曹詩云判簿卑官不堪説未免捶楚塵埃間杜牧之寄姪阿宜詩云一語不中治鞭捶身滿瘡蓋唐參軍簿尉有罪加撻罰如今之胥吏也髙子勉親見山谷云爾豫初疑其不然因讀唐史代宗命劉晏考所部官善惡刺史有罪者五品以上劾治六品以下杖訖奏參軍簿尉不足道也杜審言字必簡子美大父也景龍初為國子監主簿和韋承慶山莊詩五首徑轉危峰碧橋斜缺岸妨玉泉移酒味石髓換粳香綰霧青條弱牽風紫蔓長猶言行樂少别向後池塘攢石當軒倚懸泉度牖飛鹿麛銜妓席鶴子曵童衣園果嘗難遍池蓮摘未稀卷簾先待月應在醉中歸攜琴繞碧紗搖筆弄青霞杜若幽林草芙蓉曲沼花宴逰成野客形勝得山家往往留仙步登攀日易斜野興城中發朝英物外求情懸朱紱望契動赤城遊海燕巢書閣山雞舞畫樓雨餘清更晚共坐北巖幽賞玩竒他日髙深處此時地為八水背峰作九山疑池靜魚偏逸人間鳥亦僖青溪留别興更與白雲期味其句法知子美之詩有自云舒州峰頂寺有李太白題詩夜宿峰頂寺舉手捫星辰不敢髙聲語恐驚天上人曾子山始見之不出于集中亦恐少作耳國史先大父康節傳云與常秩同召某卒不起褒矣故大父之葬門生挽詩有地下若逢常處士揶揄應笑贈官來之句古今詩人多以記境熟語或相類鮑明逺云昔如韝上鷹今似檻中猿杜子美云昔如縱壑魚今如喪家狗王荆公云昔如下擊三鶻拳今如倒曵九牛尾李太白云沙墩至梁苑二十五長亭杜牧之云故鄉七十五長亭選詩云流波戀舊浦行雲思故山太白云水忽戀前浦雲猶歸舊山嵇叔夜云委性命兮任去留陶淵明云曷不委心任去留方干云蟬曵殘聲過别枝蘇子美云山蟬帶響穿疏户韋應物云野渡無人舟自橫冦萊公云野水無人渡孤舟盡日橫王元之云謫居思遁世多病厭浮生萊公云愁多怯秋夜病久厭人生唐人云人心勝潮水相送過潯陽梅聖俞云寒潮如特送不肯過湓城元之云燒殘灰燼方分玉撥盡寒沙始見金聖俞云力槌頑石方逢玉盡撥寒沙始見金杜子美云坐飲賢人酒門聽長者車荆公云室有賢人酒門多長者車唐人云萬井閭閻皆禁火九原松柏自生煙聖俞云千門皆禁火九野自生煙劉夢得云藥性病生諳于鵠云病多諳藥性唐人云中流見樹影兩岸聞鐘聲張祐云樹影中流見鐘聲兩岸聞諸名下之士豈相剽竊者邪杜祁公齒落詩有剛須饒舌在寒不為脣亡之句時年八十其警䇿尚如此李太白詩我醉欲眠卿可去陶潛語也杜子美使君自有婦選中羅敷詩語也泥汗后土何嘗乾宋玉九辨語也杜子美無風雲出塞不夜月臨關王子韶云無風谷名不夜城名嘗親至其地如李義山錦瑟詩莊生曉夢迷蝴蝶望帝春心託杜鵑莊生望帝皆瑟中古曲名杜子美以鄭李對文章嚴僕射對望鄉臺春苜蓿對霍嫖姚正冠對吹帽又云軒墀曽寵鶴如鶴乘軒左氏傳注云軒大夫車也非軒墀之軒或以為病惟知詩者能辨之杜子美飲中八仙歌知章騎馬似乘船又天子呼來不上船用兩船字韻汝陽三斗始朝天又舉頭白眼望青天用兩天字韻蘇晉長齋繡佛前又皎如王樹臨風前又脫帽露頂王公前用三前字韻眼花落井水底眠又長安市上酒家眠用兩眠字韻牽牛織女詩蛛絲小人態曲綴瓜果中又防身動如律竭力機杼中用二中字韻李太白髙陽歌云鸕鷀杓鸚鵡杯百年三萬六千日一日須傾三百杯用兩杯字韻廬山謠云影落前湖青黛光金闕前開二峰長又翠影紅霞映朝日鳥飛不到吳江長用兩長字韻韓退之李花詩水盤夏薦碧實脆斥去不御慙其花又誰堆平地萬堆雪剪刻作此連天花用兩花字韻雙鳥詩兩鳥各閉口萬象銜口頭又百舌舊饒聲從此常低頭用兩頭字韻示爽詩冬夜豈不長達旦燈燭然又此來南北近里閭故依然用兩然字韻猛虎行猛虎死不辭但慙前所為又親故且不保人誰信汝為用兩為字韻子美太白退之于詩無遺恨矣當自有體邪杜子美詩將軍只數霍嫖姚對苑馬總歸春苜蓿嫖姚字如律當讀平聲又云杖黎妨躍馬不是故離羣離字如律當讀平聲漢書音義嫖姚字皆讀去聲音鰾鷂檀弓離羣索居釋文離字讀去聲力智反音利退之云凡為文辭宜略識字有以也王荆公以力去陳言誇末俗可憐無補費精神薄韓退之矣然喜深將策試驚密仰簷窺又氣嚴當酒暖灑急聽忩知皆退之雪詩也荆公詠雪則云借問火城將䇿試何如雲屋聽窗知全用退之句也去古人陳言以為非用古人陳言乃為是邪東坡與陳傳道書云知傳道日課一詩甚善此技雖髙才非甚習不能工蓋梅聖俞法也又韓少師云梅聖俞學詩日欲極賦象之工作挑燈杖子詩尚數十首李邯鄲諸孫亨仲云吾家有梅聖俞詩善本世所傳多為歐陽公去其尤者忌能名之或壓也豫謂歐陽公在諫路頗詆邯鄲公亨仲之言恐不實然曾仲成云歐陽公有韓孟于文詞兩雄力相當孟窮苦纍纍韓富浩穰穰郊死不為島聖俞發其藏等句聖俞謂蘇子美曰永叔自要作韓退之強差我作孟郊雖戲語亦似不平也聞見後録卷十八

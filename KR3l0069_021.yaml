body:
  text: 聞見後録卷二十一宋邵博撰趙肯堂親見魯直晩年懸東坡像于室中每蚤作衣冠薦香肅揖甚敬或以同時聲名相上下為問則離席驚避曰庭堅望東坡門弟子耳安敢失其序哉今江西君子曰蘇黄者非魯直本意東坡帥揚州曽旼罷州學教授經真州見吕惠卿惠卿問軾何如人旼曰聰明人也惠卿怒曰堯聰明舜聰明邪大禹之聰明邪旼曰雖非三者之聰明是亦聰明也惠卿曰軾學何人旼曰學孟子惠卿益怒起立曰何言之不倫也旼曰孟子以民為重社稷次之此所以知蘇公學孟子也惠卿黙然李定自鞫東坡獄勢不可向一日于崇政殿門外語同列曰蘇軾竒才也俱不敢對又曰軾前二三十年所作詩文引援經史隨問即答無一字之差真天下竒才也嘆息久之盖世之公論至讎怨不可奪也王彦霖繫年録元祐六年三月神宗實録成著作郎黄庭堅除起居舍人蘇子由不悦曰庭堅除日某為尚書右丞不預聞也已而後省封還詞頭命格不行子由之不悦不平吕丞相之專乎抑不樂庭堅也庭堅字魯直蚤出東坡門下或云後自欲名家類相失云范文正公尹天府坐論吕申公降饒州歐陽公為館職以書責諫官不言亦貶夷陵未幾申公亦罷後歐陽公作文正神道碑云吕公復相公亦再起被用于是二公驩然相約共力國事天下之人皆以此多之文正之子堯夫以為不然從歐陽公辨不可則自削去驩然共力等語歐陽公殊不樂為蘇明允云范公碑為其子弟擅于石本改動文字令人恨之文正墓誌則富公之文也先是富公自歐陽公平章其書畧曰大都作文字其間有干著説善惡可以為勸戒者必當明白其詞善惡煥然使為惡者稍知戒為善者稍知勸是亦文章之用也豈當學聖人作春秋𨼆奥微婉使後人傳之注之尚未能通又疏之疏之尚未能盡以至為説為解為訓釋為論議經千餘年而學者至今終不能貫徹曉了弼謂如春秋者惟聖人可為降聖人而下皆不可為為之亦不復取信于後矣學者能約春秋大義立法立例善則褒之惡則貶之茍有不得已須當避者稍微其詞可也不宜使後人千餘年而不知其意也若善不能勸惡不能戒則是文字將何用哉既書之而惡者自不戒善者自不勸則人之罪也于文何過哉弼常病今之人作文字無所發明但依違模稜而已人之為善固不易有遭讒毁者有被竄斥者有窮困寒餓者甚則誅死族滅而執筆者但求自便不與之表顯誠罪人也人之為惡者必用姦謀巧詐貨賂朋黨多方以逃刑戮況不止刑戮是逃以至子子孫孫享其餘䕃而不絶可謂大幸矣執筆者又畏之不敢書其惡則惡者愈惡而善人常沮塞不振矣君子為小人所勝所抑者不過禄位耳惟有三四寸竹管子向口角頭褒善貶惡使善人貴惡人賤善人生惡人死須是由我始得不可更有所畏怯而噤黙受不快活也向作希文墓誌盖用此法但恨有其意而無其詞亦自謂希文之善稍彰姦人之惡稍暴矣今永叔亦云胸臆有欲道者誠當無所避皎然寫之洩忠義之憤不亦快哉則似以弼之説為是也然弼之説盖公是公非非于惡人有所加諸也如希文墓誌中所詆姦人皆指事據實盡是天下人聞知者即非剏意為之彼家數子皆有權位必大起謗議㫁不䘏也初寳元慶厯間范公富公歐陽公天下正論所自出范公薨富公歐陽公相約書其事矣歐陽公後復不然何也予讀富公之書至汗出尚以春秋之誅為未快嗚呼可畏哉英宗初臨御韓魏公為相富鄭公為樞密相一日韓公進擬數官者策立有勞當遷官富公曰先帝以神器付陛下此輩何功可書韓公有愧色後韓公帥長安為范堯夫言其事曰琦更怕他富相公也登州有婦人阿云謀殺夫而自承者知州許遵謂法因犯殺傷而首者得免所因之罪仍科故殺傷法而敕有因疑被執招承減等之制即以按問欲舉聞意以謀為殺之因所因得首合從原減事下百官議盖鬭殺刼殺鬭與刼為殺因故按問欲舉可減以謀而殺則謀非因所不可減司馬文正公議曰殺傷之中自有兩等輕重不同其處心積慮巧詐百端掩人不備者則謂之謀直情徑行畧無顧慮公然殺害者則謂之故謀者尤重故者差輕今此人因犯他罪致殺傷他人罪雖得首原殺傷不在首例若從謀殺則太重若從鬭殺則太輕故酌中令從故殺傷法其直犯殺傷更無他罪者唯未傷則可首但係已傷皆不可首今許遵欲將謀之與殺分為兩事則故之與殺亦是兩事也且律稱得免所因之罪彼刼囚畧人皆是也已有所犯因而又殺傷人故刼畧可首而殺傷不原若平常謀慮不為殺人當有何罪可得首免以此知謀字止因殺字生文不得别為所因之罪也若以鬭殺與謀殺皆為所因之罪從故殺傷法則是鬭傷自首反得加罪一等也自廷尉以下皆嫉許遵之妄附文正公之議王荆公不知法好議法又好與人為異獨主遵議廷尉以下爭之不可得卒從原減至荆公作相謀殺遂立按問舊法一問不承後雖自言皆不得為按問時欲廣其事雖累問不承亦為按問天下非之至文正公作相立法應州軍大辟罪人情理不可憫刑名無疑慮輒敢奏聞者並令刑部舉駮重行朝典不得用例破條盖祖正以來大辟可憫與疑慮得奏裁若非可憫非疑慮則是有司妄讞以幸寛縱豈除暴惡安善良之意乎文正公則辟以止辟正法也荆公則姑息以長姦非法也至紹聖以來復行荆公之法而殺人者始不死矣予嘗謂後漢張敏之議可為萬世法曰孔子垂經典皋陶造法也原其本意皆欲禁民為非也或以平法當先論生臣愚以為天地之性唯人為貴殺人者死三代通制今欲趣生反開殺路一人不死天下受敝記曰利一害百人去城郭夫春生秋殺天道之常春一物枯即為災秋一物華即為異王者承天地順四時法聖人從經律而已盖與司馬文正之議合也蘇黄門初嫉許遵之讞後復云遵子孫多顯者豈能活一人天理固不遺哉亦非也使妄活殺人者可為隂功則被殺者之寃豈不為隂譴乎韓魏公自外上章歴數王荆公新法害天下之狀神宗感悟諭執政亟罷之荆公方在告乞分司趙清獻公參政事曰欲俟王安石出令自罷之荆公既出疏駮魏公之章持其法益堅卒至敗亂天下識者于清獻公有遺恨焉先人嘗言熙寧元豐間司馬文正范忠宣先後為西都留臺吾皆從之遊至元祐初文正起為宰相忠宣起為樞密使吾見之其話言服用一如在西都時但忠宣顔色甚澤文正清苦無少異吾以此窺忠宣其中豈尚以名位為樂邪予見司馬文正公親書一帖光年五六嵗弄青胡桃女兄欲為脱其皮不得女兄去一婢子以湯脱之女兄復來問脱胡桃皮者光曰自脱也先公適見訶之曰小子何得謾語光自是不敢謾語後公以誠學授劉器之曰自不謾語入東坡書公神道之石亦曰論公之徳至于感人心動天地巍巍如此而蔽以二言曰誠曰一云韓忠獻公宋景文公同召試中選王徳用帶平章事例當謝二公有空疎之謙言徳用曰亦曾見程文誠空疎少年更宜廣問學二公大不堪景文至曰吾屬見一老衙官是納侮也後二公俱成大名徳用已薨忠獻為景文曰王公雖武人尚有前輩激勵成就後學之意不可忘也予得之李先仲王公外孫云文彦博本姓敬其曾大父避石晉髙祖諱更姓文至漢復姓敬入本朝其大父避翼祖諱又更姓文初敬氏避諱各用其一偏或為文氏或為茍氏然敬字從著已力切音棘非茍也從支非文也俱非其一偏也蘇東坡既貶黄州神宗殊念之嘗語宰相王珪蔡確曰國史至重可命蘇軾成之珪有難色又曰軾不可姑用曾鞏鞏為檢討官先進太祖總論已不當神宗之意未幾罷去東坡自黄崗移汝墳舟過金陵見王荆公于鍾山留連燕語荆公曰子瞻當重作三國書東坡辭曰某老矣願舉劉道原自代云元豐末司馬文正資治通鑑成進御丞相王珪蔡確見上問何如上曰當畧降出不可久留又咨嘆曰賢于荀悦漢紀逺矣罷朝中使以其書至政事每葉縫合以睿思殿寳章睿思殿上禁中觀書之地也舍人王震等在省中從丞相來觀丞相笑曰君無近禁臠以言上所愛重者聞見後録卷二十一

body:
  text: 聞見後録卷十七宋邵博撰嘉祐六年三月仁皇帝幸後苑召宰執侍從臺諫館閣以下賞花釣魚中觴上賦詩晴旭暉暉花盡開氤氲花氣好風來游絲罥絮縈行伏墮蘂飄香入酒杯魚躍紋波時潑剌鶯流深𣗳久徘徊青春朝野方無事故許歡遊近侍陪宰相韓琦樞密曽公亮參政張忭孫抃副樞歐陽修陳旭以下皆和帝獨稱賞韓琦輕隂閣雨迎天步寒色留春送夀杯之句時翰林學士承㫖宋祁久疾在告明日和詩來上帝覽之已悵然不數日祁薨益加震悼云真宗嘗問楊大年見比紅兒詩否大年失對每語子孫為恨後諸孫有得于相國寺庭雜賣故書中者蓋唐末羅蚪羅鄴羅𨼆兄弟俱有文時號三羅蚪登科從事坊州有營妓小字紅兒先為郡將所嬖人不敢近蚪亦悅之郡將不能容蚪棄官去然于紅兒猶不忘也擬諸美物作比紅兒詩百首事出托言亦略見太平廣記中大年不知何也嘉祐中侍從官列薦國子博士梅堯臣宜在館閣仁皇帝曰能賦一見天顔萬人喜卻回宫路樂聲長者也蓋帝幸景靈宫堯臣有詩或傳入禁中帝愛此二語召試賜等竟不登館閣以死兖州之東有漏澤每夏中頻雨則積水彌望至秋分後聲起水中如雷一夕盡涸初不可測竒石林立或尋其下得穴水自此入李衛公平泉有石刻字曰漏澤作亭其前曰魯石有詩云魯客持相贈瓊瓌乃不如者兖之漏澤石也國史補載韓退之好竒與客登華山絶峯度不可返發狂慟哭賴華隂令百計取得之或云無是事豫讀退之答張徹詩云洛邑得休告華山窮絶陘倚巖睨海浪引袖拂天星日駕此回轄金神所司刑泉紳拖修白石劒攢髙青磴蘚澾拳局梯颷颭伶俜悔狂已咋齒垂誡仍鐫銘可信國史補不妄韓退之使鎮州題壽陽驛云風光欲動别長安春半邊城特地寒不見園花并巷栁馬頭唯有月團團鎮州歸再賦云别來楊栁街頭𣗳擺撼春風祇欲飛還喜小園桃李在留花不發待郎歸孫子陽為豫言近時夀陽驛發地得二詩石唐人跋云退之有倩桃風栁二妓歸途聞風栁已去故云後張籍祭退之詩云乃出二侍女合彈琵琶筝者非此二人邪錢昭度有食梨詩云西南片月充腸冷二八飛泉繞齒寒豫讀樂府解題井謎云二八三八飛泉仰流蓋二八三八為五八五八四十也四十為井字黃魯直詩云山椒欲雨好雲氣湖面迎風生水紋汪彥章用其體云野田無雨出龜兆湖水得風生縠紋昔宋景文問晏元獻劉夢得瀼西春水縠紋生生字當作何義元獻云作生于縠紋意不合當作生熟之生景文歎服以為妙語今彥章以生對出則作生長之生矣豈不聞元獻之說邪王元之濟州人年七八嵗已能文畢文簡公為郡從事始知之聞其家以磨麵為生因令作磨詩元之不思以對但存心裏正無愁眼下遲若人輕著力便是轉身時文簡大竒之留于子弟中講學一日太守席上出詩句鸚鵡能言爭似鳳坐客皆未有對文簡寫之屏間元之書其下蜘蛛雖巧不如𧖟文簡歎息曰經綸之才也遂加以衣冠呼為小友至文簡入相元之已掌書命矣唐人知貢舉者有詩云梧桐葉落井亭隂鎖閉朱門試院深嘗是昔年辛苦地不將今日負初心後為下第者裁作五言以誚之出嵐齊記嘗見南唐李侯撮襟書宫人慶奴扇云風情漸老見春羞到處銷魂感舊逰多謝長條似相識强垂煙態拂人頭唐荆州每解送舉人多不成名號曰天荒至劉蛻舍人以荆州解及第號破天荒東坡嘗以詩二句遺瓊州進士姜唐佐滄海何曾斷地脈白袍端合破天荒用此事也題其後云待子及第當續後句後唐佐自廣州隨計過許昌見潁濱時東坡已下世相持出涕潁濱為足成其詩云生長茅間有異方風流稷下古諸姜適從瓊管魚龍窟秀出羊城翰墨場滄海何曾斷地脈白袍端合破天荒錦衣他日千人看始信東坡眼目長李士寧蓬州人有異術王荆公所謂李生坦蕩蕩所見實竒哉者熙寧中宗室世居獄連士寧吕惠卿初叛荆公欲深文之以侵荆公神宗覺之亟復相荆公荆公平生好辭官不復辭自金陵連日夜以來惠卿罷去士寧止從編置初士寧贈荆公詩多全用古人句荆公問之則曰意到即可用不必皆自已出又問古有此律否士寧笑曰孝經孔子作也每章必引古詩孔子豈不能自作詩者亦所謂意到即可用不必皆自己出也荆公大然之至辭位遷觀音院題薛能陸龜蒙二詩于壁云江上悠悠不見人十年一覺夢中身殷勤為解丁香結放出枝頭自在春蠟屐尋苔認舊蹤隔溪遙見夕陽舂當年諸葛成何事只合終身作卧龍用士寧體也後又多集古句如胡笳曲之類不一夫子曵杖之歌有泰山其頺哲人其萎之語唐天寶中長安雨木氷寧王薨謠曰冬凌𣗳稼達官怕熙寧中京師雨木氷又華山崩阜頭谷數千百丈壓七村之人時王荆公為相變亂典常徵斂財利識者危之適韓魏公薨荆公作挽詩云木稼曽聞達官怕山頽果見哲人萎遂以魏公當之潘邠老云花妥鶯梢蝶溪喧獺趂魚妥音墮乃韻邠老不知秦音以落為妥上聲如曰雨妥花妥之類少陵秦人也唐詩家有假對律曰牀頭兩甕地黃酒架上一封天子書又三人鐺腳坐一夜掉頭吟又鬚欲霑青女官猶佐子男等句是也或鄙其不韻如杜子美枸杞因吾有雞棲奈汝何又飲子頻通汗懷君想報珠杜牧之當時物議朱雲小後代聲名白日懸亦用此律也經來白馬寺僧到赤烏年唐僧靈徹語東坡海㑹殿上梁文全取之陶淵明讀山海經詩云形夭無千嵗蓋校本之誤乃形天舞干戚耳按山海經海中有獸名形天每出水必銜干戚而舞云王荆公步月中山蔣穎叔為發運使過之傳呼甚寵荆公意不悅穎叔喜談禪荆公有詩云怪見傳呼殺風景不知禪客夜相投按李義山雜纂殺風景門月下傳呼用此事唐史中和四年六月時普以黃巢首上行在者僞也東西二都舊老相傳黃巢實不死其為尚讓所急陷太山狼虎谷乃自髠為僧得脫往投河南尹張全義故巢黨也各不敢識但作南禪寺以舍之豫數至南禪壁間畫僧巢也其狀不逾中人唯正蛇眼為異耳老人言更有故寫真絹本尤竒巢題詩其上云猶憶當年草上飛鐵衣脫盡挂僧衣天津橋上無人識獨憑闌干看落暉為李易初取也慶厯中翰林侍讀學士淑守鄭州題周少主陵云弄耜牽車挽鼓催不知門外倒戈回荒墳斷隴才三尺剛道房陵半仗來時上命淑作陳文惠公堯佐墓銘淑書堯佐好為小詩間有竒句及有尫愎弗咸等語陳氏子弟請易去淑以文先奏御不可易陳氏子弟恨之刻淑周陵詩于石指倒戈為謗上亦以藝祖應天順人非逼伐而取之落淑學士淑上章辨尚書之義蓋紂之前徒自倒戈攻紂非武王倒戈也上知淑深于經術待之如初宋內翰祁曰白公云户大嫌甜酒才髙笑小詩其獻臣之謂乎獻臣淑之字也為文尤古奧有樊宗師體王羲之傳山隂道士好養鵝羲之往觀意甚悅欲得之道士云為寫道德經當舉羣相贈羲之欣然寫畢籠鵝以去李太白送賀監詩乃云鑑湖流水春始波狂子歸舟逸興多山隂道士如相見應寫黃庭換白鵝世人有以右軍寫黃庭經換鵝者又承太白之誤耳李太白俠客行云事了拂衣去深藏身與名元微之俠客行云俠客不怕死怕死事不成事成不肯藏姓名或云二詩同詠俠客而意不同如此豫謂不然太白詠俠不肯受報如朱家終身不見季布是也微之詠俠欲有聞于後世如聶政姊之死恐終滅吾賢弟之名是也少陵陶冶性情存底物本顔之推至于陶冶性情從容諷諫入其滋味亦樂事也又少陵悲君隨燕雀薄宦走風塵本陳勝與人傭耕之語也又少陵上君白玉堂侍君金華省本班固自敘時上方嚮學鄭寬中張禹朝夕入說尚書論語金華殿中也又少陵露井凍銀牀本晉書樂志淮南篇後園鑿井銀作牀金瓶素練汲寒漿也又少陵春水船如天上坐本沈雲卿船如天上坐人似鏡中行船如天上去魚似鏡中懸也或以此論少陵之妙豫謂少陵所以獨立千載之上者不但有所本也三百篇之作果何本哉聞見後録卷十七

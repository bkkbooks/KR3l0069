body:
  text: 聞見後録卷三十宋邵博撰政和戊戍夏六月京師大雨十日水暴至諸壁門皆塞以土汴流漲溢宫廟危甚宰執廬于天漢橋上一餅師家蚤起見有蛟螭伏于户外每自蔽其面若羞怖狀萬人聚觀之道士林靈素方以左道用事曰妖也捶殺之四郊如江河不知其從出識者已知為兵象矣林靈素專毁佛泗州普照王塔廟亦廢當水暴至遽下詔加普王六字號水退復削去先當制舍人許翰以詞太褒得罪盧立之尚書云宣和末禁中數有變異曰摧音內者為甚毒夜久有巨人呼摧云遇人必撤裂之中官有膽勇者數輩相約俟其出迫逐之巨人返走墜一物鏗然有聲取視之乃內帑所藏鐵幞頭也趙正之云禁中舊有此怪不出仙韶院至宣和末始遍出宫殿中云宫官盧功裔云宣和末鬼車瀝血于福寧殿庭又有狐登御坐又內殿磚砌上忽有積血遽視之復出去磚亦出發地亦出至廢其殿云李瑺云宣和末為洛陽縣尉有職事在西宫一龍夏伏起宫中者無虛日殆數百處初固異之未幾金人入洛宫遂焚張浮休云向謫郴江夏日在寓舍伴羣兒讀書次忽天際一船載人物如行水上久之方沒三峽中石壁千萬仞飛鳥懸猿不可及之處有洞穴纍棺槨或大或小歷歷可數峽中人謂仙人棺槨云按隋唐嘉話將軍王果于峽口崖側見一棺將墜遷之平處得銘云後三百年水漂我欲墜不墜逢王果今洞穴在懸絶石壁千萬仞之上唯大禹初鑿三峽道岷山之江時人迹或可至不在崖側不止三百年也望其棺槨皆完好如新不知果何物為之亦異矣長安乾明寺唐太廟也庭中有星隕石狀如伏牛有手迹四足迹二如印泥然故老云武氏革命日隕又興平一道觀中有星隕石如半柱滿其上皆繫痕豈果繫于空中邪殆不可知也旁有石記西晉時隕熙寧中少華山崩壓七村之人不可勝計先是穴居虎豹之屬盡避去人獨不知遂罹禍山以夜崩聲震百里外州距山才二十里初不聞其異如此元符年衆人宿岐山縣客邸明日一人亡其首無血官捕殺者踰年竟不得或云俠客氣劒中人無血政和年河中府早宴罷營妓羣行通衢中忽暴風起飛劒滿空或截髻或翦鬢或創靣俱不死亦不傷他人或云劒俠為戲耳豫親見之殿中丞丘舜元閩人也舟沂汴遇生日􅋈津亭家人酌酒為夀忽昏睡夢登岸過林薄至一村舍主人具飲食既覺行岸上皆如夢中所見至村舍有老翁方撤席如賓退者問之曰吾先以是日亡一子祭之耳舜元默然知前身為老翁子也厚遺之以去歐陽公嘗夢為鸜鵒初夏清曉飛鳴緑隂中甚樂劉法欲生其母幃帳忽若墜壓而下視之上有大蛇蜿蜒若被痛楚狀母怖甚避之他所法生再視之但蛇蛻耳後法為將有賢稱崇寧興儒學則刑舉子之無賴者宣和興道學則刑道士之無賴者坐此謫官久之以節度使檢校少師帥熙河童貫盡取本道精兵去俾用老弱下軍深入䇿應遂陷貫方奏捷反以不稟節制聞士大夫寃之王荆公在鍾山乘驢薄莫行荒村中有婦人䝉首執文書一紙遮公曰妾有寃訴公喻以退居不預公事當自州縣理之婦人曰妾寃訴關相公乞留文書一觀公不能卻令執藥囊老兵取收至半山園視之素紙一幅耳公以是月薨猶子防為王性之云滕章敏公達道帥青社一夕㑹其屬酒半教官頓起家有急公先送之去坐客皆散立前後公來共見一無頭偉人著錦袍坐于主席公與客俱辟易不敢前少時作黑霧散去公親為王樂道云近李西美帥成都士陳甲者館于便齊夜月色中有危髻古裳衣婦人數輩語笑前花圃中甲殊不顧有甚麗者誦詩舊時衣服盡雲霞不到迎仙不是家今日樓臺渾不識只餘古木記宣華又小雨廉纎梅子黃晚雲收盡月侵廊𣗳隂把酒不成醉何處無情枉斷腸忽不見今府第故蜀宫豈當時宫女尚有鬼耶按蜀檮杌宣華故苑名近种湘守叙州壞客館為東園警夜兵共見大蛇自客館出穿西樓以去樓下臨大江度其地約長十數丈明求之于館之寢有穴方廣寸尺許發之其蟠屈之迹大一間屋土色光膩如新泥飾者豈異物亦避暴役穿穴以去邪不數日湘死興元府火飛燼落天慶觀殿下古柏上柏中空盡焚臭聞逺近明日得如羊肋骨者數百枝蓋大蛇也帥楊掌武每出以視客云龎孝祖言昔提舉成都茶馬夏日坐後圃堂上忽聞其後鐵鎖鋃鐺之聲遽窺窗外一物自小池中出龍形面如猫曳其尾石砌上鱗甲有聲少頃雷雨暴作失去孝祖疑世所畫龍皆非是豫讀華嚴合論龍類最衆有如猫者豈孝祖所見乎程致仲為豫言近嵗雲齊小書出丹稜李達道遇女妖事不妄致仲親見泥金鴛鸞出入雲氣中黃色衣竒麗奪目非人間之物蓋妖所服留以遺達者又歌曲多仙語尚小書先載云李公擇之子夷曠宣和中為發運司屬薄莫抵江上亭亭吏云先有曰水太保者在焉夷曠遣吏謝之屏內云太保當避去已而老少婦人數輩𫝊呼太保來太保者一十餘嵗丱角童子耳各乘馬以去人馬皆異狀夷曠疑之遣數健步躡其後各驚懼而返云約十數里外望大潭人馬皆下投其中昔江子我為豫言後與夷曠同官成都問之信然髙駢初展成都外城後王氏孟氏相繼僞以為都其更作奢僭之力發地及泉也近靖康年帥盧立之亦增築期年役甚大至紹興年霖雨北壁壞攝帥孫渥才興工于數尺土下得髙駢石記云刻置築中後若干年當出正與其年合前纍有大役不得者數未契也高駢好異術豈亦有知數者邪傅獻簡云王荆公之生也有貛入其室俄失所在故小字貛郎歐陽公云豫作憎蠅賦蠅可憎矣尤不堪蚊子自逺喓喝來咬人也秦少游在東坡坐中或調其多髯者少游曰君子多乎哉東坡笑曰小人樊須也經筵官㑹食資善堂東坡盛稱河豚之美吕元明問其味曰直那一死再㑹又稱猪肉之美范淳甫曰奈發風何東坡笑呼曰淳甫誣告猪肉郭忠恕嘲聶崇義曰近貴全為聵攀龍即作聾雖然三箇耳其奈不成聰崇義曰吾不能詩姑以一言為謝勿笑有三耳全勝畜二心陳亞蔡襄亦云陳亞有心終是惡蔡襄無口便成衰王汾劉攽亦云早朝殿內須呼汝寒食原頭盡拜君攽又嘲王覿云汝何故見賣覿曰賣汝直甚分文其滑稽皆可書也孫傅師名覽人有投詩者曰伏惟笑覽傅師曰君無笑覽覽合笑君謂東方虬更三十年乞汝西門豹作對唐人語也今相州有西門豹祠神像衣裳之間微露豹尾韓魏公見之笑令斷去韓玉汝平生喜飾厨𫝊一飲啖可兼數人出帥長安錢穆四行詞云喜廉頗之能飯玉汝不悅又有貴人號競渡船者以其唯利是競也席大光作言官擊之曰某别名競渡船中貯無賴之小人外較必爭之微利也士大夫歡𫝊之王荆公喜說字至以成俗劉貢父戲之曰三鹿為粗鹿不如牛三牛為奔牛不如鹿謂宜三牛為粗三鹿為奔若難于遽改欲令各權發遣荆公方解縱繩墨不次用人往往自小官暴據要地以資淺皆號權發遣故并謔之劉貢父云有人不識鬭爭字以書問里先生答曰仄更切又疑更字問曰户橫切又疑橫字問曰加行切又疑行字問曰華爭切竟不知其為何音也豫嘗舉以為笑歡客有善切字者非之亦難與言也士人口吃劉貢父嘲之曰本是昌徒又為非類雖無雄才卻有艾氣蓋周昌韓非揚雄鄧艾皆口吃也客問劉貢父曰某人有𨼆過否中司將鳴鼓而攻之貢父曰中司自可鳴鼓兒老夫難為暗箭子客笑而去滑稽之為厚者也劉貢父呼蔡確為倒懸蛤蜊蓋蛤蜊一名殼菜也確深銜之馬默擊劉貢父玩侮無度或告貢父貢父曰既稱馬默何用驢鳴立占馬默驢鳴賦有冀北羣空黔南技止之警䇿亦竒才也王荆公好言利有小人諂曰決梁山泊八百里水以為田其利大矣荆公喜甚徐曰䇿固善決水何地可容劉貢父在坐中曰自其旁别鑿八百里泊則可容矣荆公笑而止豫以與優旃滑稽漆城難為䕃室之語合故書之王荆公㑹客食遽問孔子不徹薑食何也劉貢父曰本草書薑多食損知道非明民將以愚之孔子以道教人者故云荆公喜以為異聞久之乃悟其戲也荆公之學尚穿鑿類此聞見後録卷三十

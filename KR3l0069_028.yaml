body:
  text: 聞見後録卷二十八宋邵博撰鳯翔府開元寺大殿九間後壁吴道𤣥畫自佛始生修行説法至滅度山林宫室人物禽獸數千萬種極古今天下之妙如佛滅度比丘衆躃踊哭泣皆若不自勝者雖飛鳥走獸之屬亦作號頓之狀獨菩薩淡然在旁如平時畧無哀戚之容豈以其能盡死生之致者歟曰畫聖宜矣其識開元三十年云今鳯翔為敵所擅前之邑屋皆丘墟矣予故表出之古畫塑一法楊恵之與吴道子同師張僧繇學畫恵之見道子筆法已至到不服居其次乃去學塑亦為古今第一嗟夫畫一技耳尚不肻少下况于逺者大者乎曰研瓦者唐人語也非謂以瓦為研盖研之中必隆起如瓦狀以不留墨為貴百餘年後方可其平易古人用意于一研尚如此予嘗評研端石如徳人毎過于為厚或廉于才不能無底滯歙石如俊人遇輒傾倒𩔖失之輕而遇事風生無一不厭足人意能兼其才地則為絶品又滌端石竟日屢易水其漬卒不盡除歙石一濯即瑩徹無留墨亦一快耳唐氏為研説甚廣初不出此石晉時闗中有曰李處士者能補石研研已破碎留一二日以歸完好如新琢者其法不𫝊或以為異人近世薄書學在筆墨事𩔖草創于紙尤不擇唐人有熟紙有生紙熟紙所謂妍妙輝光者其法不一生紙非有喪故不用退之與陳京書云送孟郊序用生紙寫言急于自解不暇擇耳今人少有知者司馬文正平生隨用所居之邑紙王荆公平生只用小竹紙一種宣城陳氏家𫝊右軍求筆帖後世益以作筆名家栁公權求筆但遺以二枝曰公權能書當繼來索不必卻之果卻之遂多易以常筆曰前者右軍筆公權固不能用也予從王正夫父子得張義祖所用無心毫雖鋒長二寸許他人不能用亦曰右軍遺法也義祖名友正退𫝊之子居昭徳坊不下閣二十年學書盡窺右軍之妙尚以蔡君謨為淺近米元章為狂誕非合作然世無知者如其所用筆可嘆也獨王正夫父子好之云太祖下南唐所得李廷珪父子墨同他俘獲物付主藏籍收不以為貴也後有司更作相國寺門樓詔用黒漆取墨于主藏車載以給皆廷珪父子之墨至宣和年黄金可得李氏之墨不可得也黄魯直就几閣間取小錦囊中有墨半丸以示潘谷谷隔錦囊手之即置几上頓首曰天下之寳也出之乃李廷珪作耳又别取小錦囊中有墨一丸谷手之如前則嘆曰今老矣不能為也出之乃谷少作耳其藝之精如此故徳陽縣男虞祺字齊年起陵州諸生中初不知佛書也每曰誠者天之道思誠者人之道其至則一也吾知此而已當毒賦賸歛鞭箠馬牛其人之日一漕䕫再漕潼川民獨晏然倚以朝夕也間屬微疾凭几不言忽顧坐客曰古佛俱來吾亦歸矣男子允文旁立泣下又笑曰人而為佛寧不可哉客異其非君平生之言即之已逝矣明年始有更生佛事陵州民鮮逑者病死一晝夜再生具言初為黄衣逮去遇故里中少年曹生曰鄉之大夫虞君主更生事明當為更生佛亟見之前抵宫室沈沈王者冕服正坐虞君也吏問逑故為善狀逑訴力貧但一至瓦屋山見辟支佛瑞色甚勝得釋去王再敕逑過語吾家廣置更生道塲誦數更生佛名字勿怠語定白毫光自王身起直大觀闕黄金書榜大慈大悲更生如來逑洒然而悟明當虞君練祭云士陳公璜年甫九十直書其事甚備華嚴道人祖覺自大涅槃經中得更生佛因地不誣虞君不為佛學佛言直心是道塲無虚假故著其為更生佛事無疑先是彭山楊舜欽使君在田間夜夢故計吏王咨者多哀言辭去衣後穿出牛一尾使君舊與咨善驚起家人之夢亦合相語未竟外報一牛生遽取火視之牛仰首淚下嗚呼君子小人之善惡如天淵然有報亦如之予特著其畧以為世戒王子飛觀文為予言吾使三韓泛海每危于風濤翦佛書以投異物出没争奪以去至投道書則不顧鳯翔府祁陽鎮法門寺塔塟佛手指骨一節唐憲宗盛儀衛迎入禁中韓吏部表諫者塔下層為大有石芙蕖工製精妙每芙蕖一葉上刻一施金錢人姓名殆數千人宫女姓名為多如曰張好好李水水之𩔖與慈恩寺塔塼上所書同又刻白玉象所塟佛指骨置金蓮花中隔琉璃水晶匣可見予宣和中過之有老頭陀言舊多寳器唐諸帝諸王施以供佛者盡為權勢取去尚餘二水晶獸環洗亦竒物也五臺山佛光其𫝊舊矣唐穆宗實録元和十五年四月四日河東節度使裴度奏五臺山佛光寺側慶雲現若金仙乗狻㹸領其徒千萬自己至申乃滅又峩眉普賢寺光景殊勝不下五臺在唐無聞李太白峩眉山詩言仙而不言佛華嚴經以普賢菩薩為主李長者合論言五臺山而不言峩眉山又山中諸佛祠俱無唐刻石文字疑特盛于本朝也慶歴中齊州言有僧如因妖妄惑人輒稱正法一千年一刼像法一千年一刼末法一千年一刼今像法已九百六十年才餘四十年即是末刼當饑饉疾疫刀兵云云事下兩街僧録司奏正法像法三災刼等悉出大藏經論非妖皇帝但勑天下大藏經論勿妄以示人云又熙寧初神宗謂王安石曰有比丘尼千姓者為富弼言世界漸不好勿預其事可也弼信之然亦不之罪也予嘗以前聞長老言湯保衡遇漢張陵事刻石于婺中崇夀觀矣後得吕大臨與叔所作保衡𫝊尤詳盡與叔授横渠先生之道以誠以正為本可信其不誣然漢史建安二十年曹操破張魯定漢中魯祖父陵順帝時客于蜀學道鶴鳴山中造作符書以惑百姓受其道者輒出米五斗時謂之米賊陵子衡衡子魯以其法相付授自號師君其衆曰鬼卒曰祭酒曰治頭大抵與黄巾相𩔖朝廷不能討就拜魯鎮夷中郎將領漢寧太守則所謂張陵者果異人乎今道家者流祖其事不可辨云與叔湯保衡𫝊嘉祐末年京師麻家巷有聚小學者李道太學生湯保衡嘗與之游一日保衡至道學舍有一道士形貌恢偉鬚髯怪異言語如風狂人與道相接保衡見而異之既去保衡問道道曰此道士居建隆觀朝夕嘗過我我固未嘗詣之乃落魄不檢者子何問之保衡曰余居與建隆甚邇凡觀之道士皆與之識未始見此人既而保衡頗欲訪之它日保衡至道學舍復見前道士問其所止亦曰建隆既去保衡黙從之入觀門至西廊而没保衡往追尋之不復見因觀廊壁繪畫有一道士正如所見者其上題云張天師保衡心異之他日乃具冠帶伺于李道之舍道問曰子何所伺保衡佯以它語荅之凡伺三日其道士始自外至已若昬醉者與道相見如常日保衡既見正如所畫者遂出拜之稱曰天師道士辭避曰足下無過言道亦笑曰此道士安得天師之稱哉保衡再三叩請具述所見道士乃曰請以某日㑹于某地保衡曰諾如約而往道士見之曰但舉目視日十日必有所見可復會于某地保衡歸依所教視日視既久目不復眩至十日乃覩日中有人形細視之見道士在日中形貌宛然保衡復往㑹道士道士曰何所見保衡曰見天師在日中道士曰可復歸再視日百日外復有所見可再相會于某地慎勿泄也保衡如教視之家人以為風狂問之不荅逾百日乃見已形亦在日中與道士立保衡乃㑹道士具談之道士曰可教矣乃為授以符籙可以攝制鬼神其道士復不見保衡居太學中嘗喪一幼子每思之召至其前同舍生皆見之一日保衡語其友人曰予適過西車子曲見一小第門有車馬有數婦人始下車皆不以物蒙蔽其首其第二下車者年二十許頗有容色意其士大夫自外至京師者必其妻也予欲今夕就子前舍小飲當召向所見婦人觀之友人曰良家子汝焉可妄召必累我矣保衡曰非召其人乃攝其生魂聊以為戲耳然必至夜俟其寢寐乃召之若夢中至此止可逺觀慎勿近之近之則魂不得還其人必死矣遂與友人薄暮出門過其舍伺少頃聞門中有婦人聲保衡心知乃適所見婦人即吸其氣以綵綫繫其中指既而至友人學舍命僕取酒至與之對飲令從者就寢至夜保衡起開門有婦人自外至乃所見者形質皆如人但隱隱然若空中物其語聲如嬰兒見保衡拜之保衡問其誰氏具道某氏其夫適自外罷官還京師復問保衡曰此何所也適記已就寢不意至此又疑是夢寐而比夢寐差分明又疑死矣此得非隂府邪保衡曰此亦人間耳今便可歸當勿憂也命立于前欵曲與語至五更始遣去人𫝊保衡甚得召鬼之術保衡以進士及第今官為縣令云聞見後録卷二十八

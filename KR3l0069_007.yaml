front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0069_WYG_007-1a, image: WYG1039/WYG1039-0243c.png}
body:
  text: 聞見後録卷七宋邵博撰唐髙祖之起晉陽也皆次子秦王之謀髙祖謂秦王曰若事成天下皆汝所致當以汝為太子將佐亦以為請秦王屢辭太子建成喜酒色遊畋齊王元吉多過失秦王功名日盛建成內不自安乃與元吉共傾秦王各引樹黨友髙祖晚多內寵小王且二十人其母競交結諸長子以自固建成元吉曲意事諸妃嬪諂諛賂遺無所不至以求媚于髙祖或云蒸于張婕妤尹德妃秦王獨不然故妃嬪等爭譽建成元吉而短秦王秦王平洛陽妃嬪等私求寶貨并為親屬求官秦王曰寶貨皆以籍奏官當授賢才有功者不許淮南安王神通有功秦王給田數十頃張婕妤之父因婕妤欲奪之神通執秦王之令不可俱以為怨尹德妃父阿鼠強橫毆秦王府屬杜如晦折一指曰汝何人過我門不下德妃反奏家為秦王左右陵暴髙祖積怒數責秦王秦王深自辨終不信又秦王每侍宴宫中對諸妃嬪思太穆皇后早世不得見上有天下或歔欷流涕髙祖顧之不樂諸妃嬪因密共譛秦王曰海內幸無事陛下春秋髙唯宜相娛樂秦王獨泣涕正是憎疾妾等陛下萬嵗後妾等母子決不為秦王所容因相與泣且曰皇太子仁孝陛下以妾母子屬之必能保全髙祖為之愴然由是待秦王浸疏而建成元吉日親矣元吉勸建成除秦王俟入朝因而刃之秦王從髙祖幸元吉第元吉伏護軍宇文寶于寢內欲刺秦王不果髙祖幸仁智宫建成居守秦王元吉從建成令元吉就刺秦王曰安危之計決在今嵗建成又使郎將爾朱煥校尉橋公山以甲遺慶州都督楊文幹使之舉兵欲表裏相應爾朱煥橋公山告其事文幹遂反髙祖怒甚囚建成于幕下飼以麥飯髙祖謂秦王曰楊文幹反事連建成恐應之者衆汝應自行還立汝為太子吾不能效隋文帝自誅其子當封建成為蜀王蜀兵脆弱他日不能事汝取之易耳元吉與妃嬪更迭為建成請封德彛亦為之營解髙祖意遂變唯責以兄弟不睦歸罪太子中允王圭左衛率韋挺天䇿兵曹參軍杜淹並流于巂州髙祖校獵城南命建成秦王元吉馳射角勝建成有一馬肥壯而喜蹶以授秦王曰此馬甚駿能超數丈澗弟善騎試乘之秦王乘以逐鹿馬蹶秦王踏立于數步之外馬起復乘之如是者三顧宇文士及曰彼欲以此見殺死生豈不有命建成聞之反令妃嬪讃于髙祖曰秦王自言我有天命方為天下主豈有浪死髙祖大怒先召建成元吉後召秦王入責之曰天子自有天命非智力可求汝求之一何速耶秦王免冠頓首請下法司按驗髙祖怒不解忽有司奏突厥入冦髙祖乃改容勞勉秦王命之冠帶與謀突厥髙祖每有冦盜輒命秦王討之事平之後猜嫌益甚建成夜召秦王飲酒因鴆之秦王暴心痛吐血數升淮南安王神通扶之還西宫髙祖問秦王疾敕秦王素不能飲自今無得復夜飲因謂秦王曰首建大謀削平海內皆汝之功吾欲立汝為嗣汝固辭且建成年長為嗣日久吾不忍奪也觀汝兄弟似不相容同處京邑必有紛競當遣汝建行臺居洛陽自陜以東皆主之仍命汝建天子旌旗如漢梁孝王故事秦王涕泣辭建成元吉相與謀秦王若至洛陽有土地甲兵不可復制不如留之長安則一匹夫取之易耳乃密令數人上封事言秦王左右聞往洛陽無不喜躍觀其志趣恐不復來又近幸之人各以利害説髙祖事復中止建成元吉與後宫日夜譛秦王髙祖信之將加罪陳叔達力諫乃止元吉請殺秦王髙祖曰彼有定天下之功罪狀未著何以為辭秦府幕屬皆憂懼不知所出房玄齡謂長孫無忌曰隙已成一旦禍機竊發豈惟府朝塗地實社稷之憂也莫若勸王行周公之事以安家國存亡之機間不容髮正在今日無忌曰吾懷此已久未敢言今當白之乃入言于秦王秦王召玄齡謀之玄齡曰大王功在天下當承大業今日憂危乃天贊之也其勿疑又與府屬杜如晦共勸秦王誅建成元吉元吉以秦府多驍將乃譛尉遲敬德下詔獄秦王為之分辨僅免又譛程知節出為康州刺史知節謂秦王曰大王股肱羽翼盡矣身何能久建成元吉曰秦府智略之士可懼者獨房玄齡杜如晦耳皆譛逐之會元吉當北伐時尉遲敬德程知節段志玄秦叔寶等又簡閲秦王帳下精鋭之士王晊密告秦王曰建成語元吉吾與秦王餞汝于昆明池使壯士刺殺秦王于幕下以暴卒聞敬德等汝悉坑之秦王以晊言告長孫無忌等長孫無忌等勸秦王先事圖之秦王歎曰骨肉相殘古今大惡吾誠知禍在旦夕欲俟其發然後以義討之不亦可乎敬德曰人情誰不愛死今衆人以奉王乃天授也禍機垂發而王猶晏然不以為憂王縱自輕如社稷宗廟何王如不用敬德言敬德將竄身草澤不能留王左右交手受戮也無忌曰不從敬德之言事今敗矣敬德必不為王有無忌亦當相隨而去秦王曰吾言亦未可全棄公更圖之府僚又曰元吉之凶終不肯事建成聞薛實言元吉之名合成唐字當主唐祀元吉喜曰但除秦王取東宫如反掌耳彼與建成謀未成已有取建成之心亂心無厭何所不為若使二人得志恐天下非復唐有奈何徇匹夫之節忘社稷之計乎會太白經天傅奕密奏太白見秦分秦王當有天下髙祖以其狀授秦王秦王乃密奏建成元吉淫亂後宫曰臣于兄弟無絲毫之負今欲殺臣似為世充建德報讎臣今枉死永違君親魂歸地下實恥見諸賊髙祖省之愕然報曰明當鞫問汝宜早參明日秦王遂誅建成元吉云豫嘗論史官贊唐太宗曰比迹湯武則有焉于成康若過之何庶幾云孫諫議甫則直以為聖蘇東坡則以從諫近于聖也如建成之庸愎元吉之凶戾得以害太宗則唐之宗社可立以亡孰能保隋之遺民于塗炭鋒鏑之餘傳三百年之逺乎故劉昫歐陽文忠之史于誅建成元吉不議也昫又曰當髙祖任讒之年建成忌功之日茍除畏逼孰顧分崩變故之興間不容髮方懼毁巢之禍寧虞尺布之謡蓋代之公言也獨范內相純夫作唐鑑以太宗誅建成元吉周公誅管蔡不同曰管蔡流言于國將危周公以間王室得罪于天下故誅之非周公誅之天下之所當誅也周公豈得而私之哉豫以為不然周公繫周之存亡曷若太宗繫唐之存亡哉管蔡一流言以危周公周公得而誅之建成元吉已鴆太宗不死尚衷甲伏兵凛凛日夜欲發不比管蔡之危周公也太宗獨不得而誅之乎管蔡之危周公則得罪于天下建成元吉之害太宗獨不得罪于天下乎隋餘之人恃太宗以為命者宜甚于周之人恃周公也以周公之靈固非管蔡可危不幸不免為周之輔佐者召公而下尚有人王室何恤于間也如建成元吉得害太宗唐隨以亡矣不止于間王室也太宗豈得而私之哉純夫又曰立子以長不以功建成雖無功太子也太宗雖有功藩王也豫亦以為不然古公捨長泰伯立季歷為太子文王捨長伯邑考立武王為太子非耶若以賢也大賢亦莫如太宗大功大德格于天地不俟古公文王之明智雖甚愚至下之人亦知其當有天下髙祖惑于內不察也老耄荒悖可勝言哉豫故具列建成元吉謀害太宗之事以見太宗之計出于亡聊實與天下誅之比周公誅管蔡之義甚直不愧也以反純夫之説以遺知言之君子漢髙祖方擁戚姬周昌嘗燕入奏事是周昌得見戚姬也又漢髙祖欲廢太子周昌廷諍吕后側耳東廂聽見周昌跪謝云云是吕后得見周昌也又文帝至灞陵使慎夫人鼓瑟上自倚瑟而歌顧謂羣臣皆得見慎夫人又帝幸上林皇后慎夫人從𡊮盎引卻慎夫人坐慎夫人怒不肯坐上亦怒起盎因前説云云是𡊮盎亦得見皇后慎夫人也漢宫禁之法不嚴如此司馬遷敘三千年事五十萬言班固敘二百年事八十萬言晉張輔用此論優劣云蔡雍以致逺恐泥為孔子之言李固以其進鋭者其退速為老子之言杜甫以東方朔割肉為社日以褒妲為夏商皆引用之誤前漢敘傳外博四荒按書外薄四海博字為誤魏髙堂隆傳是用大簡按詩是用大諫簡字為誤後漢書方術傳懷協道藝當作挾字胡廣傳議者剝異當作駮字朱浮傳保宥生人當作祐字王允孚藥求死當作茹字史官失于是正類此者不一漢髙祖父太上皇前史不載名後史章帝紀祠太上皇於萬年注名它官反一名執嘉髙后紀載髙祖母曰昭靈后戾太子非美諡也宣帝以加其祖豫謂太子之死可哀也與幽厲之惡不同與孟子所謂雖孝子慈孫不能改者亦不同也昔人賤庶生子孫堅五子吳史載其四仁生也不録故陳武贊曰子表將家支庶而與胄子比翼齊衡拔萃出類不亦美乎然田嬰有子四十人而賤妾之子文最賢故以為太子孟嘗君也賈誼疏云生為明帝沒為明神使顧成之廟稱為太宗又云萬年之後傳之老母弱子將使不寧是時文帝尚無恙非不忌也更為之前席如武以道惡曰以我不行此道邪以馬瘦曰以我不乘此馬邪皆殺主者其有間矣今章奏不當名趙廣漢按國史會要本朝廣漢之後也聞見後録卷七

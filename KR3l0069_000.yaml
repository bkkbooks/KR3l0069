body:
  text: 聞見後録小說家類一雜事之屬提要臣等謹案聞見後録三十卷宋邵博撰博字公濟伯溫子也是編蓋續其父書故曰後録其中論復孟后諸條亦有與前録重出者然伯溫所記多朝廷大政可禆史傳是書兼及經義史論詩話又參以神怪俳諧較前録頗為瑣雜又伯溫書盛推二程博乃排程氏而宗蘇軾觀所記游酢謝良佐之事知康節沒後程氏之徒欲尊其師而抑邵故博有激以報之蓋怙權者務爭利必先合力以攻異黨異黨既盡病利之不獨擅則同類復相攻講學者務爭名亦先合力以攻異黨異黨既盡病名之不獨擅則同類亦相攻固勢之必然不足怪也至其彚輯疑孟諸說至盈三卷證碧雲騢真出梅堯臣手記王子飛事稱佛法之靈記湯保衡事推道教之驗論晏殊薄葬之非詆趙鼎宗洛學之謬皆有乖邵子之家法他若以元稹詩作黃巢之類引據亦頗疏略惟其辨宣仁之誣載司馬光集外章疏之類可資考證議通鑑削屈原之非駁王安石取馮道之謬辨伊川易𫝊非詆垂簾證紹興玉璽實非和璧論皆有見談詩亦多可採宋人說部完美者稀節取焉可耳乾隆四十三年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀聞見後録原序先人蚤接昔之君子著其聞見于篇甚嚴博不肖外繼有得在前例為合間後出他記不避也或以司馬遷之書曰太史公猶其父談云爾曷緒之篇下亦不失為遷也嗟夫筆四十年獲麟已絶矣續明年又明年孔丘卒非是但云聞見後録云紹興二十七年三月一日丙寅河南邵博序

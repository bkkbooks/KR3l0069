body:
  text: 聞見後錄卷一宋邵博撰太祖既定天下嘗令趙普等二三大臣陳當今已施行可利及後世者普等歴言大功數十太祖俾更言其上者普等歴畢思慮無以言因以為請太祖曰吾家之事唯養兵為百代之利蓋凶年嵗有叛民而無叛兵不幸樂嵗變生有叛兵而無叛民普等頓首曰此聖畧非下臣所及予謂議者以本朝養兵為大費欲復寓兵于農之法書生之見可言而不可用者哉自唐以來大臣見君則列坐殿上然後議所進呈事蓋坐而論道之義藝祖即位之一日宰執范質等猶坐藝祖曰吾目昬可自持文書來看質等起進呈罷欲復位已宻令中使去其坐矣遂為故事太宗以柴禹錫趙鎔皆晉邸故吏頗親任之後禹錫鎔告秦王廷美隂謀事連宰相盧多遜趙普與多遜有積怨上章乞備樞軸以糾姦變廷美謫房州多遜謫崖州擢禹錫樞宻副使鎔知樞宻院禹錫鎔益散遣吏卒于國門内外偵事吏卒有醉酒與鬻書人韓玉鬬毆不勝者又誣玉有指斥語禹錫鎔以聞玉伏法太宗尋知其寃遂疎禹錫鎔不復信用未幾皆罷去廷美以太平興國七年五月遷房陵九年正月卒前詔以是年十一月有事于泰山五月迅雷中烈火作焚乾元文明二殿罷封泰山柴禹錫病狂陽趙普亦被重疾委吏甄禱于終南上清宫天神降語云普坐寃累耳廷美自真宗咸平二年方自房陵歸葬汝州梁縣新豐鄉前已追復涪王諡曰悼仁宗即位贈太師尚書令並出國史國初有神降于鳯翔府盩厔縣民張守真家自言天之尊神號黒殺將軍守真遂為道士每神欲至室中風蕭然聲如嬰兒守真獨能辨之凡百之人有禱言其禍福多驗開寶元年太祖召守真見于滋福殿疑其妄十月十九日命内侍王繼恩就見建隆觀降神神有晉王有仁心等語明日太祖晏駕晉王即位是謂太宗詔築上清太平宫于終南山下封神為翊聖將軍出大宗實錄國史道釋老志符瑞志仁皇帝誕降章懿后榻下生靈芝一本四十二葉以應享國四十二年之瑞云仁皇帝四時衣夾冬不御爐夏不御扇禀天地中和之氣故也燕恭肅王仁皇帝叔父也頗自尊大數取金錢于有司曰預討吾俸可也積數百萬有以聞詔除之御史沈邈言其不可帝慘然曰御史誤矣太宗之子八人惟王一人在耳朕當以天下為養數百萬錢不足計也仁皇帝慶厯中親除王素歐陽修蔡襄余靖為諫官風采天下王公言王德用進女口事帝初詰以宫禁事何從知公不屈帝笑曰朕真宗之子卿王旦之子有世舊豈他人比德用實進女口已服事朕左右何如公曰臣之憂正恐在陛下左右耳帝即命宫臣賜王德用所進女口錢各三百千押出内東門訖奏帝泣下公曰陛下既不棄臣言亦何遽也帝曰朕若見其人留戀不肯去恐亦不能出矣少時宫官奏宫女已出内東門帝動容而起仁皇帝慶厯年京師夏旱王公素乞親行禱雨帝曰太史言月二日當雨將以旦日出禱公言臣非太史然度是日必不雨帝問故公曰陛下幸其當雨以禱不誠也不誠不可動天故知不雨帝曰明日禱雨醴泉觀公曰醴泉之近猶外朝也豈憚暑不逺出耶帝每意動則耳赤耳已盡赤厲聲曰當西太乙宫公曰乞傳㫖帝曰車駕出郊不豫告卿不知典故公曰國初以虞非常今久太平豫告百姓但瞻望清光者衆耳無虞也諫官故不扈從明日特召王公以從日色甚熾埃霧漲天帝玉色不怡至瓊林苑囘望西太乙宫上有雲氣如香煙以起少時雷電雨甚至帝卻逍遥輦御平輦徹蓋還宫又明日召公對帝喜曰朕自卿得雨幸甚又曰昨即殿庭雨立百拜焚生龍腦香十七近至中夜舉體乃温公曰陛下事天當恭畏然隂氣足以致疾亦當慎帝曰念不雨欲自以身為犧牲何慎也仁皇帝内宴十門分各進饌有新蠏一品二十八枚帝曰吾尚未嘗枚直幾錢左右對直一千帝不恱曰數戒汝輩無侈靡一下箸為錢二十八千吾不忍也置不食李處度藏仁皇帝飛白四民安樂四字旁題化成殿醉書賜貴妃嗚呼雖酒酣嬪御在列尚不忘四民故自聖帝明王以來天獨以仁諡之也諫官韓絳面奏仁皇帝曰劉獻可遣其子以書抵臣多斥中外大臣過失不敢不聞帝曰朕不欲留人過失于心中卿持歸焚之嗚呼與世主故相離間人臣使各暴其短以為明者異矣韓絳又言天子之柄不可下移事當間出睿斷仁皇帝曰朕不憚自有處分深恐未中于理有司奉行則其害己加于人故每欲先盡大臣之慮而行之嗚呼與世主事無細大當否類出手勅用壓外庭公議者異矣嘉祐二年秋契丹求仁皇帝御容議者慮有厭勝之術帝曰吾待彼厚必不然遣御史中丞張昪遺之北主盛儀衛親出迎一見驚肅再拜語其下曰真聖主也我若生中國不過與之執鞭捧蓋為一都虞候耳其畏服如此嘉祐中將修東華門太史言太嵗在東不可犯仁皇帝批其奏曰東家之西乃西家之東西家之東乃東家之西太嵗果何在其興工勿忌仁皇帝以嘉祐七年十二月丙申幸天章閣召兩府兩制臺諫等觀三朝御書置酒賦詩于羣玉殿庚子再幸天章閣召兩府以下觀瑞物十三種一瑞石文曰趙二十一帝二瑞石文曰真君王萬嵗三瑞木曰大運宋𨼆起成文四七星珠五金山重二十餘斤六丹砂山重十餘斤七馬蹄金八軟石九白石乳花十瑞木左右異色十一瑞竹一節有二絃並生其中十二龍卵有紫斑而小十三鳯卵色白而大觀太宗真宗御集面書飛白命翰林學士王珪題姓名徧賜之又幸羣玉殿置酒作樂親諭以前日之燕草創故再為之無惜盡醉獨召宰相韓琦至榻前酌鹿胎酒一大杯琦一舉而盡各以金盤貯香藥分賜之明年三月帝升遐故韓琦哀冊文云因驚前㑹之非常似與羣臣而敘别也仁皇帝崩遣使訃于契丹燕境之人無逺近皆聚哭北主執使者手號慟曰四十二年不識兵革矣其後北朝葬仁皇帝所賜御衣嚴事之如其祖宗陵墓云真宗時皇嗣未生以綠車旄節迎濮安懿王養之禁中至仁宗生用簫韶部樂送還邸後仁宗亦以皇嗣未生用真宗故事選近屬得英宗養禁中以至嗣位英蓋濮王第十三子殆天意也文思院奉上之私無物不具宣仁后同聽政九年不取一物嗚呼賢哉上為天下兵馬大元帥至南都筮日即帝位昭慈太后遣内侍官邵成章以乗輿服御來有一道冠非人間之制成章捧以奉上曰太母以奉殿下祖宗以來退朝燕閒不裹巾只戴道冠自神宗始易以巾非舊制也願殿下即位後退朝燕閒只戴此冠庶幾如祖宗時氣象上流涕受之王制天子七廟三昭三穆與太祖之廟而七明太祖之外止有三昭三穆而已前代帝王于太祖未正東嚮之時大率所祀不過六初英宗即位祔仁宗而遷僖祖至神宗即位祔英宗復還僖祖而遷順祖司馬文正公范文忠公皆言僖祖當遷太祖當正東嚮之位最後孫觀文固言漢髙祖得天下與商周異故太上皇不得為始祖光武之興亦不敢尊舂陵今國家據南面之尊享四海九州之奉者太祖之所授也不當以僖祖僣其祀請以太祖為始祖而為僖祖立廟如周人别祀姜嫄之禮禘祫之日奉祧東嚮此韓愈所謂祖以孫尊孫以祖屈之意也丞相韓魏公讀之嘆曰此議足以傳不朽矣王荆公薄禮學又喜為異獨以為不然三公之議格不行今太祖猶未正東嚮之位云元豐三年初行官制以階易官爵禄新格中書令侍中同平章事為開府儀同三司左右僕射為特進吏部尚書為金紫光祿大夫五曹尚書為銀青光祿大夫左右丞為光祿大夫六曹侍郎為正議大夫給事中為通議大夫左右議諫為太中大夫祕書監為中大夫光祿卿至少府監為中散大夫太常至司農少卿為朝議六曹郎中朝請朝散朝奉大夫凡三等員外郎為朝請朝散朝奉郎凡三等起居舍人為朝散郎司諫為朝奉郎正言太常國子博士為承議郎太常祕書殿中丞為奉議郎太子中允賛善大夫中舍洗馬為通直郎著作佐郎大理寺丞為宣德郎光祿衛尉寺將作監丞為宗義郎大理評事為承事郎太常寺太祝奉禮郎為承務郎祕書省校書郎正字將作監主簿承務郎今嵗月浸逺舊官制少有知者予故詳出之元符末徽宗即位皇太后垂簾同聽政詔復哲宗元祐皇后孟氏位號自瑶華宫入居禁中有馮澥者論其不可曰上于元祐后叔嫂也叔無復嫂之禮程伊川謂先人曰元祐后之賢者也論亦未為無禮先人曰不然禮曰子甚宜其妻父母不恱出子不宜其妻父母曰是善事我子行夫婦之禮焉皇太后于哲宗母也于元祐后姑也母之命姑之命何為不可非上以叔復嫂也伊川喜曰子得之矣紹興己未春金人初許歸徽宗梓宫宰臣上陵名永固有王銍者言犯後魏明帝後周文宣二主陵名下祕書省參考如銍言然前漢平帝後漢殤帝十國劉龑同曰康陵本朝順祖亦曰康陵後魏明帝後周宣帝唐中宗同曰定陵本朝僖祖亦曰定陵前漢末帝唐懿宗王后同曰安陵本朝宣祖亦曰安陵唐太宗曰昭陵本朝仁宗曰永昭陵後魏宣武后曰永泰陵唐𤣥宗曰泰陵本朝哲宗亦曰永泰陵蓋本朝陵名犯前代陵名者不一祖宗以來不避也予時為校書郎為祕監言具白丞相不報再議徽宗陵名改永祐云本朝太祖神宗哲宗實錄皆有二本其更修各有自云國初詔有曰周文武成康陵各具衮冕掩閉亦不免唐末五代暴發之禍矣漢唐以來陵墓不足道也先人在元符年奏書直宣仁后事刑部有罪籍者三十三不赦晩著辨誣猶三十年奏書也國有誣諜豈可直先人疾病撫其書曰但俱吾藏山中耳上聖明元年之三日詔揚宣仁后之功削誣諜下有司索先人辨誣先人既薨予兄弟追懐遲慮未敢上有司急以復命則奏曰與其藏諸名山為百世未見之書曷若上于公朝補一代不刋之史詔以辨誣祕著作之庭諜按新史亦作辨誣一書著得于先人辨誣者每曰河南邵某云初無先人斥一時用事者之言也用事者之家意予兄弟近擬一書以附國論又誣矣故具列上元年二日詔哲宗實錄曾丞相以下文字以明今日正論不獨自先人辨誣出云聞見後錄卷一

body:
  text: 聞見後録卷二十五宋邵博撰天王院花園子洛中花甚多種而獨名牡丹曰花園皆植牡丹而獨名此曰花園子蓋無他池亭獨有牡丹數十萬本凡城中賴花以生者畢家于此至花時張幄幕列市肆管絃其中城中士女絶烟火游之過花時則復為丘墟破垣遺竈相望矣今牡丹嵗益滋而姚魏花愈難得魏花一枝千錢姚黃無賣者歸仁園歸仁其坊名也園盡此一坊廣輪皆里餘北有牡丹芍藥千株中有竹百畝南有桃李彌望唐丞相牛僧孺園七星檜其故木也今屬中書李侍郎方創亭其中河南城方五十餘里中多大園池而此其冠苗帥園節度使苗侯既貴欲極天下佳處卜居得河南河南園宅又號最佳處得開寶宰相王溥園遂購之園既古景物皆蒼然復得完力藻飾出之于是有欲慿陵諸園之意矣園故有七葉二𣗳對峙髙百尺春夏望之如山今創堂其北竹萬餘竿比其大滿二三圍疏密琅玕如碧玉椽今創亭其南東有水自伊水來可浮十石舟今創亭壓其溪有大松七今引水澆之有池宜蓮荷今創水軒板出水上對軒有橋亭制度甚雄侈然此猶未盡得王丞相故園水東為直龍圖閣趙氏所得亦大創第宅園林其間稍北曰郟鄏陌列七丞相第文潞公程丞相宅旁皆有池亭尚不可與趙韓王園比趙韓王園趙韓王宅園開國初詔將作營治其經畫制作殆侔禁省韓王以太師歸是第百日而薨子孫皆家京師罕居之故園池亦以扃鑰為常髙亭大榭花木之藪嵗時獨厮養擁彗負畚插其間而已蓋天之于宴間每自吝惜疑甚于聲名爵位李氏仁豐園李衛公有平泉花木記百餘種爾今洛陽良工巧匠批紅判白接以他木與造化爭妙故嵗嵗益竒且廣桃李梅杏蓮菊各數十種牡丹芍藥至百餘種而又逺方異卉如紫蘭茉莉瓊花山茶之儔號為難植獨植之洛陽輒與其土産無異故洛中園圃花木有至千種者甘露院東李氏園人力甚治而洛中花木無不有中有四并迎翠濯纓觀清超然四亭松島松柏樅杉檜栝皆美木洛陽獨愛栝而敬松松島者數百年松也其東南隅雙松尤竒在唐為𡊮象先園本朝屬李文定丞相今屬吳氏𫝊三世矣頗葺亭榭池沼植竹木其旁南築臺北搆堂東北道院又東有池池前後為亭臨之自東大渠引水注園中清泉細流涓涓無不通處在它郡尚無有洛陽獨以其松名東田文潞公東田本藥圃地薄東城水渺瀰甚廣泛舟游者如在江湖間也淵映縹水二堂宛宛在水中湘廬藥圃二堂間之西去其第里餘今潞公官太師年九十尚時杖屨游之紫金臺張氏園自東田並城而北張氏園亦饒水而富竹有亭四河圖志云黃帝坐𤣥扈臺郭璞云在洛汭或曰此其處也水北胡氏二園水北胡氏二園相距十許步在邙山之麓瀍水徑其旁因岸穿二土室深百餘尺堅完如埏埴開軒窗其前以臨水上水清淺則鳴漱湍暴則奔駛皆可喜也有亭榭花木率在二室之東凡登覽而惝恍俯瞰而峭絶天授地設不待人力而巧者洛陽獨有此園爾但其亭臺之名皆不足載載之且亂實如其臺四望盡百餘里而縈伊繚洛乎其間林木薈蔚雲煙掩映高樓曲榭時隱時見使畫工極思不可圖而名之曰玩月臺有菴在松檜藤葛之中闢旁牖則臺之所見亦畢陳于前而名之曰學古菴其實皆此類大字寺園大字寺園唐白樂天園也樂天云吾有第在履道坊五畝之宅十畝之園有水一池有竹千竿者是也今張氏得其半為㑹隱園水竹尚甲洛陽但以其圖考之則凡曰某堂有某水某亭有某木至今猶在而曰堂曰亭者無復倣佛矣豈因于天理者可久而成于人力者不足恃也寺中樂天石刻存者尚多獨樂園司馬公在洛陽自號迂叟謂其園曰獨樂園園卑小不可與他園班其曰讀書堂數椽屋澆花亭者益小弄水種竹軒者尤小見山臺者高不過尋丈其曰釣魚菴採藥圃者又特結竹梢蔓草為之公自為記亦有詩行于世所以為人欽慕者不在于園爾湖園洛人云園圃之勝不能相兼者六務宏大者少幽邃人力勝者乏蒼古多水泉者無眺望能兼此六者惟湖園而已豫嘗游之信然在唐為裴晉公園園中有湖湖中有洲曰百花湖北有堂曰四并其四達而旁東西之蹊者桂堂也截然出于湖之右者迎暉亭也過橫池披林莽循曲徑而後得者梅臺知止菴也自竹徑望之超然登之翛然者環翠亭也渺渺重邃尤擅花卉之盛而前據池亭之勝者翠樾軒也其大略如此若夫百花酣而白晝暝青蘋動而林隂合水靜而跳魚鳴木落而羣峰出雖四時不同而景物皆好則又不可殫記者也吕文穆園伊洛二水自東南分注入城中而伊水尤清徹園亭喜得之若又當其上流則春夏無枯涸之病吕文穆園在伊水上流木茂而竹潤有亭三一在池中二在池外橋跨池上相屬也洛陽又有園池中一物特有稱者如大隱莊梅楊侍郎園流杯師子園師子是也梅蓋早梅香甚烈而大說者云大庾嶺梅移其本至此流杯水雖急不旁觸為異師子丱石也入地數十尺或以地考之蓋武后天樞銷鑠不盡者也舍此又有嘉猷㑹節恭安溪園皆隋唐官園雖已犁為良田𣗳為桑麻矣然宫殿池沼與夫一時㑹集之盛遺俗故老猶有識其所在而道其廢興之端者游之亦可以觀萬物之無常覽時事之倏來而忽逝也李格非曰洛陽處天下之中挾殽澠之阻當秦隴之襟喉而趙魏之走集蓋四方必爭之地也天下當無事則己有事則洛陽先受兵余故曰洛陽之盛衰者天下治亂之候也方唐貞觀開元之間公卿貴戚開館列第于東都者號千有餘邸及其亂離繼以五季之酷其池塘竹𣗳兵車蹂踐廢而為邱墟高亭大榭烟火焚燎化而為灰燼與唐共滅而俱亡者無餘家矣余故曰園囿之興廢者洛陽盛衰之候也且天下之治亂候于洛陽之盛衰而知洛陽之盛衰候于園囿之興廢而得則名園記之作余豈徒然哉嗚呼公卿大夫方進于朝放乎以一己之私自為而忘天下之治忽欲退享此樂得乎唐之末路是也豫昔遊長安遇眺以道赴守成州同至唐大明宫登含元殿故基蓋龍首山之東麓高于平地四十餘尺南向五門中曰丹鳯門正面南山氣勢若相高下遺址屹然可辨自殿至門南北四百餘步東西五百步為大庭殿後彌望盡耕為田太液池故迹尚數十頃其中亦耕矣明日追路以道入咸陽至漢未央建章宫故基計其繁夥宏廓過大明逺甚其兼制夷夏非壯麗無以重威可信也又明日至秦阿房宫一殿基東西五百步南北五十丈所謂上可坐萬人下可建五丈旗周馳為閣道直抵南山表山之巔為闕者視未央建章又不足道縣令張琦者言如周之鎬京豐宫靈臺明堂辟水地亦相邇唯靈臺可辨其崇才二十尺宫殿則無復遺址以道太息曰詩所謂經始勿亟庶民子來者其専以簡易儉約為德初不言形勝富强益知仁義之尊道德之貴彼阻固雄豪皆生于不足秦漢唐之迹更可羞矣豫追記其言有可感者故具書之聞見後録卷二十五

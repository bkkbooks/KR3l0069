body:
  text: 聞見後録卷十宋邵博撰漢髙祖一竹皮冠起田野初不食秦祿卒能除其暴拯一世之人於刀機陷穽之下置於安樂之地帝天下傳之子孫四百年其取之無一不義雖湯武有愧也史臣不知出此但稱斷蛇著符協於火德謬矣太史遷取賈誼過秦上下篇以為秦始皇本紀陳涉世家下贊文班固云爾固賈誼傳不書過秦今史記陳涉語下著過秦為禇先生曰非也王荆公非歐陽公取馮道按道身事五主為宰相果不加誅何以為史荆公明妃曲云漢恩自單于自深人生樂在相知心宜其取馬道也韓信既破趙廣武軍李左車降虜也乃西鄉而師事之古今稱為盛德事然信既重左車如此曷不言於髙祖尊用之一問攻燕伐齊之後則不知左車何在其姓名亦不復見於史矣如信故善鍾離昧昧亡歸信信遇之不薄也一旦逼昧自剄持其首以見髙祖髙祖罵曰公非長者豫恐前之李左車如後之鍾離昧也信之不終宜哉新唐史南詔語中海島溪洞間蠻人馬援南征留之不誅者謂馬留人今世猴為馬留與其人形同耳舜一嵗而巡四嶽南方多暑以五月之暑而南至衡山北方多寒以十一月之寒而至常山世頗疑之漢書郊祀志武帝自三月出行封禪又北海至碣石又巡遼西又歷北邊又至九原五月還甘泉僅以百日行萬八千餘里尤荒唐矣丞相掾和洽言於曹操曰天下之人才德各殊不可以一節取也世有儉素過中自以處身則可以此格物所失或多今朝廷之議吏有著新衣乘好車者謂之不清形容不飾衣裘敝壞者謂之亷潔至今士大夫故汙辱其衣藏其輿服朝府大吏或自挈壺餐以入官寺夫立教以中庸貴可繼也今崇一槩難堪之行以檢殊途勉而為之必有疲瘁古之大教務在通人情而已凡激詭之行則容引偽矣紹興以來宰相趙元鎮好伊川程氏之學元鎮不識伊川士資以進反用妖妄眩惑一世每拱手危坐竟日無一言或就之則曰吾方思誠敬姑去為姦為偽者十人而九必敝衣粗食以自垢汙否則斥為不肖矣豫恐後世之惑也得和洽之言故表出之田橫逺居萬里外海島中髙祖必欲其來否則發兵誅之橫不敢違四皓者近在商山距長安無百里以髙祖之暴而子房謂上有不能致者四人何也蓋四皓俱振世之豪其一天下拯人羣之志初與髙祖同髙祖已帝則可隱矣故髙祖全之不欲屈非不能屈也吾大父康節云遊士汝南范滂等非訐朝政自公卿以降皆折節下之太學生爭慕其風以為文學將興處士復用申屠蟠獨嘆曰昔戰國之時處士橫議列國之主至為擁篲先驅卒有坑儒燒書之禍今之謂矣乃絶迹於梁碭之間因樹為屋自同傭人居二年滂等果罹黨錮或死或刑者數百人豫謂桓靈之時國命自閽寺出世既憤怨不平故處士抗正議互相名字有三君八俊八顧八及八厨之名太學諸生從之者至三萬餘人閽寺反謂别相署共為部黨圖危社稷司空虞放太僕杜密長樂少府李膺司𨽻校尉朱寓潁川太守巴肅沛相荀昱河南太守魏朗山陽太守翟超任城相劉儒太尉掾范滂等二百餘人皆死獄中或徙或廢或禁及七族者又六七百人天下為之騷動自古衣冠之禍未有也世説范滂等備忠孝之節者誤矣豫得申屠蟠事賢其絶識先物智逹明哲故表出之禹後二世已失邦啓太康也周公後五世已殺君伯禽考公煬公幽公弟沸殺幽公自立也殷湯後一世有太甲失道伊尹放之桐宫周武王後四世有昭王王道微缺南巡狩卒於江上其卒不赴告諱之也漢髙祖後一世有吕氏之禍唐太宗後一世有武氏之禍是數君者豈無遺澤乎漢武帝用杜周為廷尉詔獄連逮至六七萬人交所增加十有餘萬人唐武后鞫流人一日之中萬國俊殺三百人劉崇業殺九百人王德夀殺七百人伯夷姓墨名元或作允字公信叔齊名智字公逹兄弟也孤竹君之子也夷齊蓋諡云出論語疏出春秋少陽篇前漢書循吏傳云孝宣自霍光薨後始躬親萬幾勵精為治五日一聽政自丞相以下各奉職而退五日一聽政史臣以為美則孝宣而上不親覽天下之務可知矣李績病謂其弟弼曰我見房杜生平勤苦僅能立門户遭不肖子蕩覆無餘我子孫今悉以付汝葬畢當居我堂撫養孤幼謹察視之其有志氣不倫交遊非類者皆先撾殺然後以聞自是至死不復更言豫謂績親見太宗百戰取天下之難又忍死甚悲之言首以績遺髙宗至髙宗欲立太宗才人武氏為后禇遂良郝處信等死爭不可獨用績此陛下家事勿問外人一言唐之宗社幾於覆亡何績能慮其家而不能慮其國也績真鄙夫也哉司馬文正公修通鑑時謂其屬范淳父曰諸史中有詩賦等若止為文章便可刪去蓋公之意欲士立於天下後世者不在空言耳如屈原以忠廢至沈汨羅以死所著離騷漢淮南王太史公皆謂其可與日月爭光豈空言哉通鑑并屈原事盡削去之春秋褒毫髮之善通鑑掩日月之光何耶公當有深識求於考異中無之古者人君即位稱元年始終之意漢武帝乃加建元之號後因以名年已非是又數更易其號寧有人君即位稱元年之後再稱元年之理唐之太宗即位稱貞觀元年至二十三年而終為近古云唐太宗以讖欲盡殺宫中姓武者李淳風以為不可竟殺李君羡讖有一女子身長姓武其明白如此後髙宗欲立太宗才人武氏為皇后長孫無忌郝處信褚遂良力諫初無一語及武氏之讖何也武氏之變至不可言司馬文正通鑑不書怪獨書此讖云漢桓帝時或言民之貧困必貨輕錢薄發更鑄大錢事下四府羣僚太學能言之士議之豫嘗論國有政事何太學之士得議蓋其噓枯吹生抑揚震動至此故竇武之兩宫賞賜悉散與太學諸生陳蕃聞王甫之變將諸生八千餘人拔刃以入范滂挾公議為訐公卿皆折節下之太學諸生附之者三萬餘人卒成部黨之禍漢隨以亡豈但曹節等罪哉靖康初元海外與國亂神州勢尚淺朝廷有施行太學諸生必起論之又舉合國人進斥大臣擊登聞鼓碎之廟堂畏怯拱默不敢立一事天下卒至不救賴今天子中興加大號令始畏懾壞散不然其禍不在漢部黨之下矣鮑氏云民有七亡豪傑大姓蠶食無厭一亡也馬援云大姓侵小民乃太守事耳然以曹操之勇尚云先在濟南除殘去穢以是為豪強所忿恐致家禍故謝病去今之君子欲區區以禮義亷恥裁大姓之暴吾民者亦疏矣蜀于韋臯刻石文字後書臯名者必鐫其中僅可辨故宋子京書臯事云蜀人思之見其遺像必拜凡刻石著臯名者皆鑱去其文尊諱之近有自西南夷得臯授故君長牒於臯位下書若臯字復塗以墨如刻石者蓋臯花字也當時書石亦用前名後押之制非蜀人鑱其文尊諱之如本朝韓魏公書花字寫成琦字復塗以墨尚可辨亦此體也聞見後録卷十

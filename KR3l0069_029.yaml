body:
  text: 聞見後録卷二十九宋邵博撰張君猷為湖南漕過南嶽自肩輿中見路左一道觀甚麗榜曰朱陵宫遙望其中有一羽衣立殿上君猷意欲下而從騎半已過明年再經其地求朱陵宫無之父老云旁近但有朱真人祠至其下乃前所見朱陵宫之處才小屋一二楹其變異如此唐吕仙人故家嶽陽今其地名仙人村吕姓尚多藝祖初受禪仙人自後苑中出留語良久解赭袍衣之忽不見今嶽陽仙人像羽服下著赭袍云北齊敕道士剃髮為沙門宣和中敕沙門著冠為道士古今事不同如此郝翁者名允博陵人少代其兄長征河朔不堪其役遁去月夜行山間憊甚憩一樹下忽若大羽禽飛止其上熟視之一黃衣道士也允拜手乞憐道士曰汝郝允乎因授以醫術晚遷鄭圃世以神醫名之逺近之人賴以活者四十餘年非病者能盡活之也蓋其術精良可信不幸而不可治必先語之雖死亦無恨于脈非獨知已病能前知未病與死近者頃刻逺者纍年至其日時皆無失嵗常候測天地六元五運考四方之病前以告人亦無失皇祐年翁死張峋子堅志其墓云夏英公病泄太醫皆為中虛翁曰風客于胃則泄殆藁本湯證也英公駭曰吾服金石等物無數泄不止其敢飲藁本乎翁強進之泄止太常博士楊日宣病寒翁曰君脈首震而尾息尾震而首息在法為魚遊蝦戲不可治不數日死州監軍病悲思翁告其子曰法當甚悸即愈時通守李宋卿御史嚴甚監軍內所憚也翁與其子請于宋卿一造問因責其過失監軍皇怖汗出病乃已殿中丞姚程腰脊痛不可俯仰翁曰榖獨氣也當食發怒四肢受病傳于大小絡中痛而無傷法不當用藥以藥攻之則益痛須一年能偃仰二年能坐三年則愈矣後三年而愈里婦二一夜中口噤如死狀翁曰血脈滯也不用藥聞雞聲自愈一行踸踔輒踣翁曰脈厥也當治筋以藥尉之自快皆驗士陳堯遵妻病衆醫以為勞傷翁曰亟屏藥是為娠證且賀君得男子矣已而果然又二婦人娠一咽默不能言翁曰兒胞大經壅兒生經行則言矣不可毒以藥既免母子俱全一極壯健翁偶診其脈曰母氣已死所以生者反恃兒氣耳如期子生母死翁所治病半天下神異不可勝記如上所記特鄭圃之人共知者也翁有子名懷質盡能傳其學懷質嘗自診其脈語人曰我當暴死不數年果暴死翁讀黃帝內經患王氷之傳多先義指間以朱墨箋其下世尚未見懷質死其書亦亡獨太醫趙宗古得六元五運之法于翁嘗圖以上朝廷今行于世云無為軍醫張濟善用針得訣于異人云能解人而視其經絡則無不精因嵗飢疫人相食凡視一百七十人以行針無不立驗如孕婦因仆地而腹偏左針右手指而正久患脫肛針頂心而愈傷寒翻胃嘔􅬏纍日食不下針眼眥立能食皆古今方書不著陳瑩中為作傳云藥王藥上為世良醫嘗草木金石名數凡十萬八千悉知苦酸鹹淡甘辛等味故從味因悟入益知今醫家别藥曰味者古矣鄭師甫云嘗患足上傷手瘡水入腫痛不可行步有丐者令以耳塞敷之一夕水盡出愈崇寧年西都修大內患苑中池水易涸或云置牛骨池中則水不涸置之果然范時老董役親見之吕公晉伯云除蝨法吸北方之氣噴筆端書欽深淵默漆五字置于牀帳之間即盡除公資正直非妄言者洛陽椘氏葬龍門之東尹樊村鑿井每不得泉有術者云夜以水盛器見星多者下有泉用之果然今世俗謂卦影者亦易之象學也如見豕負塗載鬼一車非象而何未易以義理訓也豫見王慶曽言蚤日羇窮嘗從一頭陀占卦象其詞云須逢庚午方亨快半是春來半是秋頭陀云豈君運行庚午春秋之間少快邪久之無驗晚用秦相君薦至參知政事相君庚午生半春半秋秦字也其異如此殿中丞丘濬頗知數熙寧十年秋翰林學士楊元素貶官荆州過池陽見之濬曰明年當改元以易步之豐卦用事必以豐字紀年如期改元豐云汾晉間祈雨裸袒呌呼奮臂為反覆手狀又以水灑行道之人殆可笑按董仲舒傳注有閉隂縱陽以水灑人之説蓋其自也廣西人喜食巨蟒每見之即誦紅娘子三字蟒輒不動且誦且以藤蔓繫其首于木刺殺之熊山行數千里各于巖穴林蒨之間有藏伏之所山中人謂熊館云如虎豹出百里外則迷失故道矣鸂鶒能敕水故水宿物莫能害鴆能巫步禁蛇故食蛇啄木穴樹巢其中人或用木塞之能以觜畫符其塞自出鵲知嵗所在又有隱巢木故鷙鳥不可見燕營巢避戊巳日故不傾壞鸛有長水石故能巢中畜魚水不涸蓋不止于有知也有隱者劉易在王屋山見一蜘蛛為大蜂所螫腹脹欲裂亟就草間嚙芋梗磨之脹即平因以治人之被蜂螫者痛立止魚枕骨作器血人知愛其色瑩徹耳不知遇蠱毒必爆裂尤可貴也油絹紙石灰麥粳馬矢糞草皆能出火馬騾驢陽類起則先前治用陽藥羊牛駝隂類起則先後治用隂藥故獸醫有二種梧桐百鳥不敢棲止避鳯凰也古語云爾驗之果然蜀中喜事者南歸多載木犀花以來種之皆生或擇嫩條接冬青枝間亦生豈其類耶謂萬年枝者冬青也王樹者槐也宫苑中多此二木特易以美名冬青又名凍青貴其有嵗寒不改之節故司馬長卿謂之女貞自不為文君地邪藝草古人用以藏書曰藝香是也置書帙中即無蠧置席下即去蚤虱葉類豌豆作小叢遇秋則葉上微白如粉汗南人謂之七里香大率香草花過即無香縱葉有香亦須采掇嗅之方覺此草逺在數十步外已聞香自春至秋不歇絶可玩也種柿有七絶一有夀二多隂三無禽巢四無蟲蠧五有嘉實六其本甚固七霜葉紅可玩也榆有二種一名郎榆一名姑榆郎榆無英千葉黃梅花洛人殊貴之其香異于它種蜀中未識也近興利州山中樵者薪之以出有洛人識之求于其地尚多始移種遺喜事者今西州處處有之豫嘗春日經夷陵山中多紅梨花誦歐陽公之詩徘回其下不能去近蜀中亦稍見之又有得千葉杏花於劒州山中者在洛陽花木譜中無之亦竒産也蜀無橄欖或云司馬相如狗監所誦等賦喻蜀父老文封禪書王褒中和樂職宣布詩聖主得賢臣頌揚雄劇秦美新篇辭皆爛美足以取悅當代張九齡䇿安祿山薑公輔論朱泚危言可驗輒棄之不采相如輩蜀人九齡公輔嶺海之士以草木臭味譬之如橄欖不生于蜀生于嶺海也亦猶唐李直方以貢士第果實一緑李二粉梨三櫻桃四柑子五蒲桃或薦荔枝曰寄舉之首也蓋始于范曄以諸香品時輩侯朱虛著百官本草皆戲言之善者耳然近日蜀中種橄欖輒生豫山園自有數章蘭有二種細葉者春花花少闊葉者秋花花多黃魯直蘭説云楚人滋蘭之九畹樹蕙之百畝蘭以少故貴蕙以多故賤豫以為非是蓋十二畝為畹則九畹百畝亦相等矣又云一幹一花而香有餘者蘭一幹五七枝而香不足者蕙是以細葉為蘭闊葉為蕙亦非也楚人曰蕙今零陵香也又云薰所謂一熏一蕕者也唐人但名鈴鈴香亦名鈴子香取其花倒懸枝間如小鈴也近時附入本草云出零陵郡亦不詳本草自有薰草條亦名蕙草甚明零陵為重出云凌霄花有毒一作出蜀有人凌晨仰視其花花中露水滴入眼中遂失明或云金錢亦然聞見後録卷二十九

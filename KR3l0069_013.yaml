body:
  text: 聞見後録卷十三孔子與賔牟賈言大武曰聲淫及商何也對曰非武音也有司失其傳也若非有司失其傳則武王之志荒矣武王之志猶不貪商而孟子曰文王望道而未之見謂商之祿未盡也病其有賢臣也文王貪商如此其甚則事君之小心安在哉豈孟子妄言哉孔子不妄也孟子之誣文王也或曰孟子之心以天下積亂已久諸侯皆欲自為雄茍説之以臣事周孰能喜也故倡仁義之竿而湯武為之餌幸其速售以拯斯民而已矣曰孟子不肯枉尺直尋謂以順為正者妾婦之道其肯屑就之如此乎夫仁義又豈速售之物也子噲不得與人燕子之不得受燕於子噲固知有周室矣天之所廢必若桀紂周室其為桀紂乎盛之有衰若循環然聖王之後不能無昏亂尚賴臣子扶救之耳天下之地方百里者有幾家家可以行仁義人人可以為湯武則六尺之孤可託者誰乎孟子自以為好仁吾知其不仁甚矣齊王欲見孟子而稱有疾明日出弔王使人問疾醫來孟仲子請必無歸而造於朝不得已而之景丒氏宿焉孔子君命召不俟駕行矣則曰孔子當仕有官職夫孟子為齊卿無官職邪天下有逹尊三爵一齒一德一惡得有其一以慢其二孔子德薄且齒少邪君之所不臣者二當其為尸則弗臣也當其為師則弗臣也謂講道之頃耳非常常然也人君尊賢其臣尚當辭矧可以要之也哉是孟子之驕習矣宜乎其教諸侯以反天子也孟子曰紂之去武丁未久也其故家遺俗流風善政猶有存者又有微子微仲王子比干箕子膠鬲皆賢人也相與輔相之故久而後失之也尺地莫非其有也一民莫非其臣也然而文王猶方百里起是以難也齊人有言曰雖有智慧不如乘勢雖有鎡基不如待時今時則易然也今之學者曰自天子至於庶人皆得以行王道孟子説諸侯行王道非取王位也應之曰行其道而已乎則何必紂之失之也何憂乎善政之存何畏乎賢人之輔尺地一民皆紂之有何害諸侯之行道哉齊宣王問曰人皆謂我毁明堂毁諸已乎孟子對曰夫明堂者王者之堂也王欲行王政則勿毁之矣行王政而居明堂非取王位而何也君親無將不容纖介於其間而學者紛紛強為之辭又謂孟子權以誘諸侯使進於仁義仁義逹則尊君親親周室自復矣應之曰言仁義而不言王彼悅之而行仁義固知尊周矣言仁義之可以王彼悅之則假仁義以圖王唯恐得之之晚也尚何周室之顧哉嗚呼今之學者雷同甚矣是孟子而非六經樂王道而忘天子吾以為天下無孟子可也不可以無六經無王道可也不可以無天子故作常語以正君臣之義以明孔子之道以防亂患於後世耳人知之非我利人不知非我害悼學者之迷惑聊復有言右李泰伯常語毁我知之譽我知之是邪非邪必求諸道非道則已孟子吾知其有以曉然合於孔子者常語不得不進之也而謂由湯至於武丁賢聖之君六七作天下久則難變故文王未洽於天下齊有千里之地行仁政而王莫之能禦由周而來七百有餘嵗矣其數則過其時考之則可當今之世舍我其誰是教諸侯以仁政叛天子者也欲為佐命者也常語不得不絶之矣夫天子固不可叛也六經亦不可叛也茍可叛之則視孟之書猶冦兵虎翼者也孟既唱之學者和之劉歆以詩書助王莽荀文若説曹操以王伯乃孟之一體耳使後世之君卒不悅儒者以此常語之作其不獲已傷昔之人以其言叛天子今之人又以其言叛六經故曰天下無孟子則可不可以無六經無王道則可不可以無天子是有大功於名教非茍言焉右陳次公述常語孟軻誠學孔子者也其有背而違之者常語討之甚明世之學者不求其意漠爾而非之是亦有由然也何也由孔子百餘嵗而有孟軻由孟軻數百嵗而及揚雄又數百嵗而及韓愈揚與韓賢人也其所以推尊孟子皆著於其書今常語驟有異於二子宜乎其學軻者相驚而譊譊也然譊譊者豈知二子之尊軻處常語亦尊之矣所繆者教諸侯以叛天子以為非孔子之志也又以盡信書不如無書之説為今之害故今之儒者往往由此言而破六經常語可不作邪且由孟子沒於數百年矣初荀卿嘗一曰其非而抳於揚子雲及退之醇乎醇之説行而後之學子遂尊信之至於今兹其道乃髙出於六經常語不作孰為究明或曰子言則是矣如衆口何曰顧與聖人如何爾尚誰衆人之問哉故曰人知之非我利人不知非我害右傅野述常語桃應問於孟子曰舜為天子臯陶為士瞽叟殺人則如之何曰執之而已矣然則舜不禁與曰舜安得而禁之哉夫有所受之也然則舜如之何曰竊負而逃遵海濱而處終身欣然樂而忘其天下劉子曰孟子之言察而不盡理權而不盡義孝子之事親也既外竭其力又內致其志不使其親有不義之名不使其人有間非之言瞽叟使舜塗廩從而焚之乃下使浚井從而掩之乃出舜往於田日號泣於旻天夔夔齊栗瞽叟亦允若書曰父頑母嚚弟傲克諧以孝蒸蒸乂不格姦由是觀之舜為天子瞽叟必不殺人也仲尼之作春秋為尊者諱為親者諱為賢者諱故以子則諱父以臣則諱君豈獨春秋然哉雖為士者亦然故必原父子之親君臣之義以聽之昔者商鞅之作法也太子犯之鞅曰太子君之二也不可以刑刑其傅與師鞅之法刻矣然而猶有所移由是觀之瞽叟殺人臯陶必不執也葉公子髙問於孔子曰吾黨直躬者其父攘羊而子證之何如孔子曰不可吾黨之直者異於是父為子隱子為父隱由是觀之瞽叟殺人臯陶雖執之舜必不聽也舜豈以天下有所受顧臨其親哉夫聖人莫大焉天子莫尊焉以天下養莫備焉德為聖人尊為天子以天下養然而不能使其親無一朝之患是則非舜也知聖人之德知天子之尊知天下養之備焉而不知天子父之貴也而務摶執之是則非臯陶也無其事云爾有其事奚至於竊負而逃遵海濱而處故曰孟子之言察而不盡理權而不盡義夫衡之為物也徒懸則偏而倚加權焉則運而平一重一輕之間聖人權之時也請問權曰臯陶不難棄士不過失刑而已矣以君臣權之天下之為君臣者必定義莫髙焉舜不難棄位不過隱法而已矣以父子權之天下之為父子者必悅仁莫盛焉故善為政者無以小妨大無以名毁義無以術害道無以所賤干所貴迂其身有以利天下則為之貶其名有以安天下則為之其唯舜臯陶乎右劉中原父明舜豫讀韓愈書知其斥楊墨排釋老以尊聖人之道其志篤矣自孟軻揚雄沒傳其道而醇者唯韓愈氏而已然其言孟軻輔聖明道之功不在禹下斯亦過矣得非美其流而忘其源乎當堯之時洪水浸天下民病其害深矣雖堯舜之聖猶咨嗟皇皇未有以治之之道禹乃決橫流而放於海粒斯民而奠厥居是天下之患非禹不能去昭昭然矣雖百夔卨又何益哉孔子之道衣被天地陶甄日月萬類之性人靈一作太虛之本孰不由其德而能存乎茍一日失之則鳥獸之不若也當周之亡辨詐暴橫聖人之道偶不行於一時亦猶天地之晦日月之蝕運之常也復何傷乎孟軻學聖人者也憤然而興闢楊墨誅叛義以尊周公孔子信有大功於世然聖人之道無可無不可茍當時軻之徒不能力排楊墨止遏異端明仁義以訓天下則聖人之教果從而廢乎若使聖人之道遭楊墨之害而遂衰微則亦一家之小説爾又烏足謂萬世之法哉軻雖欲張大其教天下可從而興乎是聖人之道不為一人而廢一人而興又昭昭然矣其後嬴政肆虐火其書窒其途愚天下之耳目使不能通其説其為害過楊墨逺矣然漢家之興則孔氏之言雷震於海內豈又由軻之辨之而後行邪故曰譽之不足益毁之不足損由其道大也後之儒者有能立言著書振揚其風發明其旨則可矣若曰隨其廢而興之因其塞而通之得非過矣乎豫謂楊墨之禍未若洪水然而九年之害非禹不能平孔子之道雖見侵毁作不由軻而益尊茍毁譽由軻而興則不足謂之孔氏之道使聖人復生必不易豫言也右張俞論韓愈稱孟子功不在禹下舜生三十徴庸三十在位五十載陟方乃死按諡法曰受禪成功曰舜仁聖盛明曰舜白虎通曰舜猶僢僢也言能推信堯道而行之孔安國曰舜生三十徴庸三十在位服喪三年其一在三十之數為天子五十年凡夀一百十二嵗案書稱帝乃殂落百姓如喪考妣三載四海遏密八音言百姓思慕堯德且明舜雖受終令天下服喪三年如繼世之禮故於殂落下終言之下文云月正元日舜格於文祖謂堯崩踰年見於文祖廟而改元孟軻不逹此言以為三載服除後舜格於文祖乃妄稱孔子曰舜既為天子又帥天下諸侯以為堯三年喪是二天子矣若然當以服除之月至廟不當於正月元日也踰年改元春秋常法迄今如之軻又云堯舜禹崩三年喪畢舜禹益皆避其子然後踐位且舜正月上日受終文祖已二十八年豈容至服除未定方讓其子孔安國仍軻之謬乃曰舜服堯喪三年畢將即政復至文祖廟周衰楊墨道盛孟子排而闢之可謂醇矣其於論經義説世事知謀往往短局乖戾陋儒愛其詞簡意淺雜然崇尚固可鄙笑也司馬遷云舜年三十堯舉之五十攝行天子事五十八堯崩六十一代堯踐位三十九年崩亦用孟軻舊説也鄭玄云舜生三十謂生三十年也徴庸三十謂歷試三十年也在位五十載陟方乃死謂攝位至死為五十年舜年一百十嵗也右劉道原資治通鑑外紀臣聞春秋尊一王之法以正天下之本與禮之尊無二上其旨實同蓋國之於君家之於父學者之於孔子皆當一而不二者是以明王罷黜百家表章六經大儒推明孔氏抑黜百家今國家五十年來於孔子之道或二而不一矣其義説歸之於老莊而設科以孟子配六經視古之黜百家而專明孔氏六經者不亦異乎前者學官罷黜孔子春秋而表章偽雜之周禮以孟子配乎孔子而學者發言折處於孟子而略乎論語固可考矣今皇太子初就外傅之時會官僚講孝經而讀孟子蓋孟子不當先諸論語者也如以孟子先諸論語其何以傳道皇太子天資邁世之令德而視之以一德哉臣愚竊以謂宜講孝經而讀論語恭候講孝經畢日復講其已講之論語其入德亦易矣或問曰讀爾雅以示文字訓詁之本源而明天地萬物之名實先儒謂爾雅本是周公訓成王之書信不誣也臣愚流落衰暮之時荷聖君一日非常之眷自太子左諭德授以詹事茍有所志不敢無犯而有隱臣愚自度此言一出必遭世俗誣謗不淺矣其所恃以安者陛下聖度旁燭萬代之微而不為世俗惑也重惟太子天下之本而一本於孔子六經則宗廟社稷之流光不亦偉乎臣聞以狂瞽獨見之言干冒宸扆不勝惶懼待罪之至右眺以道奏審皇太子讀孟子聞見後録卷十三

  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0069_WYG_019-1a, image: WYG1039/WYG1039-0305a.png}
body:
  text: 聞見後録卷十九宋邵博撰朝以道言王荆公與宋次道同為羣牧司判官次道家多唐人詩集荆公盡即其本擇善者籖帖其上令吏抄之吏厭書字多輒移荆公所取長詩籖置所不取小詩上荆公性忽略不復更視唐人衆詩集以經荆公去取皆廢今世所謂唐百家詩選曰荆公定者乃羣牧司吏人定也宋子京罷守成都故事當為執政未至宰相于兩地見次盡以他人充之子京聞報悵然有梁園賦罷相如至宣室釐殘賈誼歸之句言者又論蜀人不安其奢侈遂止為鄭州望國門不得入久之再為翰林承㫖未幾不幸訃至成都士民哭于其祠者數千人謂不安其奢侈者誣矣宰相韓魏公也言者包孝肅也然子京先有碧雲漫有三年信明月長為兩地愁之句竟不至兩地悲憤而沒世以為䜟云吕申公帥維揚東坡自黃岡移汝海經從見之申公置酒終日不交一語東坡昏睡歌者唱夜寒斗覺羅衣薄東坡驚覺小語云夜來走卻羅醫博也歌者皆匿笑酒罷行後圃中至更坐東坡即几案間筆墨書歌者團扇云雨葉風枝曉自勻緑隂青子靜無塵閒吟繞屋扶疏句須信淵明是可人申公見之亦無語韓魏公與宋尚書同試中書賦琬圭宋公大息曰老矣尚從韓家郎君試邪蓋宋公文稱已著韓公以從官子弟二名登科然世尚未盡知也或聞韓公則愧謝曰某其敢望宋公報罷必矣已而韓公為奏篇之首宋公反出其下後韓公帥中山作閲古堂宋公詞有云聽說中山好韓家閲古堂畫圖名將相刻石好文章韓公見之不悅王荆公初執政對客悵然曰投老欲依僧耳客曰急則抱佛腳公微笑曰投老欲依僧古人全句客曰急則抱佛腳亦全俗語也然上去投下去腳豈不為的對邪公遂大笑蘇仲虎言有以澄心紙東坡書者令仲虎取京師印本東坡集誦其中詩即書之至邊城嵗莫多風雪强壓香醪與君别東坡閣筆怒目仲虎云汝便道香醪仲虎驚懼久之方覺印本誤以春醪為香醪也劉夢得作九日詩欲用糕字以五經中無之輟不復為宋子京以為不然故子京九日食糕有詠云颷館輕霜拂曙袍糗餈花飲鬭分曹劉郎不敢題糕字虛負詩中一世豪遂為古今絶唱糗餌粉餈糕類也出周禮詩豪白樂天目夢得云李太白僧伽歌云此僧本住南天竺為法頭陀來此國又云嗟豫落泊江淮久罕遇真僧說空有時僧伽已顯于淮泗之上矣豪傑中識郭子儀𨼆逸中識司馬子微浮屠中識僧伽則太白亦異人也哉白樂天長恨歌有夕殿螢飛思悄然孤燈挑盡未成眠之句寧有興慶宫中夜不燒蠟油明皇帝自挑燈者乎書生之見可笑耳元和中處士唐衢善哭聞白樂天謫輒大哭衢後死樂天有詩云何當向墳前還君一掬淚朝以道問豫梅二詩何如黃九豫曰魯直詩到人愛處聖俞詩到人不愛處以道為一笑柑橘二物草木書各為一條安定郡王以黃柑釀酒曰洞庭春色東坡之賦皆用橘事豈以橘條下云其類有朱柑乳柑黃柑石柑乎大柑無故事名洞庭春色亦橘也歐陽公于詩主韓退之不主杜子美劉中原父每不然之公曰子美老夫清晨梳白頭𤣥都道士來相訪之句有俗氣退之決不道也中原父曰亦退之昔在四門館晨有僧來謁之句之類耳公賞中原父之辨一笑也南人謂象齒為白暗犀角為黑暗少陵詩云黑暗通蠻貨用方言也李太白詩云昔作芙蓉花今為斷腸草以色事他人能得幾時好按陶𢎞景仙方注云斷腸草不可食其花美好名芙蓉李習之韓退之孟東野善習之于文退之所敬也退之與東野唱酬傾一時習之獨無詩退之不議也尹師魯歐陽永叔梅聖俞善師魯于文永叔所敬也永叔與聖俞唱酬傾一時師魯獨無詩永叔不議也習之師魯之于詩以為不足作邪抑不能也䕫峽之人嵗正月十百為曹設牲酒于田間已而衆操兵大噪謂之養去聲烏鬼長老言地近烏蠻戰場多與人為厲用以禳之沈存中疑少陵家家養烏鬼其自也疏詩者乃以鸕鷀别名烏鬼豫往來䕫峽間問其人如存中之言鸕鷀亦無别名華州齊雲樓有唐昭宗詞安得有英雄迎歸大內中蒲中鸛鵲樓有唐太宗詩昔乘匹馬至今駕六龍來其英偉悽怨之氣何祖孫不同也東坡為董毅夫作長短句文君壻知否笑君卑辱竒語也文君壻猶虞姬壻云今刻本者不知有自改文君細知否可笑耳東坡别李公擇長短句慿仗飛魂招楚些我思君處君思我退之與孟東野書以余心之思足下知足下懸懸于余之意也宋子京在翰林時同院李獻臣以次有六學士一日張貴妃詞頭下議行告庭之禮未決子京遽以制上妃怒抵于地曰何學士敢輕人子京出知安州以長短句詠燕子有因為銜泥汙錦衣垂下珠簾不敢歸之句或傳入禁中仁皇帝覽之一歎尋召還玉堂署簫聲咽秦娥夢斷秦樓月秦樓月年年栁色灞陵傷别樂遊原上清秋節咸陽古道音塵絶音塵絶西風殘照漢家陵闕李太白詞也豫嘗秋日餞客咸陽寶叉樓上漢諸陵在晚照中有歌此詞者一坐悽然而罷䕫州營妓為喻迪孺扣銅盤歌劉尚書竹枝詞九解尚有當時含思宛轉之豔他妓者皆不能也迪孺云歐陽詹為并州妓賦髙城已不見况乃城中人詩今其家尚為妓詹詩本亦尚在妓家䕫州其先必事劉尚書者故獨能儔當時之聲也仙女是董雙成桂殿夜凉吹玉笙曲終卻從天官去萬户千門空月明河漢女玉鍊顔雲軿往往到人間九宵有路去無迹裊裊天風吹佩環李太尉文饒迎神送神二曲豫逰秦尚有能宛轉度之者或並為一曲謂李太白作非也程叔微云伊川聞誦晏叔原夢魂慣得無拘檢又踏楊花過謝橋長短句笑曰鬼語也意亦賞之程晏三家有連云晏叔原臨淄公晚子監潁昌府許田鎮手寫自作長短句上府帥韓少師少師報書得新詞盈卷蓋才有餘而德不足者願郎君捐有餘之才補不足之德不勝門下老吏之望云一監鎮官敢以杯酒間自作長短句示本道大帥以大帥之嚴猶盡門生忠于郎君之意在叔原為甚豪在韓公為甚德也豫嘗見東坡一帖云王十六秀才遺拍板一串意豫有歌人不知其無也然亦有用陪傅大士唱金剛經耳字畫竒逸如欲飛動魯直作小楷書其下云此拍板以遺朝雲使歌公所作滿庭芳亦不惡也然朝雲今為惠州土矣豫意韓退之張籍翰墨間亦無此一段風流耳東坡赤壁詞灰飛煙滅之句圓覺經中佛語也聞見後録卷十九
